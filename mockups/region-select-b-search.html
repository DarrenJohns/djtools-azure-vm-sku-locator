<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layout B: Search + Chip Selection — Multi-Region Compare</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1e1e2e;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    padding: 48px 16px;
    min-height: 100vh;
  }

  /* ── Card ─────────────────────────────────────────────── */
  .card {
    background: #2a2a3a;
    border: 1px solid #3a3a4a;
    border-radius: 12px;
    width: 560px;
    padding: 28px 32px 32px;
    box-shadow: 0 8px 32px rgba(0,0,0,.35);
  }

  .card-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .card-desc {
    font-size: 13px;
    color: #9e9eb8;
    margin-bottom: 22px;
    line-height: 1.5;
  }

  /* ── Chips area ───────────────────────────────────────── */
  .chips-area {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
    min-height: 0;
  }
  .chips-area:empty { margin-bottom: 0; }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #33334d;
    border: 1px solid #4a4a6a;
    border-radius: 20px;
    padding: 4px 10px 4px 12px;
    font-size: 13px;
    color: #e0e0e0;
    animation: chipIn .15s ease;
    white-space: nowrap;
  }
  @keyframes chipIn { from { opacity:0; transform:scale(.9); } to { opacity:1; transform:scale(1); } }

  .chip .geo-tag {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .4px;
    padding: 1px 5px;
    border-radius: 4px;
    color: #fff;
  }
  .geo-tag.americas   { background: #5b8def; }
  .geo-tag.europe     { background: #43a680; }
  .geo-tag.apac       { background: #c97bdb; }
  .geo-tag.mea        { background: #d4944a; }

  .chip .remove-btn {
    background: none;
    border: none;
    color: #9e9eb8;
    font-size: 15px;
    cursor: pointer;
    line-height: 1;
    padding: 0 2px;
    transition: color .15s;
  }
  .chip .remove-btn:hover { color: #ff6b6b; }

  /* ── Counter ──────────────────────────────────────────── */
  .counter {
    font-size: 12px;
    color: #9e9eb8;
    margin-bottom: 8px;
    transition: color .2s;
  }
  .counter.at-limit { color: #ff9800; font-weight: 600; }

  /* ── Search wrapper ───────────────────────────────────── */
  .search-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .search-input {
    width: 100%;
    padding: 10px 14px 10px 36px;
    font-size: 14px;
    color: #e0e0e0;
    background: #1e1e2e;
    border: 1px solid #3a3a4a;
    border-radius: 8px;
    outline: none;
    transition: border-color .2s;
  }
  .search-input::placeholder { color: #6e6e8a; }
  .search-input:focus { border-color: #4fc3f7; }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #6e6e8a;
    font-size: 14px;
    pointer-events: none;
  }

  /* ── Dropdown ─────────────────────────────────────────── */
  .dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: #2f2f44;
    border: 1px solid #3a3a4a;
    border-radius: 8px;
    max-height: 280px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    box-shadow: 0 12px 28px rgba(0,0,0,.4);
  }
  .dropdown.open { display: block; }

  .dropdown::-webkit-scrollbar { width: 6px; }
  .dropdown::-webkit-scrollbar-track { background: transparent; }
  .dropdown::-webkit-scrollbar-thumb { background: #4a4a6a; border-radius: 3px; }

  .geo-header {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .6px;
    padding: 10px 14px 4px;
    color: #7e7ea0;
    position: sticky;
    top: 0;
    background: #2f2f44;
  }

  .region-option {
    padding: 8px 14px 8px 28px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background .12s;
    color: #d0d0e0;
  }
  .region-option:hover { background: #3a3a55; }
  .region-option.selected {
    color: #6e6e8a;
    cursor: default;
  }
  .region-option.selected::after {
    content: '✓';
    margin-left: auto;
    color: #4fc3f7;
    font-size: 13px;
  }
  .region-option.disabled {
    color: #555570;
    cursor: not-allowed;
  }

  .no-results {
    padding: 16px;
    text-align: center;
    color: #6e6e8a;
    font-size: 13px;
  }

  /* ── Quick-select buttons ─────────────────────────────── */
  .quick-select {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }
  .quick-select-label {
    font-size: 11px;
    color: #7e7ea0;
    width: 100%;
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: .5px;
    font-weight: 600;
  }

  .qs-btn {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid #3a3a4a;
    background: #1e1e2e;
    color: #c0c0d8;
    cursor: pointer;
    transition: all .15s;
  }
  .qs-btn:hover { border-color: #4fc3f7; color: #4fc3f7; }
  .qs-btn:active { transform: scale(.97); }

  /* ── Compare button ───────────────────────────────────── */
  .compare-btn {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #4fc3f7;
    color: #1e1e2e;
    transition: background .2s, opacity .2s;
    margin-top: 6px;
  }
  .compare-btn:hover { background: #39b0e6; }
  .compare-btn:disabled {
    opacity: .35;
    cursor: not-allowed;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-title">🌏 Multi-Region Compare</div>
  <div class="card-desc">
    Select up to <strong>5</strong> Azure regions to compare VM SKU availability,
    pricing, and capabilities side-by-side.
  </div>

  <!-- Chips -->
  <div class="chips-area" id="chipsArea"></div>

  <!-- Counter -->
  <div class="counter" id="counter">0 / 5 regions selected</div>

  <!-- Search -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search regions..." autocomplete="off">
    <div class="dropdown" id="dropdown"></div>
  </div>

  <!-- Quick-select -->
  <div class="quick-select">
    <div class="quick-select-label">Quick select</div>
    <button class="qs-btn" data-group="us">All US</button>
    <button class="qs-btn" data-group="anz">All ANZ</button>
    <button class="qs-btn" data-group="europe-core">Core Europe</button>
    <button class="qs-btn" data-group="east-asia">East Asia</button>
    <button class="qs-btn" data-group="canada">Canada</button>
  </div>

  <!-- Compare button -->
  <button class="compare-btn" id="compareBtn" disabled>Compare Across Regions</button>
</div>

<script>
const MAX = 5;

const REGIONS = {
  'Americas': {
    geo: 'americas',
    regions: [
      'East US','East US 2','West US','West US 2','West US 3',
      'Central US','North Central US','South Central US',
      'Canada Central','Canada East','Brazil South','Mexico Central'
    ]
  },
  'Europe': {
    geo: 'europe',
    regions: [
      'North Europe','West Europe','UK South','UK West',
      'France Central','France South','Germany West Central',
      'Norway East','Sweden Central','Switzerland North',
      'Italy North','Poland Central','Spain Central'
    ]
  },
  'Asia Pacific': {
    geo: 'apac',
    regions: [
      'East Asia','Southeast Asia','Australia East','Australia Southeast',
      'Japan East','Japan West','Korea Central','Korea South',
      'Central India','South India','West India'
    ]
  },
  'Middle East & Africa': {
    geo: 'mea',
    regions: [
      'UAE North','South Africa North','Qatar Central',
      'Israel Central','New Zealand North'
    ]
  }
};

// Quick-select group definitions (capped at MAX)
const QS_GROUPS = {
  'us':          ['East US','East US 2','West US','West US 2','West US 3'],
  'anz':         ['Australia East','Australia Southeast','New Zealand North'],
  'europe-core': ['North Europe','West Europe','UK South','France Central','Germany West Central'],
  'east-asia':   ['East Asia','Southeast Asia','Japan East','Korea Central','Central India'],
  'canada':      ['Canada Central','Canada East']
};

// Build flat lookup: region → geo key
const regionGeo = {};
for (const [, v] of Object.entries(REGIONS)) {
  for (const r of v.regions) regionGeo[r] = v.geo;
}

let selected = [];

const chipsArea   = document.getElementById('chipsArea');
const counter     = document.getElementById('counter');
const searchInput = document.getElementById('searchInput');
const dropdown    = document.getElementById('dropdown');
const compareBtn  = document.getElementById('compareBtn');

// ── Render helpers ──────────────────────────────────────
function renderChips() {
  chipsArea.innerHTML = '';
  selected.forEach(r => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    const geo = regionGeo[r];
    const geoLabel = geo === 'americas' ? 'AM' : geo === 'europe' ? 'EU' : geo === 'apac' ? 'AP' : 'MEA';
    chip.innerHTML =
      `<span class="geo-tag ${geo}">${geoLabel}</span>` +
      `<span>${r}</span>` +
      `<button class="remove-btn" data-region="${r}" title="Remove">&times;</button>`;
    chipsArea.appendChild(chip);
  });

  // counter
  const n = selected.length;
  counter.textContent = `${n} / ${MAX} regions selected`;
  counter.classList.toggle('at-limit', n >= MAX);
  compareBtn.disabled = n === 0;
}

function renderDropdown(filter = '') {
  const q = filter.toLowerCase();
  let html = '';
  let anyVisible = false;

  for (const [groupName, v] of Object.entries(REGIONS)) {
    const matches = v.regions.filter(r => r.toLowerCase().includes(q));
    if (!matches.length) continue;
    anyVisible = true;
    html += `<div class="geo-header">${groupName}</div>`;
    for (const r of matches) {
      const isSel = selected.includes(r);
      const isFull = selected.length >= MAX && !isSel;
      let cls = 'region-option';
      if (isSel) cls += ' selected';
      else if (isFull) cls += ' disabled';
      html += `<div class="${cls}" data-region="${r}">${r}</div>`;
    }
  }

  if (!anyVisible) html = '<div class="no-results">No regions match your search</div>';
  dropdown.innerHTML = html;
}

function openDropdown() {
  renderDropdown(searchInput.value);
  dropdown.classList.add('open');
}

function closeDropdown() {
  dropdown.classList.remove('open');
}

function toggleRegion(name) {
  const idx = selected.indexOf(name);
  if (idx !== -1) {
    selected.splice(idx, 1);
  } else {
    if (selected.length >= MAX) return;
    selected.push(name);
  }
  renderChips();
  renderDropdown(searchInput.value);
}

// ── Events ──────────────────────────────────────────────
searchInput.addEventListener('focus', openDropdown);
searchInput.addEventListener('input', () => {
  renderDropdown(searchInput.value);
  if (!dropdown.classList.contains('open')) openDropdown();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) closeDropdown();
});

dropdown.addEventListener('click', e => {
  const opt = e.target.closest('.region-option');
  if (!opt || opt.classList.contains('disabled')) return;
  toggleRegion(opt.dataset.region);
  searchInput.value = '';
  searchInput.focus();
});

chipsArea.addEventListener('click', e => {
  const btn = e.target.closest('.remove-btn');
  if (!btn) return;
  toggleRegion(btn.dataset.region);
});

// Quick-select buttons
document.querySelectorAll('.qs-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const group = QS_GROUPS[btn.dataset.group];
    if (!group) return;
    // If all already selected → deselect them
    const allIn = group.every(r => selected.includes(r));
    if (allIn) {
      selected = selected.filter(r => !group.includes(r));
    } else {
      for (const r of group) {
        if (!selected.includes(r) && selected.length < MAX) selected.push(r);
      }
    }
    renderChips();
    renderDropdown(searchInput.value);
  });
});

compareBtn.addEventListener('click', () => {
  alert('Comparing: ' + selected.join(', '));
});

// Init
renderChips();
</script>
</body>
</html>
