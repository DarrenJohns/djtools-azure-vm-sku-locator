<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Azure Top Trumps — Pure WebGL</title>
<style>
  :root {
    --bg0: #05070d;
    --bg1: #0a1526;
    --ink: #eaf2ff;
    --muted: #9fb3d0;
    --accent: #37b6ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg0); color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  #stage { position: fixed; inset: 0; display: block; width: 100vw; height: 100vh;
    touch-action: none; }
  /* radial ambience behind the canvas */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(120% 90% at 50% -10%, #12294a 0%, var(--bg1) 45%, var(--bg0) 100%);
  }

  /* ---- HUD ---- */
  #hud { position: fixed; left: 0; right: 0; top: 0; z-index: 5;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 14px 18px; pointer-events: none; }
  #hud .brand { font-weight: 700; letter-spacing: .3px; }
  #hud .brand small { display: block; font-weight: 500; color: var(--muted); font-size: 12px; }
  #hud .counts { text-align: right; font-variant-numeric: tabular-nums; }
  #hud .counts b { color: var(--accent); }

  #hint { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
    z-index: 5; color: var(--muted); font-size: 14px; letter-spacing: .2px;
    background: rgba(6,12,24,.55); border: 1px solid rgba(120,160,220,.18);
    padding: 8px 16px; border-radius: 999px; backdrop-filter: blur(6px);
    transition: opacity .4s ease; }

  /* ---- loading / error ---- */
  #loading { position: fixed; inset: 0; z-index: 20; display: grid; place-items: center;
    background: var(--bg0); transition: opacity .5s ease; }
  #loading .spin { width: 46px; height: 46px; border-radius: 50%;
    border: 3px solid rgba(120,160,220,.25); border-top-color: var(--accent);
    animation: spin 900ms linear infinite; }
  #loading .msg { margin-top: 16px; color: var(--muted); font-size: 14px; }
  #loading.err .spin { display: none; }
  #loading.gone { opacity: 0; pointer-events: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- accessibility mirror (screen-reader only) ---- */
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0; }

  /* ---- perf HUD (?fps=1) ---- */
  #fps { position: fixed; left: 14px; bottom: 14px; z-index: 6; display: none;
    font: 600 12px/1.3 ui-monospace, "Cascadia Code", Consolas, monospace;
    color: #8fe3b0; background: rgba(6,12,24,.6); border: 1px solid rgba(120,160,220,.2);
    padding: 6px 9px; border-radius: 7px; pointer-events: none; white-space: pre; }
</style>
</head>
<body>
  <canvas id="stage"></canvas>

  <div id="hud">
    <div class="brand">Azure Top Trumps <small>Pure WebGL build</small></div>
    <div class="counts">You <b id="you-count">0</b> · CPU <b id="cpu-count">0</b></div>

    <div style="text-align:center">
      <div class="spin"></div>
      <div class="msg" id="loading-msg">Loading deck…</div>
    </div>
  </div>

  <!-- one-way accessibility mirror (populated by the renderer, never an animation owner) -->
  <div id="a11y" class="sr-only" aria-live="polite"></div>
  <!-- focusable stat controls: keyboard / screen-reader picking (mirrors G, not an owner) -->
  <div id="stat-controls" class="sr-only" role="group" aria-label="Choose a stat to play"></div>

  <script type="module">
  import * as THREE from 'three';

  /* ===================================================================== *

  const STATS = [
  { key:'vcpus',           label:'vCPU',       dir:'higher', fmt:v => v,
    hint:'compute capacity',

  { key:'maxDataDisks',    label:'Data Disks', dir:'higher', fmt:v => `${v}<span class="unit">max</span>`,

    hint:'max network interfaces',
    tooltip:'Maximum number of network interface cards (NICs) attachable to this VM size — not bandwidth. More NICs enable segmentation (NVAs, multi-NIC appliances) and additional aggregate bandwidth.',
    explainer:'More NICs = more network segmentation and aggregate bandwidth — matters for NVAs, multi-tier apps, HPC fabrics.' },
  { key:'pricePerHourUSD', label:'Price',      dir:'lower',  fmt:v => v == null ? '—' : `$${v.toFixed(3)}/hr<span class="unit">USD</span>`,
    hint:'PAYG Linux · lower wins',
    tooltip:'PAYG Linux on-demand, USD per hour. Source: Azure Retail Prices API. Lower wins.',

  { key:'powerScore',      label:'Power',      dir:'higher', fmt:v => `${v}/100`,
    hint:'composite horsepower',
    tooltip:'Synthetic 1–100 score for this game (not an Azure metric). Weighted blend: vCPU 25% · memory 25% · GPU 40% · disks 5% · NICs 5%, sqrt-scaled so flagships cap near 100.',
    explainer:'Composite score weighted across vCPU, memory, GPU and disk — a rough "how beefy is this VM" thumb-rule.' },
];

const FAMILY_INFO = {
  'General Purpose': {
    summary: 'Balanced CPU-to-memory ratio. The default choice for web servers, small databases, dev/test, and most line-of-business apps. Includes the D-series and burstable B-series.',

  'Memory Optimized': {

    docs: 'https://learn.microsoft.com/azure/virtual-machines/sizes/overview#memory-optimized',

  'Storage Optimized': {

  },
  'HPC': {

    docs: 'https://learn.microsoft.com/azure/virtual-machines/sizes-hpc',
  },
  'Confidential': {
    summary: 'Hardware-based confidential computing (AMD SEV-SNP / Intel TDX). Memory is encrypted and isolated from the hypervisor — useful for regulated workloads and zero-trust scenarios. The DC and EC series.',
    docs: 'https://learn.microsoft.com/azure/confidential-computing/confidential-vm-overview',
  },

// Reference range used by the AI for its own-card evaluation.
const STAT_REFS = {
  vcpus:           [1, 192],
  memoryGB:        [1, 4000],
  maxDataDisks:    [1, 64],
  nics:            [1, 8],
  powerScore:      [1, 100],
  // pricePerHourUSD intentionally absent — see pickStatForCPU
};

const FAMILY_CLASS = {
  'General Purpose':   'ft-gp',
  'Compute Optimized': 'ft-co',
  'Memory Optimized':  'ft-mo',
  'Storage Optimized': 'ft-so',
  'GPU Accelerated':   'ft-gpu',
  'HPC':               'ft-hpc',
  'Confidential':      'ft-conf',
};

const RARITY_LABEL = {
  common:'COMMON', uncommon:'UNCOMMON', rare:'RARE', epic:'EPIC', legendary:'LEGENDARY'
};
const RARITY_STARS = {
  common:1, uncommon:2, rare:3, epic:4, legendary:5
};

const DECK_SIZE = 40;

/* ---------- 1a. seeded RNG (mulberry32) for reproducible demos ---------- */
const _seedParam = new URLSearchParams(location.search).get('seed');
function _hashStr(s) {
  let h = 1779033703 ^ s.length;
  for (let i = 0; i < s.length; i++) {
    h = Math.imul(h ^ s.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return h >>> 0;
}
let _rngState = _seedParam
  ? (/^-?\d+$/.test(_seedParam) ? (parseInt(_seedParam, 10) >>> 0) : _hashStr(_seedParam))
  : (Math.floor(Math.random() * 0x100000000) >>> 0);
function rng() {
  _rngState = (_rngState + 0x6D2B79F5) >>> 0;
  let t = _rngState;
  t = Math.imul(t ^ (t >>> 15), t | 1);
  t = (t + Math.imul(t ^ (t >>> 7), t | 61)) ^ t;
  return ((t ^ (t >>> 14)) >>> 0) / 0x100000000;
}

/* tiny DOM helpers */
function h(tag, attrs, children) {
  const el = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'class') el.className = attrs[k];
    else if (k === 'html') el.innerHTML = attrs[k];
    else if (k.startsWith('on') && typeof attrs[k] === 'function') el.addEventListener(k.slice(2), attrs[k]);
    else if (attrs[k] === true) el.setAttribute(k, '');
    else if (attrs[k] != null && attrs[k] !== false) el.setAttribute(k, attrs[k]);
  }
  if (children != null) {
    if (!Array.isArray(children)) children = [children];
    for (const c of children) {
      if (c == null || c === false) continue;
      el.appendChild(c.nodeType ? c : document.createTextNode(String(c)));
    }
  }
  return el;
}
function $(id) { return document.getElementById(id); }
// Lowercase the "V" in Azure version suffixes (V2 → v2, DV2 → Dv2, etc.).
// Preserves the NV-series family prefix (NV6, NV12, …) by negative lookbehind.
function lcVersion(s) {
  return String(s == null ? '' : s).replace(/(?<!N)V(\d)/g, 'v$1');
}


  function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }


  /* family glyph set (harvested — baker rasterizes these to canvas) */
const GLYPHS = {
  'GPU Accelerated': '<svg viewBox="0 0 64 64"><rect x="6" y="14" width="52" height="36" rx="4" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="20" cy="32" r="6" fill="currentColor"/><circle cx="44" cy="32" r="6" fill="currentColor"/><rect x="14" y="50" width="6" height="6" fill="currentColor"/><rect x="44" y="50" width="6" height="6" fill="currentColor"/></svg>',
  'Memory Optimized': '<svg viewBox="0 0 64 64"><rect x="10" y="14" width="44" height="6" rx="1" fill="currentColor"/><rect x="10" y="24" width="44" height="6" rx="1" fill="currentColor" opacity=".75"/><rect x="10" y="34" width="44" height="6" rx="1" fill="currentColor" opacity=".5"/><rect x="10" y="44" width="44" height="6" rx="1" fill="currentColor" opacity=".25"/></svg>',
  'Compute Optimized': '<svg viewBox="0 0 64 64"><path d="M34 6 L18 38 L30 38 L26 58 L48 28 L34 28 Z" fill="currentColor"/></svg>',
  'General Purpose': '<svg viewBox="0 0 64 64"><rect x="10" y="10" width="20" height="20" fill="currentColor"/><rect x="34" y="10" width="20" height="20" fill="currentColor" opacity=".7"/><rect x="10" y="34" width="20" height="20" fill="currentColor" opacity=".55"/><rect x="34" y="34" width="20" height="20" fill="currentColor" opacity=".4"/></svg>',
  'Storage Optimized': '<svg viewBox="0 0 64 64"><ellipse cx="32" cy="14" rx="20" ry="6" fill="currentColor"/><path d="M12 14 V32 a20 6 0 0 0 40 0 V14" fill="currentColor" opacity=".6"/><path d="M12 32 V50 a20 6 0 0 0 40 0 V32" fill="currentColor" opacity=".35"/></svg>',
  'HPC': '<svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="4" fill="currentColor"/><ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="currentColor" stroke-width="2"/><ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="currentColor" stroke-width="2" transform="rotate(60 32 32)"/><ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="currentColor" stroke-width="2" transform="rotate(-60 32 32)"/></svg>',
  'Confidential': '<svg viewBox="0 0 64 64"><rect x="14" y="28" width="36" height="28" rx="3" fill="currentColor"/><path d="M22 28 V18 a10 10 0 0 1 20 0 V28" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="32" cy="42" r="3" fill="#fff"/></svg>',
};

  /* ---------- 3b. card art bake (Phase 3 — mesh-card texture source) ----------
   Renders a card to a high-DPI offscreen canvas using Canvas2D so the
   WebGL mesh-card path can wrap it in a CanvasTexture. Deliberately a
   simplified, larger-typography variant of the DOM card — the WebGL
   build is meant to look different from the stable build.
   Synchronous bake. Family glyphs are async-loaded SVG → bitmap; if
   one isn't ready when a card bakes, the glyph slot is left empty
   (visually fine — gradient + family stripe still read). Glyph load
   typically completes within the first 50ms after page load. */
(function initCardArt() {
  const TEX_W = 1280, TEX_H = 2000;  // 4× of CSS 320×500
  const PAD = 64;

  const FAM_COLOR = {
    'General Purpose':   '#0f6cbd',
    'Compute Optimized': '#e97548',
    'Memory Optimized':  '#8764b8',
    'Storage Optimized': '#038387',
    'GPU Accelerated':   '#c4314b',
    'HPC':               '#4f52b2',
    'Confidential':      '#7a7574',
  };
  const RARITY_COLOR = {
    common:     '#b9bcc6',
    uncommon:   '#4ea36b',
    rare:       '#2596e7',
    epic:       '#b074e8',
    legendary:  '#f0a93b',
  };

  // Pre-rasterize each family glyph SVG to a 512×512 canvas, tinted
  // in its own family color so it can sit on the white card front
  // exactly the way the original DOM card's .glyph element does
  // (`color: var(--fam)`). bake() falls back to glyph-less if the
  // image hasn't loaded yet.
  const glyphCanvases = {};
  Object.entries(GLYPHS).forEach(([family, svg]) => {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 512;
    const ctx = c.getContext('2d');
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, 512, 512);
      glyphCanvases[family] = c;
      // Invalidate any cached bakes that completed before this glyph
      // loaded so a re-bake will include the tinted glyph.
      if (typeof frontCache !== 'undefined') frontCache.clear();
    };
    img.onerror = () => { /* leave unset; bake will skip */ };
    img.src = 'data:image/svg+xml;utf8,' + encodeURIComponent(
      svg.replace(/currentColor/g, FAM_COLOR[family] || '#0f6cbd')
    );
  });

  const frontCache = new Map(); // card.id → HTMLCanvasElement
  let backCanvas = null;

  // Azure "A" logo — same PNG the CSS3D card backs use. Preload at
  // module init so it's almost certainly ready by the time the first
  // mesh card mounts. If it isn't yet, bakeBack draws everything else
  // and the logo pops in via onBackRefresh once it loads.
  const azureLogoImg = new Image();
  azureLogoImg.decoding = 'async';
  const backRefreshListeners = [];
  azureLogoImg.addEventListener('load', () => {
    backCanvas = null;
    for (const cb of backRefreshListeners.slice()) { try { cb(); } catch (_) {} }
  });
  azureLogoImg.src = 'azure-logo.png';

  // Pre-bake the hex-tile background pattern once. The original CSS
  // back tiles a 56×48 SVG at 6% white. Match exactly at 4× scale.
  let hexTilePattern = null;
  (function buildHexTile() {
    const TW = 224, TH = 192; // 4× of the original 56×48 CSS tile
    const t = document.createElement('canvas');
    t.width = TW; t.height = TH;
    const tx = t.getContext('2d');
    tx.strokeStyle = 'rgba(255,255,255,0.06)';
    tx.lineWidth = 4; // 1 CSS px scaled
    const polys = [
      [14,0, 28,8, 28,24, 14,32, 0,24, 0,8],
      [42,0, 56,8, 56,24, 42,32, 28,24, 28,8],
      [14,32, 28,40, 28,48, 14,48],
      [0,48, 14,48, 14,32, 0,24],
      [42,32, 56,24, 56,48, 42,48],
    ];
    for (const p of polys) {
      tx.beginPath();
      for (let i = 0; i < p.length; i += 2) {
        const x = p[i] * 4, y = p[i + 1] * 4;
        if (i === 0) tx.moveTo(x, y); else tx.lineTo(x, y);
      }
      tx.closePath();
      tx.stroke();
    }
    hexTilePattern = t;
  })();

  function bakeFront(card) {
    const cached = frontCache.get(card.id);
    if (cached) return cached;
    const c = document.createElement('canvas');
    c.width = TEX_W; c.height = TEX_H;
    drawFront(c.getContext('2d'), card);
    frontCache.set(card.id, c);
    return c;
  }

  function bakeBack() {
    if (backCanvas) return backCanvas;
    backCanvas = document.createElement('canvas');
    backCanvas.width = TEX_W; backCanvas.height = TEX_H;
    drawBack(backCanvas.getContext('2d'));
    return backCanvas;
  }

  function drawFront(ctx, card) {
    const famColor    = FAM_COLOR[card.familyType] || '#0f6cbd';
    const rarityColor = RARITY_COLOR[card.rarity]   || '#b9bcc6';
    const W = TEX_W, H = TEX_H;

    // === Original DOM card layout, faithfully baked ===
    // The DOM card (toptrumps.html cardFront) is: white background,
    // thin family-colored top accent, dark text, small centered family
    // glyph in family color, six stat rows on white, cream ability
    // footer. We mirror that here so the mesh card shown over the
    // CSS3D DOM card has the same visual design — no second style
    // to maintain.
    // Card body — white with the same 14 CSS-px (= 56 texture-px)
    // corner radius the DOM .card uses.
    ctx.fillStyle = '#ffffff';
    roundRect(ctx, 0, 0, W, H, 56); ctx.fill();

    // Thin family-colored top accent (matches .card-accent height 8px = 32 tex-px)
    ctx.fillStyle = famColor;
    roundRectTop(ctx, 0, 0, W, 32, 56); ctx.fill();

    // --- HEADER ROW (region pill left, rarity stars+word right) ---
    const HEAD_Y = 100; // vertical mid of the head row
    // Region pill — family-colored hex-ish chip with white text
    ctx.save();
    ctx.font = '800 38px ui-monospace, "SF Mono", Menlo, Consolas, monospace';
    const regionText = '⬢ ' + (card.regionShort || '');
    const regW = ctx.measureText(regionText).width + 60;
    const regH = 68;
    const regX = PAD;
    const regY = HEAD_Y - regH / 2;
    ctx.fillStyle = famColor;
    roundRect(ctx, regX, regY, regW, regH, 14); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    ctx.fillText(regionText, regX + 30, HEAD_Y);
    ctx.restore();

    // Rarity stars + word — rarity-colored text, no chip background,
    // right-aligned to match the DOM .card-rarity (color: var(--rar)).
    const stars = '★'.repeat(RARITY_STARS[card.rarity] || 1);
    const rarityWord = (RARITY_LABEL[card.rarity] || '').toUpperCase();
    ctx.save();
    ctx.fillStyle = rarityColor;
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'right';
    ctx.font = '800 40px Inter, system-ui, sans-serif';
    const wordW = ctx.measureText(' ' + rarityWord).width;
    ctx.fillText(rarityWord, W - PAD, HEAD_Y);
    ctx.font = '900 44px Inter, system-ui, sans-serif';
    ctx.fillText(stars, W - PAD - wordW, HEAD_Y);
    ctx.restore();

    // --- TITLE BLOCK (name, nickname, family chip) ---
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
    // Card name — huge dark text. Auto-shrink for very long names.
    const displayName = lcVersion(card.displayName || '');
    let nameFontPx = 130;
    ctx.font = '900 ' + nameFontPx + 'px Inter, system-ui, sans-serif';
    while (ctx.measureText(displayName).width > W - PAD * 2 && nameFontPx > 64) {
      nameFontPx -= 6;
      ctx.font = '900 ' + nameFontPx + 'px Inter, system-ui, sans-serif';
    }
    ctx.fillStyle = '#15171c';
    ctx.fillText(displayName, PAD, 290);

    // Nickname — italic muted gray
    ctx.font = 'italic 600 56px Inter, system-ui, sans-serif';
    ctx.fillStyle = '#687085';
    ctx.fillText('“' + (card.nickname || '') + '”', PAD, 360);

    // Family chip row — dot + family ID + family type, family-colored,
    // small uppercase tracking like .card-fam in the DOM.
    ctx.save();
    const dotY = 432;
    ctx.fillStyle = famColor;
    ctx.beginPath();
    ctx.arc(PAD + 12, dotY, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = '700 36px Inter, system-ui, sans-serif';
    ctx.fillStyle = famColor;
    ctx.textBaseline = 'middle';
    const famId = lcVersion((card.familyDisplay || '').trim());
    const famType = (card.familyType || '').toUpperCase();
    const famChip = famId ? (famId + '  ·  ' + famType) : famType;
    ctx.fillText(famChip, PAD + 36, dotY);
    ctx.restore();

    // --- ART BLOCK (glyph + optional GPU tag) ---
    // Centered family glyph, small (≈ 280 px) tinted in family color.
    const glyph = glyphCanvases[card.familyType];
    const artMidY = 620;
    if (glyph) {
      const gSize = 280;
      ctx.drawImage(glyph, (W - gSize) / 2, artMidY - gSize / 2, gSize, gSize);
    }
    // GPU tag underneath (if any) — small text in legendary-amber
    if (card.tags && card.tags.gpu) {
      ctx.save();
      ctx.font = '800 40px ui-monospace, "SF Mono", Menlo, Consolas, monospace';
      ctx.fillStyle = '#f0a93b';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';
      ctx.fillText('GPU · ' + card.tags.gpu, W / 2, artMidY + 180);
      ctx.restore();
    }

    // --- STATS LIST (6 rows on white card body) ---
    const statsX0 = PAD;
    const statsX1 = W - PAD;
    const statsY0 = 870;
    const statsY1 = 1630;
    const s = card.stats || {};
    const rows = [
      { label: 'vCPU',       dir: 'higher', hint: 'compute capacity',
        val: s.vcpus           != null ? String(s.vcpus) : '—', unit: '' },
      { label: 'MEMORY',     dir: 'higher', hint: 'RAM capacity',
        val: s.memoryGB        != null ? String(s.memoryGB) : '—',
        unit: s.memoryGB != null ? 'GB' : '' },
      { label: 'DATA DISKS', dir: 'higher', hint: 'storage scale-out',
        val: s.maxDataDisks    != null ? String(s.maxDataDisks) : '—',
        unit: s.maxDataDisks != null ? 'MAX' : '' },
      { label: 'NICs',       dir: 'higher', hint: 'max network interfaces',
        val: s.nics            != null ? String(s.nics) : '—',
        unit: s.nics != null ? 'MAX' : '' },
      { label: 'PRICE',      dir: 'lower',  hint: 'PAYG Linux · lower wins',
        val: s.pricePerHourUSD != null ? '$' + s.pricePerHourUSD.toFixed(3) + '/hr' : '—',
        unit: s.pricePerHourUSD != null ? 'USD' : '' },
      { label: 'POWER',      dir: 'higher', hint: 'composite horsepower',
        val: s.powerScore      != null ? s.powerScore + '/100' : '—', unit: '' },
    ];
    const rowH = (statsY1 - statsY0) / rows.length;
    ctx.textBaseline = 'middle';
    rows.forEach((r, i) => {
      const rowTop = statsY0 + i * rowH;
      const rowMid = rowTop + rowH / 2;
      // Label (uppercase, tracked, dark gray-blue)
      ctx.font = '800 44px Inter, system-ui, sans-serif';
      ctx.fillStyle = '#4a5063';
      ctx.textAlign = 'left';
      ctx.fillText(r.label, statsX0 + 20, rowMid);
      const labelW = ctx.measureText(r.label).width;
      // Direction arrow (family-tinted for higher, muted red for lower)
      const arrow = r.dir === 'higher' ? '▲' : '▼';
      ctx.font = '900 32px Inter, system-ui, sans-serif';
      ctx.fillStyle = r.dir === 'higher' ? famColor : '#c44545';
      const arrowX = statsX0 + 20 + labelW + 18;
      ctx.fillText(arrow, arrowX, rowMid);
      const arrowW = ctx.measureText(arrow).width;
      // Hint (italic light gray) after arrow, auto-shrink to fit
      let hintFont = 32;
      ctx.font = 'italic 500 ' + hintFont + 'px Inter, system-ui, sans-serif';
      const hintX = arrowX + arrowW + 14;
      const hintMaxW = statsX1 - 20 - hintX - 360;
      while (ctx.measureText(r.hint).width > hintMaxW && hintFont > 22) {
        hintFont -= 2;
        ctx.font = 'italic 500 ' + hintFont + 'px Inter, system-ui, sans-serif';
      }
      ctx.fillStyle = '#9aa0ad';
      ctx.fillText(r.hint, hintX, rowMid);
      // Value — dark, mono-feel, right-aligned. Optional unit suffix
      // rendered smaller and uppercased like .stat-value .unit in DOM.
      let valFont = 64;
      ctx.font = '900 ' + valFont + 'px Inter, system-ui, sans-serif';
      while (ctx.measureText(r.val).width > 360 && valFont > 40) {
        valFont -= 4;
        ctx.font = '900 ' + valFont + 'px Inter, system-ui, sans-serif';
      }
      ctx.fillStyle = '#15171c';
      ctx.textAlign = 'right';
      const unitGap = r.unit ? 16 : 0;
      const unitFont = Math.max(28, Math.floor(valFont * 0.45));
      ctx.save();
      ctx.font = '700 ' + unitFont + 'px Inter, system-ui, sans-serif';
      const unitW = r.unit ? ctx.measureText(r.unit).width : 0;
      ctx.restore();
      ctx.font = '900 ' + valFont + 'px Inter, system-ui, sans-serif';
      ctx.fillText(r.val, statsX1 - 20 - unitW - unitGap, rowMid);
      if (r.unit) {
        ctx.font = '700 ' + unitFont + 'px Inter, system-ui, sans-serif';
        ctx.fillStyle = '#8a8f99';
        ctx.fillText(r.unit, statsX1 - 20, rowMid);
      }
      // Row divider — faint hairline at bottom of every row
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(statsX0 + 20, rowTop + rowH);
      ctx.lineTo(statsX1 - 20, rowTop + rowH);
      ctx.stroke();
    });
    ctx.textBaseline = 'alphabetic';

    // --- ABILITY FOOTER (cream tinted box) ---
    if (card.ability && (card.ability.title || card.ability.description)) {
      const abX0 = 40;
      const abX1 = W - 40;
      const abY  = 1660;
      const abH  = 300;
      ctx.fillStyle = '#f5f1e3';
      roundRect(ctx, abX0, abY, abX1 - abX0, abH, 28); ctx.fill();
      const abTitle = (card.ability.title || '').toUpperCase();
      const abDesc  = card.ability.description || '';
      // Title — uppercase, family-colored
      ctx.textBaseline = 'alphabetic';
      ctx.textAlign = 'left';
      ctx.font = '900 44px Inter, system-ui, sans-serif';
      ctx.fillStyle = famColor;
      ctx.fillText(abTitle, abX0 + 40, abY + 68);
      // Description — wrap to up to 4 lines
      ctx.font = '500 36px Inter, system-ui, sans-serif';
      ctx.fillStyle = '#565b6d';
      const dx = abX0 + 40;
      const maxW = (abX1 - abX0) - 80;
      const lineH = 46;
      const maxLines = 4;
      const words = abDesc.split(/\s+/);
      const lines = [];
      let line = '';
      let consumed = 0;
      for (let i = 0; i < words.length; i++) {
        const test = line ? line + ' ' + words[i] : words[i];
        if (ctx.measureText(test).width > maxW && line) {
          lines.push(line);
          line = words[i];
          consumed = i;
          if (lines.length === maxLines) break;
        } else {
          line = test;
        }
      }
      if (line && lines.length < maxLines) { lines.push(line); consumed = words.length; }
      if (lines.length === maxLines && consumed < words.length - 1) {
        let last = lines[maxLines - 1];
        while (ctx.measureText(last + ' …').width > maxW && last.includes(' ')) {
          last = last.replace(/\s+\S*$/, '');
        }
        lines[maxLines - 1] = last + ' …';
      }
      lines.forEach((ln, i) => ctx.fillText(ln, dx, abY + 124 + i * lineH));
    }

    // Rarity-tinted outer border (last so it sits on top of every other
    // layer). Matches the original .card.rarity-X box-shadow accent.
    ctx.strokeStyle = rarityColor;
    ctx.lineWidth = 8;
    roundRect(ctx, 16, 16, W - 32, H - 32, 50); ctx.stroke();
  }

  function drawBack(ctx) {
    const W = TEX_W, H = TEX_H;
    const S = 4; // CSS→texture scale (1280=320*4, 2000=500*4)

    // --- 1. Background field --------------------------------------------
    // 135° linear gradient matching the original CSS3D card back
    // (--azure → --azure-deep → #06335e). Then a soft top-left highlight,
    // then the hex tessellation overlay at 6% white.
    // Clip radius MUST match the CSS .card border-radius (14 CSS px) so
    // the painted content fills the element edge-to-edge. If the clip
    // is tighter than the element radius, the safety-net
    // `background-color` underneath shows through as a darker ring at
    // each corner — which reads as a second card peeking out from
    // behind the jittered deck stack.
    ctx.save();
    roundRect(ctx, 0, 0, W, H, 14 * S); ctx.clip();

    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0,    '#0f6cbd');
    grad.addColorStop(0.60, '#0b4f8c');
    grad.addColorStop(1,    '#073b6a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Radial highlight — CSS3D back uses `radial-gradient(circle at
    // 30% 25%, rgba(255,255,255,.08), transparent 55%)`. With
    // farthest-corner default, the gradient end is 55% of the
    // distance from (0.3W, 0.25H) to (W,H), ≈ 0.55 × √(0.49W² + 0.5625H²).
    // For our 1280×2000 tex this works out to ~960 tex px.
    const hiCx = W * 0.30, hiCy = H * 0.25;
    const hiR  = 0.55 * Math.sqrt((W - hiCx) * (W - hiCx) + (H - hiCy) * (H - hiCy));
    const hi = ctx.createRadialGradient(hiCx, hiCy, 0, hiCx, hiCy, hiR);
    hi.addColorStop(0, 'rgba(255,255,255,0.10)');
    hi.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hi;
    ctx.fillRect(0, 0, W, H);

    if (hexTilePattern) {
      const pat = ctx.createPattern(hexTilePattern, 'repeat');
      if (pat) { ctx.fillStyle = pat; ctx.fillRect(0, 0, W, H); }
    }
    ctx.restore();

    // --- 2. Outer gold frame (inset 8 CSS px) ---------------------------
    // Drawn as three concentric strokes to mimic the original's
    // outer-gold + inner-white + dashed-very-faint sandwich.
    const frameInset = 8 * S;
    const frameR    = 11 * S;
    ctx.lineWidth = 1 * S;
    ctx.strokeStyle = 'rgba(255,214,130,0.55)';
    roundRect(ctx, frameInset, frameInset,
              W - frameInset * 2, H - frameInset * 2, frameR); ctx.stroke();

    const innerInset = 13 * S;
    const innerR     = 8 * S;
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    roundRect(ctx, innerInset, innerInset,
              W - innerInset * 2, H - innerInset * 2, innerR); ctx.stroke();

    // Inner gold tint hint inside the white border.
    ctx.strokeStyle = 'rgba(255,214,130,0.18)';
    roundRect(ctx, innerInset + S, innerInset + S,
              W - (innerInset + S) * 2, H - (innerInset + S) * 2, innerR - S); ctx.stroke();

    // Faint dashed line (inset 19 CSS).
    const dashInset = 19 * S;
    ctx.save();
    ctx.setLineDash([3 * S, 4 * S]);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1 * S;
    roundRect(ctx, dashInset, dashInset,
              W - dashInset * 2, H - dashInset * 2, 5 * S); ctx.stroke();
    ctx.restore();

    // --- 3. Central hex medallion ---------------------------------------
    // 200×200 viewBox in the SVG, scaled to 62% of card width (max 180 CSS).
    // For our 320 CSS card: 320*0.62 = 198 → clamped to 180. So size = 180 CSS.
    const medSize = 180 * S;
    const medX = (W - medSize) / 2;
    const medY = (H - medSize) / 2;
    const medScale = medSize / 200; // viewBox is 200x200
    drawMedallion(ctx, medX, medY, medScale);

    // --- 4. Azure "A" logo (if loaded) ----------------------------------
    if (azureLogoImg.complete && azureLogoImg.naturalWidth > 0) {
      const logoSize = 96 * S; // 32% of 320 → 102 CSS, clamped to 96
      const logoX = (W - logoSize) / 2;
      const logoY = (H - logoSize) / 2;
      // Soft drop shadow to match the CSS filter: drop-shadow(0 4px 10px ...)
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.55)';
      ctx.shadowBlur  = 10 * S;
      ctx.shadowOffsetY = 4 * S;
      ctx.drawImage(azureLogoImg, logoX, logoY, logoSize, logoSize);
      ctx.restore();
    }

    // --- 5. Wordmarks ---------------------------------------------------
    // "AZURE TOP TRUMPS" top + bottom, gold-cream, wide letter-spacing,
    // flanked by short gold side rules. CSS: 9px font, .42em letter-spacing.
    drawWordmark(ctx, 'AZURE TOP TRUMPS', W / 2, 26 * S + 14 * S);
    drawWordmark(ctx, 'AZURE TOP TRUMPS', W / 2, H - 26 * S);

    // --- 6. Corner ornaments --------------------------------------------
    // 4-fold rotational symmetry. The SVG draws its L+arc+dot pattern
    // in the top-left "quadrant" of its 24×24 viewBox; rotating by 90°
    // increments matches the original CSS card.
    const cs = 26 * S;            // corner box size
    const co = 14 * S;            // offset from card edge
    drawCornerOrnament(ctx, co,            co,            cs,   0);
    drawCornerOrnament(ctx, W - co - cs,   co,            cs,  90);
    drawCornerOrnament(ctx, W - co - cs,   H - co - cs,   cs, 180);
    drawCornerOrnament(ctx, co,            H - co - cs,   cs, 270);
  }

  // Gold hex medallion (mirrors BACK_MEDALLION_SVG verbatim).
  function drawMedallion(ctx, x, y, s) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(s, s);
    // Outer hex ring — gold gradient.
    const gold = ctx.createLinearGradient(0, 0, 0, 200);
    gold.addColorStop(0, '#ffe6a8');
    gold.addColorStop(1, '#d59b2a');
    ctx.lineWidth = 1 / s * 4; // keep stroke ~constant in screen px
    ctx.strokeStyle = gold;
    ctx.globalAlpha = 0.35;
    polyHex(ctx, [100,12, 170,52, 170,148, 100,188, 30,148, 30,52]);
    ctx.globalAlpha = 1;

    // Slightly inner hex — white-ish.
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 0.6 / s * 4;
    polyHex(ctx, [100,22, 162,57, 162,143, 100,178, 38,143, 38,57]);

    // Inner ornamental circle.
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 0.5 / s * 4;
    ctx.beginPath();
    ctx.arc(100, 100, 62, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function polyHex(ctx, pts) {
    ctx.beginPath();
    for (let i = 0; i < pts.length; i += 2) {
      const x = pts[i], y = pts[i + 1];
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
  }

  // Gold side-ruled wordmark — "— text —" with letter-spacing.
  function drawWordmark(ctx, text, cx, cy) {
    const S = 4;
    const size = 9 * S;
    ctx.save();
    ctx.font = '700 ' + size + 'px Inter, system-ui, sans-serif';
    ctx.fillStyle = 'rgba(255,224,168,0.85)';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur  = 2 * S;
    ctx.shadowOffsetY = 1 * S;
    // Manual letter-spacing (.42em ≈ 0.42 * fontSize).
    const spacing = size * 0.42;
    let total = 0;
    for (const ch of text) total += ctx.measureText(ch).width + spacing;
    total -= spacing; // no trailing space
    let x = cx - total / 2;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    for (const ch of text) {
      ctx.fillText(ch, x, cy);
      x += ctx.measureText(ch).width + spacing;
    }
    // Side rules — short gold gradient lines flanking the wordmark.
    const ruleW = 28 * S;
    const ruleY = cy;
    ctx.shadowColor = 'transparent';
    const gL = ctx.createLinearGradient(cx - total / 2 - ruleW - 10 * S, ruleY,
                                        cx - total / 2 - 10 * S,         ruleY);
    gL.addColorStop(0,   'rgba(255,214,130,0)');
    gL.addColorStop(0.5, 'rgba(255,214,130,0.55)');
    gL.addColorStop(1,   'rgba(255,214,130,0)');
    ctx.fillStyle = gL;
    ctx.fillRect(cx - total / 2 - ruleW - 10 * S, ruleY - S / 2, ruleW, S);

    const gR = ctx.createLinearGradient(cx + total / 2 + 10 * S, ruleY,
                                        cx + total / 2 + 10 * S + ruleW, ruleY);
    gR.addColorStop(0,   'rgba(255,214,130,0)');
    gR.addColorStop(0.5, 'rgba(255,214,130,0.55)');
    gR.addColorStop(1,   'rgba(255,214,130,0)');
    ctx.fillStyle = gR;
    ctx.fillRect(cx + total / 2 + 10 * S, ruleY - S / 2, ruleW, S);

    ctx.restore();
  }

  // Corner ornament: L-stub + arc + dot, rotated to match position.
  function drawCornerOrnament(ctx, x, y, size, rotDeg) {
    ctx.save();
    // Defensive state reset so a shadow / dash / alpha leak from
    // anywhere upstream in drawBack cannot poison this routine.
    ctx.setLineDash([]);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    ctx.globalAlpha = 1;
    ctx.translate(x + size / 2, y + size / 2);
    ctx.rotate(rotDeg * Math.PI / 180);
    ctx.translate(-size / 2, -size / 2);
    const s = size / 24; // SVG viewBox is 24×24
    ctx.strokeStyle = 'rgba(255,214,130,0.72)';
    // L-stub: SVG uses stroke-linecap="round" — keep that.
    ctx.lineCap = 'round';
    ctx.lineWidth = 1.4 * s;
    ctx.beginPath();
    ctx.moveTo(2 * s, 2 * s); ctx.lineTo(10 * s, 2 * s);
    ctx.moveTo(2 * s, 2 * s); ctx.lineTo(2 * s, 10 * s);
    ctx.stroke();

    // Arc pair: original SVG path has no linecap attribute, so it
    // uses the default "butt". Inheriting "round" from the L above
    // adds semicircular caps to every arc endpoint, fattening the
    // pair into a blurry blob after the 4× → 1× downsample.
    ctx.lineCap = 'butt';
    ctx.lineWidth = 1 * s;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.moveTo(5 * s, 5 * s); ctx.quadraticCurveTo(5 * s, 10 * s, 10 * s, 10 * s);
    ctx.moveTo(5 * s, 5 * s); ctx.quadraticCurveTo(10 * s, 5 * s, 10 * s, 10 * s);
    ctx.stroke();
    ctx.globalAlpha = 1;

    ctx.fillStyle = 'rgba(255,214,130,0.75)';
    ctx.beginPath();
    ctx.arc(3.5 * s, 3.5 * s, 1.2 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawHex(ctx, cx, cy, r, color, width) {
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i - Math.PI / 2;
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.stroke();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }
  function roundRectTop(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h); ctx.lineTo(x, y + h);
    ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }
  function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
    const words = String(text || '').split(/\s+/);
    let line = '';
    let lines = 0;
    for (let n = 0; n < words.length; n++) {
      const test = line ? line + ' ' + words[n] : words[n];
      if (ctx.measureText(test).width > maxWidth && line) {
        ctx.fillText(line, x, y);
        line = words[n];
        y += lineHeight;
        lines++;
        if (lines >= (maxLines - 1)) {
          // last line — measure and ellipsize remaining
          let rest = words.slice(n).join(' ');
          while (rest && ctx.measureText(rest + '…').width > maxWidth) {
            rest = rest.slice(0, -1);
          }
          ctx.fillText(rest + (rest === words.slice(n).join(' ') ? '' : '…'), x, y);
          return;
        }
      } else {
        line = test;
      }
    }
    if (line) ctx.fillText(line, x, y);
  }

  window.__cardArt = {
    W: TEX_W, H: TEX_H,
    bakeFront, bakeBack,
    // Subscribe to back-face texture invalidations (currently fires
    // once when azure-logo.png finishes loading after a logo-less
    // bake). Returns an unsubscribe fn.
    onBackRefresh(cb) {
      backRefreshListeners.push(cb);
      return () => {
        const i = backRefreshListeners.indexOf(cb);
        if (i >= 0) backRefreshListeners.splice(i, 1);
      };
    },
    clear() { frontCache.clear(); backCanvas = null; },
  };

  // Publish the baked back as a stylesheet so the CSS3D card back
  // (deck-stack cards, deal-card hosts) paints from the same image as
  // the mesh back. Without this the two layers show subtly different
  // designs that read as a "swap" when one occludes the other.
  // We inject the URL into a real <style> element rather than a CSS
  // custom property because the data URL is far too large to route
  // through `document.documentElement.style.setProperty(...)`
  // reliably (some browsers silently invalidate huge inline-style
  // values, which then drops the entire background shorthand and
  // leaves cards transparent). Republish on every refresh
  // (e.g. after azure-logo.png finishes loading post-bake).
  let bakedBackStyleEl = null;
  function publishBackImage() {
    try {
      const c = bakeBack();
      const url = c.toDataURL('image/png');
      if (!bakedBackStyleEl) {
        bakedBackStyleEl = document.createElement('style');
        bakedBackStyleEl.id = 'baked-back-style';
        document.head.appendChild(bakedBackStyleEl);
      }
      bakedBackStyleEl.textContent =
        'body.has-baked-back .card.is-back {' +
          'background-image: url("' + url + '");' +
          'background-size: 100% 100%;' +
          'background-position: center;' +
          'background-repeat: no-repeat;' +
          'background-color: #0b4f8c;' +
        '}';
      if (document.body) document.body.classList.add('has-baked-back');
    } catch (err) {
      console.warn('[toptrumps-webgl] publishBackImage failed', err);
    }
  }
  if (document.body) publishBackImage();
  else document.addEventListener('DOMContentLoaded', publishBackImage, { once: true });
  backRefreshListeners.push(publishBackImage);
  console.info('[toptrumps-webgl] Card art baker ready (' + TEX_W + '×' + TEX_H + ')');
})();


  /* ---------- 5. CPU AI ----------
   Difficulty scale (G.difficulty 1-5):
     1 Cadet     — fully random
     2 Rookie    — 75% random, 25% smart
     3 Engineer  — 40% random, 60% smart
     4 Architect — fully smart (rank-based)
     5 Oracle    — sees opponent's top card; picks the stat where CPU wins by largest margin */
const DIFFICULTY_META = [
  null,
  { name: 'Cadet',     hint: 'Picks a stat at random. Easiest match.' },
  { name: 'Rookie',    hint: 'Mostly random — occasionally clever.' },
  { name: 'Engineer',  hint: 'Balanced — sometimes smart, sometimes random.' },
  { name: 'Architect', hint: 'Plays its strongest stat every round.' },
  { name: 'Oracle',    hint: 'Peeks at your card. Brutal — good luck.' },
];
const DIFFICULTY_SMART_P = [0, 0.0, 0.25, 0.60, 1.0, 1.0];

function pickStatForCPU(card, allHandCards, opponentCard) {
  const diff = (G && G.difficulty) || 3;

  // Level 5: oracle — knows opponent's card; pick stat where CPU wins by the largest margin.
  if (diff >= 5 && opponentCard) {
    let bestKey = null, bestScore = -Infinity;
    for (const s of STATS) {
      const cv = card.stats[s.key], pv = opponentCard.stats[s.key];
      if (cv == null) continue;
      // null on opponent = auto-win for CPU
      if (pv == null) { return s.key; }
      const margin = (s.dir === 'higher') ? (cv - pv) : (pv - cv);
      // Normalize roughly by range of stat across in-play cards
      const vals = allHandCards.map(c => c.stats[s.key]).filter(x => x != null);
      const range = Math.max(1e-9, Math.max(...vals) - Math.min(...vals));
      const score = margin / range;
      if (score > bestScore) { bestScore = score; bestKey = s.key; }
    }
    if (bestKey && bestScore > 0) return bestKey;

  const pSmart = DIFFICULTY_SMART_P[diff] ?? 1.0;
  if (Math.random() >= pSmart) {
    const eligible = STATS.filter(s => card.stats[s.key] != null);
    return eligible[Math.floor(Math.random() * eligible.length)].key;

  // Smart: pick the stat where THIS card ranks highest within current pool.
  let best = null, bestRank = -1;
  for (const s of STATS) {

    for (const x of values) {

    if (rank > bestRank) { bestRank = rank; best = s; }

/**
 * Compare a single stat between two cards.

  if (pv == null && cv == null) return 'tie';
  if (pv == null) return 'cpu';
  if (cv == null) return 'player';

  if (pv === cv) return 'tie';
  if (meta.dir === 'higher') return pv > cv ? 'player' : 'cpu';

      }
    });
  }

  /* ---- a11y one-way mirror (never an animation owner) ------------------ */
  const a11y = document.getElementById('a11y');
  function announce(msg) { if (a11y) a11y.textContent = msg; }

  /* ---- shared card layout constants (baker-derived) -------------------
     Both the reveal highlight (below) and Phase-3 raycast picking map stat
     rows using THESE numbers, so they can never drift from the baked art. */
  const TEX_H     = art.H;                         // 2000
  const STATS_Y0  = 870, STATS_Y1 = 1630;          // stat-band top/bottom in tex px
  const ROW_H_PX  = (STATS_Y1 - STATS_Y0) / STATS.length;
  // texture-pixel Y → card-local Y (texture top = card top = +CARD_H/2)
  const texYToLocal = (py) => CARD_H / 2 - (py / TEX_H) * CARD_H;
  const rowMidPx    = (i)  => STATS_Y0 + (i + 0.5) * ROW_H_PX;

  /* reveal highlight — an additive quad parented to the card group. It faces
     +Z, so it is back-face-culled (invisible) while the card is face-down and
     only shows once the front is toward the camera. Single owner: it rides the
     card's own transform, it is not a second card. */
  const HL_GEO = new THREE.PlaneGeometry(CARD_W * 0.9, (ROW_H_PX / TEX_H) * CARD_H);
  const HL = { pick: 0xf5c542, win: 0x37d67a, lose: 0xef5350, tie: 0xffb300 };
  function showPick(cardG, idx, colorHex, opacity = 0.55) {
    let m = cardG.userData.hl;
    if (!m) {
      m = new THREE.Mesh(HL_GEO, new THREE.MeshBasicMaterial({
        transparent: true, opacity: 0, blending: THREE.AdditiveBlending,
        depthWrite: false, toneMapped: false
      }));
      m.position.z = 0.02;
      cardG.add(m);
      cardG.userData.hl = m;
    }
    m.material.color.setHex(colorHex);
    m.position.y = texYToLocal(rowMidPx(idx));
    // ease opacity in
    tween({ dur: md(220), update: (e) => { m.material.opacity = opacity * e; },
            done: () => { m.material.opacity = opacity; } });
  }
  function clearPick(cardG) {
    const m = cardG && cardG.userData.hl;
    if (m) m.material.opacity = 0;
  }

  /* ---- Phase 3: UV → stat-row hit test + hover highlight ---------------
     Picking reuses the SAME baker-derived bands as the reveal highlight, so
     the hit target can never drift from what the player sees. A PlaneGeometry
     UV runs u:0→1 left→right, v:0→1 bottom→top; texture Y is top-down. */
  function rowFromUV(uv) {
    const texY = (1 - uv.y) * TEX_H;
    if (texY < STATS_Y0 || texY > STATS_Y1) return -1;
    const idx = Math.floor((texY - STATS_Y0) / ROW_H_PX);
    return (idx >= 0 && idx < STATS.length) ? idx : -1;
  }
  // soft, instant hover band on the player card (tracks the pointer 1:1)
  function showHover(cardG, idx) {
    let m = cardG.userData.hover;
    if (!m) {
      m = new THREE.Mesh(HL_GEO, new THREE.MeshBasicMaterial({
        color: 0x9fd0ff, transparent: true, opacity: 0,
        blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false
      }));
      m.position.z = 0.018;
      cardG.add(m);
      cardG.userData.hover = m;
    }
    m.position.y = texYToLocal(rowMidPx(idx));
    m.material.opacity = 0.32;
  }
  function clearHover(cardG) {
    const m = cardG && cardG.userData.hover;
    if (m) m.material.opacity = 0;
  }

  /* ---- table: single owner of the two in-play card meshes -------------- */
  const tableGroup = new THREE.Group();
  tableGroup.rotation.x = -0.08;                   // gentle recline → depth without overlap
  scene.add(tableGroup);

  const PLAYER_SLOT = new THREE.Vector3(0, -1.82, 0);
  const CPU_SLOT    = new THREE.Vector3(0,  1.82, 0);
  const PLAYER_PILE = new THREE.Vector3(0, -5.6, 0.5);
  const CPU_PILE    = new THREE.Vector3(0,  5.6, 0.5);

  /* Layout is responsive to the viewport shape:
       • landscape (wide) → cards SIDE BY SIDE (you left, CPU right) so their
         stat rows line up for easy comparison and the wide space is used well.
       • portrait / tall  → cards STACKED (you bottom, CPU top).
     layoutTable() mutates the slot/pile vectors in place; fitCamera() reads the
     live slot positions so framing always matches the current orientation. */
  let sideBySide = true;
  function layoutTable(aspect) {
    sideBySide = aspect >= 1.05;
    if (sideBySide) {
      const dx = CARD_W / 2 + 0.30;                 // half-gap between the two cards
      PLAYER_SLOT.set(-dx, 0, 0);
      CPU_SLOT.set(   dx, 0, 0);
      PLAYER_PILE.set(-(dx + CARD_W * 1.4), 0, 0.5);
      CPU_PILE.set(    (dx + CARD_W * 1.4), 0, 0.5);
    } else {
      const dy = CARD_H / 2 - 0.21;                 // half-gap, slight overlap of margins
      PLAYER_SLOT.set(0, -dy, 0);
      CPU_SLOT.set(   0,  dy, 0);
      PLAYER_PILE.set(0, -(dy + CARD_H * 1.2), 0.5);
      CPU_PILE.set(   0,  (dy + CARD_H * 1.2), 0.5);
    }
  }

  /* Responsive framing: pull the camera back just far enough that the whole
     two-card group (plus margin) fits the viewport at ANY aspect ratio and in
     either orientation, so the cards never clip or drift off-centre.

     The table is reclined about X (see tableGroup.rotation.x). Under
     perspective this makes the near card project LARGER and reach further
     toward the viewport edge than a flat measure predicts, so the vertical fit
     needs extra headroom. We add a recline-aware fudge + generous margins. */
  const FIT_MARGIN_H = 1.18;                        // vertical breathing room
  const FIT_MARGIN_W = 1.14;                        // horizontal breathing room
  function fitCamera() {
    const aspect = camera.aspect;
    const half = THREE.MathUtils.degToRad(camera.fov) / 2;
    const tan = Math.tan(half);
    const recline = Math.abs(tableGroup.rotation.x || 0);
    // world extents to cover, derived from the LIVE slot positions
    const spanX = Math.abs(CPU_SLOT.x - PLAYER_SLOT.x) + CARD_W;
    const spanY = (Math.abs(CPU_SLOT.y - PLAYER_SLOT.y) + CARD_H) * (1 + recline * 0.9);
    const needH = spanY * FIT_MARGIN_H;
    const needW = spanX * FIT_MARGIN_W;
    // distance so the vertical extent fits, and so the horizontal extent fits
    const dForH = (needH / 2) / tan;
    const dForW = (needW / 2) / (tan * aspect);
    const d = Math.max(dForH, dForW);
    camera.position.set(0, 0.15, d);
    camera.lookAt(0, 0, 0);
  }

  let playerCard = null, cpuCard = null;

  /* ---- soft contact shadow (Phase 4) ---------------------------------
     A blurred radial blob that sits on the table BEHIND each card (never a
     child of the card group, so it doesn't flip with it). It tracks the card's
     x/y each frame and grows + softens as the card lifts toward the camera,
     grounding the lift. Cheap (one textured quad), no shadow-map pass. */
  const shadowTex = (() => {
    const s = 256, cv = document.createElement('canvas'); cv.width = cv.height = s;
    const c = cv.getContext('2d');
    const g = c.createRadialGradient(s/2, s/2, 6, s/2, s/2, s/2);
    g.addColorStop(0.0, 'rgba(0,0,0,0.55)');
    g.addColorStop(0.55, 'rgba(0,0,0,0.28)');
    g.addColorStop(1.0, 'rgba(0,0,0,0.0)');
    c.fillStyle = g; c.fillRect(0, 0, s, s);
    const t = new THREE.CanvasTexture(cv);
    t.colorSpace = THREE.SRGBColorSpace;
    return t;
  })();
  const shadowGeo = new THREE.PlaneGeometry(CARD_W * 1.16, CARD_H * 1.16);
  function makeShadow() {
    const m = new THREE.Mesh(shadowGeo, new THREE.MeshBasicMaterial({
      map: shadowTex, transparent: true, opacity: 0.4, depthWrite: false, toneMapped: false
    }));
    tableGroup.add(m);
    return m;
  }
  function updateShadow(cardG) {
    const sh = cardG && cardG.userData.shadow;
    if (!sh) return;
    const baseZ = cardG.userData.baseZ || 0;
    const lift = Math.max(0, Math.min(1, (cardG.position.z - baseZ) / 0.9));
    // sit slightly below-and-behind the card on the reclined table
    sh.position.set(cardG.position.x, cardG.position.y - 0.06, baseZ - 0.06);
    const cardScale = cardG.scale.x || 1;
    const spread = (1 + lift * 0.34) * cardScale;
    sh.scale.set(spread, spread, 1);
    const faceOpacity = cardG.userData.front ? cardG.userData.front.material.opacity : 1;
    sh.material.opacity = (0.42 - lift * 0.22) * faceOpacity;
  }

  /* ---- idle float: cards gently hang in space ------------------------
     A soft, slow drift + tilt applied around each card's slot anchor so the
     pair reads as suspended, not pinned. Runs only while a card is the live
     top card and NOT mid-flip (flip owns z-lift/scale/rot.y). Written as an
     absolute transform from the anchor each frame, so fly-out/sweep — which
     read the card's current position as their start — pick up seamlessly. */
  function floatCard(cardG, et) {
    if (!cardG || cardG.userData.flipping || REDUCED) return;
    const a = cardG.userData.baseSlot; if (!a) return;
    const ph = cardG.userData.floatPhase || 0;
    cardG.position.set(
      a.x + Math.sin(et * 0.62 + ph) * 0.055,
      a.y + Math.sin(et * 0.85 + ph * 1.3) * 0.075,
      (cardG.userData.baseZ || 0) + Math.sin(et * 0.50 + ph * 0.7) * 0.05
    );
    cardG.rotation.x = Math.sin(et * 0.72 + ph) * 0.030;
    cardG.rotation.z = Math.cos(et * 0.66 + ph * 1.1) * 0.026;
  }

  function placeCard(cardG, slot, faceUp) {
    cardG.position.copy(slot);
    cardG.userData.baseZ = slot.z;
    cardG.userData.baseSlot = slot.clone();   // float anchor (re-set on resize)
    cardG.userData.faceUp = faceUp;
    cardG.rotation.y = faceUp ? 0 : Math.PI;
  }

  function disposeCard(cardG) {
    if (!cardG) return;
    tableGroup.remove(cardG);
    const sh = cardG.userData.shadow;
    if (sh) { tableGroup.remove(sh); sh.material.dispose(); cardG.userData.shadow = null; }
    cardG.userData.dispose && cardG.userData.dispose();
  }

  /* slide a resolved card toward the winner's pile (or the pot centre on a
     tie), shrinking + fading, then dispose. Pure function of eased t (G4). */
  function sweep(cardG, dest, done) {
    const from = cardG.position.clone();
    tween({
      dur: md(460),
      update: (e) => {
        cardG.position.lerpVectors(from, dest, e);
        const s = 1 - 0.45 * e;
        cardG.scale.set(s, s, s);
        cardG.userData.setOpacity(1 - e);
      },
      done: () => { disposeCard(cardG); done && done(); }
    });
  }

  /* fly a WON card dramatically off the winner's side of the screen: it
     accelerates outward (easeIn), whooshes toward the camera, spins about Z,
     then fades and disposes. `dir` is a unit exit direction; `spin`/`delay`
     let the pair read as two distinct cards. Start pose = the card's CURRENT
     (floated) transform, so there's no snap when the float hands off. */
  function flyOut(cardG, dir, { spin = 0, delay = 0, dist = 9 } = {}, done) {
    const launch = () => {
      const from = cardG.position.clone();
      const fromZ = cardG.rotation.z, fromX = cardG.rotation.x;
      const dest = from.clone().addScaledVector(dir, dist);
      tween({
        dur: md(600),
        ease: easeIn,
        update: (e) => {
          cardG.position.x = from.x + (dest.x - from.x) * e;
          cardG.position.y = from.y + (dest.y - from.y) * e;
          cardG.position.z = from.z + Math.sin(e * Math.PI) * 0.9 + e * 0.6;  // whoosh toward camera
          cardG.rotation.z = fromZ + spin * e;
          cardG.rotation.x = fromX * (1 - e);
          const s = 1 + 0.14 * Math.sin(e * Math.PI) - 0.10 * e;
          cardG.scale.set(s, s, s);
          cardG.userData.setOpacity(e < 0.62 ? 1 : Math.max(0, 1 - (e - 0.62) / 0.38));
        },
        done: () => { disposeCard(cardG); done && done(); }
      });
    };
    if (delay > 0 && !REDUCED) setTimeout(launch, delay); else launch();
  }

  /* ---- HUD ------------------------------------------------------------- */
  const elYou  = document.getElementById('you-count');
  const elCpu  = document.getElementById('cpu-count');
  const elHint = document.getElementById('hint');
  function updateHUD() {
    elYou.textContent = G.player.hand.length;
    elCpu.textContent = G.cpu.hand.length;
  }
  function setHint(msg) { if (elHint) elHint.textContent = msg; }

  /* ---- game state (G2: this state drives everything; it never touches a
     mesh directly — the table functions above are the only mesh owner) --- */
  const _diffParam = parseInt(new URLSearchParams(location.search).get('diff'), 10);
  const G = {
    data: null,
    player: { hand: [] }, cpu: { hand: [] },
    pot: [], round: 0, turn: 'player', phase: 'idle',
    pickedStat: null, history: [],
    difficulty: (_diffParam >= 1 && _diffParam <= 5) ? _diffParam : 3,
    matchToken: 0
  };
  const beat = (ms) => new Promise(r => setTimeout(r, ms));

  function startMatch() {
    const deck = shuffle(G.data.cards.slice()).slice(0, DECK_SIZE);
    G.player.hand = []; G.cpu.hand = [];
    for (let i = 0; i < deck.length; i++) {
      (i % 2 === 0 ? G.player.hand : G.cpu.hand).push(deck[i]);
    }
    G.pot = []; G.round = 0; G.history = [];
    G.turn = rng() < 0.5 ? 'player' : 'cpu';
    G.phase = 'idle';
    G.matchToken++;
    disposeCard(playerCard); disposeCard(cpuCard);
    playerCard = cpuCard = null;
    updateHUD();
    startRound();
  }

  function spawnRoundCards() {
    disposeCard(playerCard); disposeCard(cpuCard);
    playerCard = makeCard(G.player.hand[0]);
    cpuCard    = makeCard(G.cpu.hand[0]);
    // independent drift phases so the two cards never bob in lockstep
    playerCard.userData.floatPhase = Math.random() * 6.283;
    cpuCard.userData.floatPhase    = Math.random() * 6.283;
    placeCard(playerCard, PLAYER_SLOT, false);
    placeCard(cpuCard,    CPU_SLOT,    false);
    playerCard.userData.shadow = makeShadow();
    cpuCard.userData.shadow    = makeShadow();
    tableGroup.add(playerCard, cpuCard);
  }

  function startRound() {
    G.round += 1;
    G.pickedStat = null;
    G.phase = 'picking';
    spawnRoundCards();
    updateHUD();
    const token = G.matchToken;

    if (G.turn === 'player') {
      setHint('Dealing your card…');
      announce(`Round ${G.round}. Your turn.`);
      setTimeout(() => {
        if (G.matchToken !== token) return;
        flipCard(playerCard, true, 620, () => {
          if (G.matchToken !== token) return;
          setHint('Your pick — press 1–6 to choose a stat');
          announce(`Your card: ${G.player.hand[0].displayName}. Choose a stat, 1 to 6.`);
          syncStatControls();
        });
      }, 420);
    } else {
      setHint('CPU is choosing…');
      announce(`Round ${G.round}. CPU's turn.`);
      syncStatControls();
      setTimeout(() => {
        if (G.matchToken !== token) return;
        const inPlay = [...G.player.hand, ...G.cpu.hand, ...G.pot];
        const stat = pickStatForCPU(G.cpu.hand[0], inPlay, G.player.hand[0]);
        cpuPicksStat(stat);
      }, 700);
    }
  }

  function playerPicksStat(key) {
    if (G.phase !== 'picking' || G.turn !== 'player') return;
    G.pickedStat = key; G.phase = 'revealing';
    syncStatControls();
    reveal(key);
  }
  function cpuPicksStat(key) {
    if (G.phase !== 'picking' || G.turn !== 'cpu') return;
    G.pickedStat = key; G.phase = 'revealing';
    syncStatControls();
    reveal(key);
  }

  async function reveal(key) {
    const token = G.pickedStat && G.matchToken;
    const idx   = STATS.findIndex(s => s.key === key);
    const meta  = STATS[idx];
    const pCard = G.player.hand[0], cCard = G.cpu.hand[0];
    playerCard.scale.set(1, 1, 1);                // cancel any breathing residue

    // gold pick highlight on both cards
    showPick(playerCard, idx, HL.pick);
    showPick(cpuCard,    idx, HL.pick);
    setHint(`${meta.label} — ${G.turn === 'cpu' ? 'CPU chose' : 'you chose'} it`);

    // flip up whichever cards are still face-down (cpu always; player on cpu turn)
    await new Promise((res) => {
      let pending = 0;
      const bump = () => { if (--pending <= 0) res(); };
      [playerCard, cpuCard].forEach(c => { if (!c.userData.faceUp) { pending++; } });
      if (pending === 0) return res();
      [playerCard, cpuCard].forEach(c => { if (!c.userData.faceUp) flipCard(c, true, 600, bump); });
    });
    if (G.matchToken !== token) return;

    await beat(260);
    if (G.matchToken !== token) return;

    const winner = resolveStat(key, pCard, cCard);
    const pv = pCard.stats[key], cv = cCard.stats[key];
    const fmt = (x) => String(meta.fmt ? meta.fmt(x) : x).replace(/<[^>]*>/g, '');
    // recolor picked row: winner green, loser red, tie amber
    if (winner === 'tie') {
      showPick(playerCard, idx, HL.tie, 0.6);
      showPick(cpuCard,    idx, HL.tie, 0.6);
      setHint(`Tie on ${meta.label} — cards go to the pot`);
      announce(`Tie on ${meta.label}. Both ${fmt(pv)}. ${G.pot.length + 2} cards to the pot.`);
    } else {
      showPick(playerCard, idx, winner === 'player' ? HL.win : HL.lose, 0.6);
      showPick(cpuCard,    idx, winner === 'cpu'    ? HL.win : HL.lose, 0.6);
      const youWord = winner === 'player' ? 'You win' : 'CPU wins';
      setHint(`${youWord} — ${meta.label} ${fmt(winner === 'player' ? pv : cv)} beats ${fmt(winner === 'player' ? cv : pv)}`);
      announce(`${meta.label}: you ${fmt(pv)}, CPU ${fmt(cv)}. ${youWord}.`);
      if (winner === 'player' && playerCard) {
        const o = playerCard.getWorldPosition(new THREE.Vector3());
        confettiBurst(o, 60, 2.6);
        globeBurst(5);
        fxKick(0.7);
      }
    }

    await beat(winner === 'tie' ? 900 : 1050);
    if (G.matchToken !== token) return;
    resolveRound(winner, key);
  }

  function resolveRound(winner, key) {
    const token = G.matchToken;
    G.history.push({ round: G.round, stat: key, winner });

    const pTop = G.player.hand.shift();
    const cTop = G.cpu.hand.shift();
    const pile = [pTop, cTop, ...G.pot];

    let pDest, cDest;
    if (winner === 'tie') {
      G.pot = pile;                       // carries; same player picks again
      pDest = cDest = new THREE.Vector3(0, 0, -0.4);
    } else {
      G.pot = [];
      if (winner === 'player') { G.player.hand.push(...pile); G.turn = 'player'; pDest = cDest = PLAYER_PILE; }
      else                     { G.cpu.hand.push(...pile);    G.turn = 'cpu';    pDest = cDest = CPU_PILE; }
    }

    const localP = playerCard, localC = cpuCard;
    playerCard = cpuCard = null;
    let swept = 0;
    const after = () => {
      if (++swept < 2) return;
      if (G.matchToken !== token) return;
      updateHUD();
      if (G.player.hand.length === 0 || G.cpu.hand.length === 0) return endMatch();
      setTimeout(() => { if (G.matchToken === token) startRound(); }, 260);
    };
    if (winner === 'tie') {
      sweep(localP, pDest, after);
      sweep(localC, cDest, after);
    } else {
      // both cards fly out to the WINNER's side of the screen; mirrored spin +
      // a slight stagger keep them readable as two distinct cards.
      const sign = winner === 'player' ? -1 : 1;
      const dir = sideBySide ? new THREE.Vector3(sign, 0, 0)
                             : new THREE.Vector3(0, sign, 0);
      const winCard  = winner === 'player' ? localP : localC;
      const loseCard = winner === 'player' ? localC : localP;
      flyOut(winCard,  dir, { spin:  0.9, delay: 0 },   after);
      flyOut(loseCard, dir, { spin: -1.2, delay: 70 },  after);
    }
  }

  function endMatch() {
    G.phase = 'gameover';
    syncStatControls();
    const youWon = G.player.hand.length > 0;
    setHint(youWon ? '🏆 You win the match!  Press R to play again'
                   : '💻 CPU wins the match.  Press R to play again');
    announce(youWon
      ? `You win the match with ${G.player.hand.length} cards. Press R to play again.`
      : `CPU wins the match. Press R to play again.`);
    if (youWon) {
      // celebratory double burst from the upper play area + globe arc flourish
      confettiBurst(new THREE.Vector3(-1.4, 1.6, 0.8), 130, 3.4);
      confettiBurst(new THREE.Vector3( 1.4, 1.6, 0.8), 130, 3.4);
      setTimeout(() => { confettiBurst(new THREE.Vector3(0, 2.0, 0.8), 100, 3.8); }, 240);
      globeBurst(16);
      fxKick(1.3);
    }
  }

  /* ---- input: stat picking (1–6) + restart (R) ------------------------- */
  window.addEventListener('keydown', (e) => {
    if (/^[1-6]$/.test(e.key)) {
      if (G.phase === 'picking' && G.turn === 'player') {
        const s = STATS[parseInt(e.key, 10) - 1];
        if (s) playerPicksStat(s.key);
      }
    } else if (e.key === 'r' || e.key === 'R') {
      if (G.phase === 'gameover' || G.phase === 'picking') startMatch();
    }
  });

  /* ---- Phase 3: pointer picking via raycast --------------------------- */
  const raycaster = new THREE.Raycaster();
  const ndc = new THREE.Vector2();
  const canPick = () => G.phase === 'picking' && G.turn === 'player'
      && playerCard && playerCard.userData.faceUp && !playerCard.userData.flipping;

  function rowFromEvent(e) {
    if (!canPick()) return -1;
    const r = canvas.getBoundingClientRect();
    ndc.x = ((e.clientX - r.left) / r.width) * 2 - 1;
    ndc.y = -((e.clientY - r.top) / r.height) * 2 + 1;
    raycaster.setFromCamera(ndc, camera);
    const hit = raycaster.intersectObject(playerCard.userData.front, false)[0];
    return (hit && hit.uv) ? rowFromUV(hit.uv) : -1;
  }

  canvas.addEventListener('pointermove', (e) => {
    if (!canPick()) { canvas.style.cursor = 'default'; return; }
    const idx = rowFromEvent(e);
    if (idx >= 0) { showHover(playerCard, idx); canvas.style.cursor = 'pointer'; }
    else          { clearHover(playerCard);     canvas.style.cursor = 'default'; }
  });
  canvas.addEventListener('pointerleave', () => { if (playerCard) clearHover(playerCard); canvas.style.cursor = 'default'; });
  canvas.addEventListener('pointerdown', (e) => {
    const idx = rowFromEvent(e);
    if (idx >= 0) { clearHover(playerCard); playerPicksStat(STATS[idx].key); }
  });

  /* ---- Phase 3: accessible stat controls (one-way mirror of G, G2/G5) --
     Six always-present focusable buttons; labels track the player's current
     card so a screen-reader user hears the values, and they enable only on
     the player's picking turn. They never own or mutate any mesh. */
  const statControls = document.getElementById('stat-controls');
  const statButtons = STATS.map((s, i) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.dataset.key = s.key;
    b.addEventListener('click', () => {
      if (G.phase === 'picking' && G.turn === 'player') playerPicksStat(s.key);
    });
    statControls.appendChild(b);
    return b;
  });
  function syncStatControls() {
    const active = G.phase === 'picking' && G.turn === 'player' && G.player.hand[0];
    const card = active ? G.player.hand[0] : null;
    STATS.forEach((s, i) => {
      const b = statButtons[i];
      const val = card ? String(s.fmt(card.stats[s.key])).replace(/<[^>]*>/g, '') : '';
      b.textContent = card
        ? `Play ${s.label}: ${val} (press ${i + 1})`
        : `${s.label} (unavailable)`;
      b.disabled = !active;
    });
  }

  /* test-only observation hook (does not own or mutate meshes) */
  if (new URLSearchParams(location.search).get('debug') === '1') {
    window.__pure = {
      status: () => ({ phase: G.phase, turn: G.turn, round: G.round,
                       you: G.player.hand.length, cpu: G.cpu.hand.length,
                       pot: G.pot.length }),
      pick: (n) => {
        if (G.phase === 'picking' && G.turn === 'player') {
          const s = STATS[n - 1]; if (s) playerPicksStat(s.key);
        }
      },
      // project a stat row's world point to client px, so tests can dispatch a
      // real pointer event there and exercise the full raycast pick pipeline.
      screenForRow: (idx) => {
        if (!playerCard) return null;
        const local = new THREE.Vector3(0, texYToLocal(rowMidPx(idx)), 0.02);
        const world = playerCard.localToWorld(local.clone());
        const p = world.project(camera);
        const r = canvas.getBoundingClientRect();
        return { x: r.left + (p.x * 0.5 + 0.5) * r.width,
                 y: r.top  + (-p.y * 0.5 + 0.5) * r.height };
      },
      // controls mirror snapshot (labels + disabled) for a11y verification
      controls: () => statButtons.map(b => ({ text: b.textContent, disabled: b.disabled }))
    };
  }

  /* ---- resize --------------------------------------------------------- */
  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    // updateStyle MUST be true: on high-DPR displays (Windows scaling > 100%)
    // the drawing buffer is w·DPR px; without pinning the canvas CSS size back
    // to w×h the oversized canvas anchors top-left and the scene shifts right +
    // down, clipping. Passing true makes Three.js set canvas.style.width/height.
    renderer.setSize(w, h, true);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    resizePostFx();
    layoutTable(camera.aspect);
    fitCamera();
    // if an orientation change happened between rounds, snap idle cards to the
    // new slots so they don't sit at stale positions until the next spawn.
    if (playerCard && !playerCard.userData.flipping) placeCard(playerCard, PLAYER_SLOT, playerCard.userData.faceUp);
    if (cpuCard    && !cpuCard.userData.flipping)    placeCard(cpuCard,    CPU_SLOT,    cpuCard.userData.faceUp);
  }
  window.addEventListener('resize', resize);
  resize();

  /* ---- single render loop (G3: one renderer, one loop, one context) ---
     Includes a downgrade-only perf governor: if smoothed fps stays low it
     first drops the pixel ratio to 1, then disables post-fx. It never upgrades
     (avoids oscillation) and never touches flip/game logic. ?fps=1 shows a HUD. */
  const _showFps = new URLSearchParams(location.search).get('fps') === '1';
  const _fpsEl = document.getElementById('fps');
  if (_showFps && _fpsEl) _fpsEl.style.display = 'block';
  let _prevMs = performance.now(), _fpsAvg = 60, _slowFrames = 0, _fpsSince = _prevMs, _govStep = 0;
  function frame() {
    stepTweens(performance.now());
    const et = clock.getElapsedTime();
    const dt = Math.min(0.05, et - _lastEt); _lastEt = et;
    updateBackdrop(et, dt);
    updateFoils(et);
    updateFoilFacing(playerCard);
    updateFoilFacing(cpuCard);
    // gentle idle float so the cards read as suspended in space
    floatCard(playerCard, et);
    floatCard(cpuCard, et);
    // subtle "breathing" on the pickable player card so it reads as active
    if (!REDUCED && playerCard && G.phase === 'picking' && G.turn === 'player'
        && !playerCard.userData.flipping && playerCard.userData.faceUp) {
      const s = 1 + Math.sin(et * 2.2) * 0.012;
      playerCard.scale.set(s, s, s);
    }
    updateShadow(playerCard);
    updateShadow(cpuCard);
    updateConfetti(dt);
    if (postFx.enabled) {
      _fxPulse = Math.max(0, _fxPulse - dt * 1.1);
      postFx.material.uniforms.uTime.value = et;
      postFx.material.uniforms.uPulse.value = _fxPulse;
      renderer.setRenderTarget(postFx.target);
      renderer.render(scene, camera);
      renderer.setRenderTarget(null);
      renderer.render(postFx.scene, postFx.camera);
    } else {
      renderer.render(scene, camera);
    }
    // perf governor + fps HUD (downgrade only; never touches game logic)
    const _nowMs = performance.now();
    const _frameMs = _nowMs - _prevMs; _prevMs = _nowMs;
    if (_frameMs > 0 && _frameMs < 500) {
      _fpsAvg += ((1000 / _frameMs) - _fpsAvg) * 0.1;
      if (_fpsAvg < 42) _slowFrames++; else _slowFrames = Math.max(0, _slowFrames - 2);
      if (_slowFrames > 90) {
        _slowFrames = 0;
        if (_govStep === 0 && renderer.getPixelRatio() > 1.01) {
          renderer.setPixelRatio(1); resizePostFx(); _govStep = 1;
        } else if (postFx.enabled) {
          postFx.enabled = false; _govStep = 2;
        }
      }
    }
    if (_showFps && _fpsEl && _nowMs - _fpsSince > 250) {
      _fpsSince = _nowMs;
      _fpsEl.textContent = `${_fpsAvg.toFixed(0)} fps\ndpr ${renderer.getPixelRatio().toFixed(2)}  fx ${postFx.enabled ? 'on' : 'off'}`;
    }
    requestAnimationFrame(frame);
  }

  /* ---- boot ----------------------------------------------------------- */
  async function boot() {
    const loading = document.getElementById('loading');
    const lmsg    = document.getElementById('loading-msg');
    try {
      const res = await fetch('data/cards.json', { cache: 'no-cache' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      G.data = await res.json();
    } catch (err) {
      loading.classList.add('err');
      lmsg.innerHTML = `Failed to load deck.<br><code>${err.message}</code>`;
      return;
    }
    loading.classList.add('gone');
    requestAnimationFrame(frame);
    startMatch();
  }
  boot();
  </script>
</body>
</html>
