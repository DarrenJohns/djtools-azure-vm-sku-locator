        float ca = cos(ang), sa = sin(ang);
        pc = mat2(ca, -sa, sa, ca) * pc;
        float d = length(pc);
        float env = smoothstep(0.5, 0.0, d);                 // soft round envelope
        env = pow(env, 1.5);                                  // soften the core so it isn't a solid disc
        vec2  np  = pc * 4.6 + vec2(vSeed * 23.0, vSeed * 11.0) + uTime * 0.15;
        float n   = fbm(np);                                  // turbulent density
        float dens = env * (0.04 + 1.35 * n);                // hard erosion → torn wisps + holes
        float m = smoothstep(0.16, 0.62, dens);
        if (m <= 0.002) discard;
        gl_FragColor = vec4(vCol, vA * m);
      }`
  });
  const dust = new THREE.Points(dustGeo, dustMat);
  dust.frustumCulled = false;
  dust.renderOrder = 26;                      // over cards, under the win glow
  scene.add(dust);
  // desaturated pale grey / dusty blue-white smoke tones
  const DUST_PALETTE = [0xb9c2cc, 0xa7b4c4, 0xd6dde6, 0x9fb0c6, 0xc7cdd4];
  let _dstNext = 0, _dstAlive = false;
  let _dstWarpBlend = 0;                          // eased warp handoff for dust fade/drain
  const _dCol = new THREE.Color();
  function dustEmit(pos, backDir, n = 3) {
    if (_reducedInit || !FEAT.smoke || _bgWarpNow > 0.55) return;   // off when toggled off, or once warp is up
    for (let k = 0; k < n; k++) {
      const i = _dstNext; _dstNext = (_dstNext + 1) % DUST_MAX;
      // tight around the card so the puffs read as one smoke ribbon, not a broadside cloud
      _dstPos[i*3]   = pos.x + (Math.random() - 0.5) * 0.34;
      _dstPos[i*3+1] = pos.y + (Math.random() - 0.5) * 0.42;
      _dstPos[i*3+2] = pos.z + (Math.random() - 0.5) * 0.26;
      // stream backward (opposite the card's exit) with only gentle broadside curl → a trailing wisp
      const sp = 0.7 + Math.random() * 1.2;
      _dstVel[i*3]   = backDir.x * sp + (Math.random() - 0.5) * 0.70;
      _dstVel[i*3+1] = backDir.y * sp + (Math.random() - 0.5) * 0.70 + 0.12;
      _dstVel[i*3+2] = backDir.z * sp + (Math.random() - 0.5) * 0.45 - 0.22;  // trail slightly away from camera
      const life = 0.85 + Math.random() * 0.65;
      _dstLife[i] = life; _dstMax[i] = life;
      _dstSeed[i] = 40 + Math.random() * 42;
      _dstNz[i]   = Math.random();
      _dCol.setHex(DUST_PALETTE[(Math.random() * DUST_PALETTE.length) | 0]);
      _dstCol[i*3] = _dCol.r; _dstCol[i*3+1] = _dCol.g; _dstCol[i*3+2] = _dCol.b;
      _dstSize[i]  = _dstSeed[i] * 0.55;
      _dstAlpha[i] = 0;
    }
    dustGeo.attributes.aColor.needsUpdate = true;
    dustGeo.attributes.aSeed.needsUpdate = true;
    _dstAlive = true;
  }
  let _dstT = 0;
  function updateDust(dt) {
    if (!_dstAlive) return;
    dt = Math.min(dt, 0.05);
    _dstT += dt; dustMat.uniforms.uTime.value = _dstT;
    // Smoothly hand off from smoke trail to warp: as warp rises, smoke fades and
    // dissipates faster instead of snapping against the warp onset.
    const warpNow = Math.min(1, Math.max(0, _bgWarpNow));
    _dstWarpBlend += (warpNow - _dstWarpBlend) * Math.min(1, dt * 10);
    const warpFade = _dstWarpBlend <= 0.35 ? 1 : Math.max(0, 1 - (_dstWarpBlend - 0.35) / 0.65);
    const lifeDrain = 1 + _dstWarpBlend * 2.6;
    let any = false;
    for (let i = 0; i < DUST_MAX; i++) {
      if (_dstLife[i] <= 0) { if (_dstAlpha[i] !== 0) _dstAlpha[i] = 0; continue; }
      any = true;
      _dstLife[i] -= dt * lifeDrain;
      // air drag so puffs slow and settle (no gravity — space)
      _dstVel[i*3]   *= (1 - 0.95 * dt);
      _dstVel[i*3+1] *= (1 - 0.95 * dt);
      _dstVel[i*3+2] *= (1 - 0.95 * dt);
      _dstPos[i*3]   += _dstVel[i*3]   * dt;
      _dstPos[i*3+1] += _dstVel[i*3+1] * dt;
      _dstPos[i*3+2] += _dstVel[i*3+2] * dt;
      // p: 0→1 over the puff's life; billow (grow) while fading in-then-out
      const p = 1 - Math.max(0, _dstLife[i]) / _dstMax[i];
      _dstSize[i]  = _dstSeed[i] * (0.55 + p * 1.9);
      _dstAlpha[i] = Math.sin(Math.min(1, p) * Math.PI) * 0.42 * warpFade;
    }
    dustGeo.attributes.position.needsUpdate = true;
    dustGeo.attributes.aSize.needsUpdate    = true;
    dustGeo.attributes.aAlpha.needsUpdate   = true;
    if (!any) _dstAlive = false;              // all spent → skip work next frame
  }

  /* ---- post-fx composite (Phase 5d) — vignette, grain, low chromatic
     aberration, selective (luma-gated) bloom + a win-flash pulse. Cards are
     mid-tone so the high bloom threshold leaves their text crisp; only the
     luminous globe / foil / win-glow rim bloom. Off under reduced-motion or
     ?nofx=1, and self-disables on any GL error. ------------------------- */
  const postFx = (() => {
    const off = _reducedInit || new URLSearchParams(location.search).get('nofx') === '1';
    if (off) return { enabled: false };
    const target = new THREE.WebGLRenderTarget(16, 16, {
      format: THREE.RGBAFormat, type: THREE.UnsignedByteType,
      depthBuffer: true, stencilBuffer: false,
      // MSAA on the offscreen buffer: the renderer's antialias:true only smooths
      // the default canvas framebuffer, which the post-fx path bypasses by
      // rendering the scene into this target first. Without samples the card
      // edges alias badly against the dark backdrop. WebGL2 multisamples the
      // target and resolves on read, restoring smooth edges through the post-fx.
      samples: 4
    });
    target.texture.colorSpace = THREE.SRGBColorSpace;
    target.texture.generateMipmaps = false;
    target.texture.minFilter = THREE.LinearFilter;
    target.texture.magFilter = THREE.LinearFilter;
    const fxScene = new THREE.Scene();
    const fxCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    const mat = new THREE.ShaderMaterial({
      depthWrite: false, depthTest: false, toneMapped: false,
      uniforms: {
        uTex:        { value: target.texture },
        uTime:       { value: 0 },
        uResolution: { value: new THREE.Vector2(1, 1) },
        uVignette:   { value: 0.20 },
        uGrain:      { value: 0.014 },
        uAberration: { value: 0.0006 },
        uBloomBase:  { value: 0.06 },
        uPulse:      { value: 0 },
        uFlashColor: { value: new THREE.Vector3(0.62, 0.84, 1.0) }
      },
      vertexShader: `
        varying vec2 vUv;
        void main(){ vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`,
      fragmentShader: `
        precision highp float;
        varying vec2 vUv;
        uniform sampler2D uTex;
        uniform float uTime, uVignette, uGrain, uAberration, uBloomBase, uPulse;
        uniform vec2 uResolution;
        uniform vec3 uFlashColor;
        float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
        void main(){
          vec2 uv = vUv;
          vec2 c = uv - 0.5;
          float r = length(c);
          // low chromatic aberration, stronger toward the edges + on win pulse
          float ca = uAberration * (1.0 + uPulse * 1.4) * smoothstep(0.0, 0.85, r);
          vec2 dir = r > 1e-4 ? c / r : vec2(0.0);
          vec3 col;
          col.r = texture2D(uTex, uv + dir * ca).r;
          col.g = texture2D(uTex, uv).g;
          col.b = texture2D(uTex, uv - dir * ca).b;
          // selective bloom: only high-luma pixels contribute, so card text stays sharp
          float luma = dot(col, vec3(0.2126, 0.7152, 0.0722));
          float amt = uBloomBase + uPulse * 0.10;
          if (amt > 1e-4) {
            vec2 px = 1.0 / uResolution;
            vec2 o1 = px * (2.0 + 6.0 * amt);
            vec2 o2 = px * (5.0 + 15.0 * amt);
            vec3 inner = (texture2D(uTex, uv + vec2( o1.x, 0.0)).rgb
                        + texture2D(uTex, uv + vec2(-o1.x, 0.0)).rgb
                        + texture2D(uTex, uv + vec2(0.0,  o1.y)).rgb
                        + texture2D(uTex, uv + vec2(0.0, -o1.y)).rgb) * 0.25;
            vec3 outer = (texture2D(uTex, uv + o2).rgb
                        + texture2D(uTex, uv - o2).rgb
                        + texture2D(uTex, uv + vec2( o2.x, -o2.y)).rgb
                        + texture2D(uTex, uv + vec2(-o2.x,  o2.y)).rgb) * 0.25;
            float bright = smoothstep(0.70, 0.98, luma);
            col += mix(inner, outer, 0.55) * bright * amt * 1.2;
          }
          // win flash — a gentle mid-radius wash of the accent colour
          float band = smoothstep(0.10, 0.80, r) * (1.0 - smoothstep(0.60, 1.0, r));
          col += uFlashColor * (uPulse * band * 0.16);
          // vignette
          col *= 1.0 - smoothstep(0.28, 0.98, r) * uVignette;
          // fine film grain
          float n = hash(uv * uResolution + vec2(fract(uTime * 0.37), fract(uTime * 0.61))) - 0.5;
          col += n * uGrain;
          gl_FragColor = vec4(col, 1.0);
        }`
    });
    fxScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat));
    return { enabled: true, target, scene: fxScene, camera: fxCam, material: mat };
  })();
  let _fxPulse = 0;                                  // decays each frame
  function fxKick(amount = 1) { if (postFx.enabled) _fxPulse = Math.min(1.3, _fxPulse + amount); }
  function resizePostFx() {
    if (!postFx.enabled) return;
    const w = Math.max(1, Math.floor(renderer.domElement.width));
    const h = Math.max(1, Math.floor(renderer.domElement.height));
    postFx.target.setSize(w, h);
    postFx.material.uniforms.uResolution.value.set(w, h);
  }

  function texFromCanvas(cv) {
    const t = new THREE.CanvasTexture(cv);
    t.colorSpace = THREE.SRGBColorSpace;
    t.anisotropy = renderer.capabilities.getMaxAnisotropy();
    t.needsUpdate = true;
    return t;
  }

  function refreshCardBackTexture(cardG, backCv) {
    if (!cardG || !cardG.userData.back) return;
    const backMat = cardG.userData.back.material;
    const oldBackTex = cardG.userData.backTex;
    const newBackTex = texFromCanvas(backCv || art.bakeBack());
    cardG.userData.backTex = newBackTex;
    backMat.map = newBackTex;
    backMat.emissiveMap = newBackTex;
    backMat.needsUpdate = true;
    if (oldBackTex) oldBackTex.dispose();
  }

  /* One card = one Group with a front plane (+Z) and a back plane (−Z).
     Flipping the Group around Y swaps which face the camera sees. This is
     the single owner: there is no DOM twin, no proxy, no separate context. */
  function makeCard(card) {
    const g = new THREE.Group();
    g.userData.card = card;

    const frontTex = texFromCanvas(art.bakeFront(card));
    const backTex  = texFromCanvas(art.bakeBack());
    g.userData.frontTex = frontTex;
    g.userData.backTex  = backTex;

    // Lit materials (Phase 4). The baked art is the albedo AND an emissive map
    // at a fixed floor, so the surface responds to the light rig (gradient on
    // tilt/flip = depth) but can never render darker than emissiveIntensity ·
    // texel — structurally preserving the "backs/faces never go dark" invariant
    // that MeshBasic gave us for free. roughness high / metalness 0 = paper-like.
    const mkMat = (map) => new THREE.MeshStandardMaterial({
      map, emissive: 0xffffff, emissiveMap: map, emissiveIntensity: 0.34,
      roughness: 0.86, metalness: 0.0, transparent: true
    });
    const frontMat = mkMat(frontTex);
    const backMat  = mkMat(backTex);

    const front = new THREE.Mesh(cardGeo, frontMat);
    const back  = new THREE.Mesh(cardGeo, backMat);
    back.rotation.y = Math.PI;               // face −Z
    // nudge apart to avoid z-fighting between the two coplanar faces
    front.position.z =  0.006;
    back.position.z  = -0.006;

    g.add(front, back);
    g.userData.front = front;
    g.userData.back  = back;

    // rarity foil: child of the front face so it flips/tilts with it and is
    // culled when the back shows. Its facing uniform is refreshed each frame.
    const foil = makeFoil(card.rarity);
    if (foil) { front.add(foil); g.userData.foil = foil; }

    // gloss sheen: child of the back face so it flips with it and is culled
    // when the front shows. Gives the (otherwise flat) back a moving highlight.
    const backSheen = makeBackSheen();
    back.add(backSheen); g.userData.backSheen = backSheen;

    g.userData.setOpacity = (o) => {
      frontMat.opacity = o; backMat.opacity = o;
      if (foil) foil.material.uniforms.uIntensity.value = (FOIL_INTENSITY[card.rarity] || 0) * o;
      backSheen.material.uniforms.uIntensity.value = o;
    };
    g.userData.dispose = () => {
      if (g.userData.hl)    { g.userData.hl.material.dispose(); }
      if (g.userData.hover) { g.userData.hover.material.dispose(); }
      if (g.userData.winGlow) { _winGlows.delete(g.userData.winGlow.material); g.userData.winGlow.material.dispose(); }
      if (foil) { foils.delete(foil.material); foil.material.dispose(); }
      backSheens.delete(backSheen.material); backSheen.material.dispose();
      if (g.userData.frontTex) g.userData.frontTex.dispose();
      if (g.userData.backTex)  g.userData.backTex.dispose();
      frontMat.dispose(); backMat.dispose();
    };
    return g;
  }

  /* ---- tween manager: flips are pure functions of eased t (G4) --------
     Because every animated property is written as f(ease(t)) with the same
     value at t=0 and t=1 as its resting state, there is no settle-snap and
     no seam between "animating" and "idle". */
  const tweens = new Set();
  const easeInOut = t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3)/2;
  const easeIn    = t => t*t*t;                       // accelerate outward (fly-out)
  const easeOut   = t => 1 - Math.pow(1 - t, 3);      // decelerate into rest (zoom-in)

  /* honour prefers-reduced-motion: collapse animation durations to ~instant
     (G5). md() floors at 1ms so tweens still complete cleanly next frame. */
  const _rmq = window.matchMedia('(prefers-reduced-motion: reduce)');
  let REDUCED = _rmq.matches;
  _rmq.addEventListener('change', (e) => { REDUCED = e.matches; });
  const md = (ms) => REDUCED ? 1 : ms;

  function tween({ dur = 600, ease = easeInOut, update, done, tag = null }) {
    const tw = { t0: performance.now(), dur, ease, update, done, tag };
    tweens.add(tw);
    return tw;
  }
  function cancelTweensWithTag(tag) {
    for (const tw of tweens) {
      if (tw.tag === tag) {
        tweens.delete(tw);
        // fire the done callback so cleanup runs
        if (tw.done) tw.done();
      }
    }
  }
  function stepTweens(now) {
    for (const tw of tweens) {
      const t = Math.min(1, (now - tw.t0) / tw.dur);
      tw.update(tw.ease(t), t);
      if (t >= 1) { tweens.delete(tw); tw.done && tw.done(); }
    }
  }

  /* A flip is ONE rotation tween on ONE object. Lift + scale bump both
     return to zero at the endpoints, so the card lands exactly on its rest
     transform with no pop. faceUp is the *target* state. */
  function flipCard(g, faceUp, dur = 620, onDone) {
    if (g.userData.flipping) { onDone && onDone(); return; }
    if (g.userData.faceUp === faceUp) { onDone && onDone(); return; }
    g.userData.flipping = true;
    dur = md(dur);
    // Front plane faces +Z, so rotation.y = 0 shows the front (face up) and
    // rotation.y = π shows the back (face down).
    const from = g.userData.faceUp ? 0 : Math.PI;
    const to   = faceUp ? 0 : Math.PI;
    const baseZ = g.userData.baseZ || 0;
    tween({
      dur,
      update: (e) => {
        g.rotation.y = from + (to - from) * e;
        const arc = Math.sin(e * Math.PI);        // 0→1→0 across the flip
        g.position.z = baseZ + arc * 0.9;         // lift toward camera mid-flip
        const s = 1 + arc * 0.06;                 // subtle scale bump
        g.scale.set(s, s, s);
      },
      done: () => {
        g.rotation.y = to;
        g.position.z = baseZ;
        g.scale.set(1, 1, 1);
        g.userData.faceUp = faceUp;
        g.userData.flipping = false;
        onDone && onDone();
      }
    });
  }

  /* ---- a11y one-way mirror (never an animation owner) ------------------ */
  const a11y = document.getElementById('a11y');
  function announce(msg) { if (a11y) a11y.textContent = msg; }

  /* ---- shared card layout constants (baker-derived) -------------------
     Both the reveal highlight (below) and Phase-3 raycast picking map stat
     rows using THESE numbers, so they can never drift from the baked art. */
  const TEX_H     = art.H;                         // 2000
  const STATS_Y0  = 870, STATS_Y1 = 1630;          // stat-band top/bottom in tex px
  const ROW_H_PX  = (STATS_Y1 - STATS_Y0) / STATS.length;
  // texture-pixel Y → card-local Y (texture top = card top = +CARD_H/2)
  const texYToLocal = (py) => CARD_H / 2 - (py / TEX_H) * CARD_H;
  const rowMidPx    = (i)  => STATS_Y0 + (i + 0.5) * ROW_H_PX;

  /* reveal highlight — an additive quad parented to the card group. It faces
     +Z, so it is back-face-culled (invisible) while the card is face-down and
     only shows once the front is toward the camera. Single owner: it rides the
     card's own transform, it is not a second card. */
  const HL_GEO = new THREE.PlaneGeometry(CARD_W * 0.9, (ROW_H_PX / TEX_H) * CARD_H);
  const HL = { pick: 0xf5c542, win: 0x37d67a, lose: 0xef5350, tie: 0xffb300 };
  function showPick(cardG, idx, colorHex, opacity = 0.55) {
    let m = cardG.userData.hl;
    if (!m) {
      m = new THREE.Mesh(HL_GEO, new THREE.MeshBasicMaterial({
        transparent: true, opacity: 0, blending: THREE.AdditiveBlending,
        depthWrite: false, toneMapped: false
      }));
      m.position.z = 0.02;
      cardG.add(m);
      cardG.userData.hl = m;
    }
    m.material.color.setHex(colorHex);
    m.position.y = texYToLocal(rowMidPx(idx));
    // ease opacity in
    tween({ dur: md(220), update: (e) => { m.material.opacity = opacity * e; },
            done: () => { m.material.opacity = opacity; } });
  }
  function clearPick(cardG) {
    const m = cardG && cardG.userData.hl;
    if (m) m.material.opacity = 0;
  }

  /* ---- Phase 3: UV → stat-row hit test + hover highlight ---------------
     Picking reuses the SAME baker-derived bands as the reveal highlight, so
     the hit target can never drift from what the player sees. A PlaneGeometry
     UV runs u:0→1 left→right, v:0→1 bottom→top; texture Y is top-down. */
  function rowFromUV(uv) {
    const texY = (1 - uv.y) * TEX_H;
    if (texY < STATS_Y0 || texY > STATS_Y1) return -1;
    const idx = Math.floor((texY - STATS_Y0) / ROW_H_PX);
    return (idx >= 0 && idx < STATS.length) ? idx : -1;
  }
  // soft, instant hover band on the player card (tracks the pointer 1:1)
  function showHover(cardG, idx) {
    let m = cardG.userData.hover;
    if (!m) {
      m = new THREE.Mesh(HL_GEO, new THREE.MeshBasicMaterial({
        color: 0x9fd0ff, transparent: true, opacity: 0,
        blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false
      }));
      m.position.z = 0.018;
      cardG.add(m);
      cardG.userData.hover = m;
    }
    m.position.y = texYToLocal(rowMidPx(idx));
    m.material.opacity = 0.32;
  }
  function clearHover(cardG) {
    const m = cardG && cardG.userData.hover;
    if (m) m.material.opacity = 0;
  }

  /* ---- table: single owner of the two in-play card meshes -------------- */
  const tableGroup = new THREE.Group();
  tableGroup.rotation.x = -0.08;                   // gentle recline → depth without overlap
  scene.add(tableGroup);

  const PLAYER_SLOT = new THREE.Vector3(0, -1.82, 0);
  const CPU_SLOT    = new THREE.Vector3(0,  1.82, 0);
  const PLAYER_PILE = new THREE.Vector3(0, -5.6, 0.5);
  const CPU_PILE    = new THREE.Vector3(0,  5.6, 0.5);

  /* Layout is responsive to the viewport shape:
       • landscape (wide) → cards SIDE BY SIDE (you left, CPU right) so their
         stat rows line up for easy comparison and the wide space is used well.
       • portrait / tall  → cards STACKED (you bottom, CPU top).
     layoutTable() mutates the slot/pile vectors in place; fitCamera() reads the
     live slot positions so framing always matches the current orientation. */
  let sideBySide = true;
  function layoutTable(aspect) {
    sideBySide = aspect >= 1.05;
    if (sideBySide) {
      const dx = CARD_W / 2 + 0.30;                 // half-gap between the two cards
      PLAYER_SLOT.set(-dx, 0, 0);
      CPU_SLOT.set(   dx, 0, 0);
      PLAYER_PILE.set(-(dx + CARD_W * 1.4), 0, 0.5);
      CPU_PILE.set(    (dx + CARD_W * 1.4), 0, 0.5);
    } else {
      const dy = CARD_H / 2 - 0.21;                 // half-gap, slight overlap of margins
      PLAYER_SLOT.set(0, -dy, 0);
      CPU_SLOT.set(   0,  dy, 0);
      PLAYER_PILE.set(0, -(dy + CARD_H * 1.2), 0.5);
      CPU_PILE.set(   0,  (dy + CARD_H * 1.2), 0.5);
    }
  }

  /* Responsive framing: pull the camera back just far enough that the whole
     two-card group (plus margin) fits the viewport at ANY aspect ratio and in
     either orientation, so the cards never clip or drift off-centre.

     The table is reclined about X (see tableGroup.rotation.x). Under
     perspective this makes the near card project LARGER and reach further
     toward the viewport edge than a flat measure predicts, so the vertical fit
     needs extra headroom. We add a recline-aware fudge + generous margins. */
  // Margins are widened (×1.25) to offset the 20%-smaller cards: fitCamera frames
  // to the card span, so without this the camera would just dolly closer and cancel
  // the size reduction. Holding the distance keeps the cards genuinely smaller in
  // frame, showing off more of the background.
  const FIT_MARGIN_H = 1.48;                        // vertical breathing room
  const FIT_MARGIN_W = 1.43;                        // horizontal breathing room
  function fitCamera() {
    const aspect = camera.aspect;
    const half = THREE.MathUtils.degToRad(camera.fov) / 2;
    const tan = Math.tan(half);
    const recline = Math.abs(tableGroup.rotation.x || 0);
    // world extents to cover, derived from the LIVE slot positions
    const spanX = Math.abs(CPU_SLOT.x - PLAYER_SLOT.x) + CARD_W;
    const spanY = (Math.abs(CPU_SLOT.y - PLAYER_SLOT.y) + CARD_H) * (1 + recline * 0.9);
    const needH = spanY * FIT_MARGIN_H;
    const needW = spanX * FIT_MARGIN_W;
    // distance so the vertical extent fits, and so the horizontal extent fits
    const dForH = (needH / 2) / tan;
    const dForW = (needW / 2) / (tan * aspect);
    const d = Math.max(dForH, dForW);
    camera.position.set(0, 0.15, d);
    camera.lookAt(0, 0, 0);
    _camBaseY = 0.15; _camBaseZ = d;      // dolly-in offsets from this rest pose
  }
  // camera dolly ("forward flight") state — see dollyIn()
  let _camDolly = 0, _warpHold = 0, _camBaseY = 0.15, _camBaseZ = 8.4, _warpPin = null;

  // user camera peek: drag the background to orbit slightly around the scene
  // centre; release springs back to the centred rest pose. `*T` are the drag
  // targets, the bare vars are the eased values applied each frame.
  let _orbYaw = 0, _orbPitch = 0, _orbYawT = 0, _orbPitchT = 0;
  let _orbDrag = false, _orbPX = 0, _orbPY = 0, _orbId = null;
  const ORB_MAX_YAW = 0.26, ORB_MAX_PITCH = 0.16, ORB_SENS = 0.0024;   // ~15°/~9°, rad per px
  const _AXIS_Y = new THREE.Vector3(0, 1, 0), _AXIS_X = new THREE.Vector3(1, 0, 0);
  const _camTmp = new THREE.Vector3();                                  // reused — no per-frame alloc

  let playerCard = null, cpuCard = null;
  // If the Azure logo finishes loading after a back texture was baked, re-bake and
  // swap the live card-back textures so the center "A" appears deterministically.
  art.onBackRefresh(() => {
    const backCv = art.bakeBack();
    refreshCardBackTexture(playerCard, backCv);
    refreshCardBackTexture(cpuCard, backCv);
  });

  /* ---- soft contact shadow (Phase 4) ---------------------------------
     A blurred radial blob that sits on the table BEHIND each card (never a
     child of the card group, so it doesn't flip with it). It tracks the card's
     x/y each frame and grows + softens as the card lifts toward the camera,
     grounding the lift. Cheap (one textured quad), no shadow-map pass. */
  const shadowTex = (() => {
    const s = 256, cv = document.createElement('canvas'); cv.width = cv.height = s;
    const c = cv.getContext('2d');
    const g = c.createRadialGradient(s/2, s/2, 6, s/2, s/2, s/2);
    g.addColorStop(0.0, 'rgba(0,0,0,0.55)');
    g.addColorStop(0.55, 'rgba(0,0,0,0.28)');
    g.addColorStop(1.0, 'rgba(0,0,0,0.0)');
    c.fillStyle = g; c.fillRect(0, 0, s, s);
    const t = new THREE.CanvasTexture(cv);
    t.colorSpace = THREE.SRGBColorSpace;
    return t;
  })();
  const shadowGeo = new THREE.PlaneGeometry(CARD_W * 1.16, CARD_H * 1.16);
  function makeShadow() {
    const m = new THREE.Mesh(shadowGeo, new THREE.MeshBasicMaterial({
      map: shadowTex, transparent: true, opacity: 0.4, depthWrite: false, toneMapped: false
    }));
    tableGroup.add(m);
    return m;
  }
  function updateShadow(cardG) {
    const sh = cardG && cardG.userData.shadow;
    if (!sh) return;
    if (cardG.userData.entering) { sh.material.opacity = 0; return; }
    const baseZ = cardG.userData.baseZ || 0;
    const lift = Math.max(0, Math.min(1, (cardG.position.z - baseZ) / 0.9));
    // sit slightly below-and-behind the card on the reclined table
    sh.position.set(cardG.position.x, cardG.position.y - 0.06, baseZ - 0.06);
    const cardScale = cardG.scale.x || 1;
    const spread = (1 + lift * 0.34) * cardScale;
    sh.scale.set(spread, spread, 1);
    const faceOpacity = cardG.userData.front ? cardG.userData.front.material.opacity : 1;
    sh.material.opacity = (0.42 - lift * 0.22) * faceOpacity;
  }

  /* ---- idle float: cards gently hang in space ------------------------
     A soft, slow drift + tilt applied around each card's slot anchor so the
     pair reads as suspended, not pinned. Runs only while a card is the live
     top card and NOT mid-flip (flip owns z-lift/scale/rot.y). Written as an
     absolute transform from the anchor each frame, so fly-out/sweep — which
     read the card's current position as their start — pick up seamlessly. */
  function floatCard(cardG, et) {
    if (!cardG || cardG.userData.flipping || cardG.userData.entering || REDUCED) return;
    const a = cardG.userData.baseSlot; if (!a) return;
    const ph = cardG.userData.floatPhase || 0;
    cardG.position.set(
      a.x + Math.sin(et * 0.62 + ph) * 0.055,
      a.y + Math.sin(et * 0.85 + ph * 1.3) * 0.075,
      (cardG.userData.baseZ || 0) + Math.sin(et * 0.50 + ph * 0.7) * 0.05
    );
    cardG.rotation.x = Math.sin(et * 0.72 + ph) * 0.030;
    cardG.rotation.z = Math.cos(et * 0.66 + ph * 1.1) * 0.026;
  }

  function placeCard(cardG, slot, faceUp) {
    cardG.position.copy(slot);
    cardG.userData.baseZ = slot.z;
    cardG.userData.baseSlot = slot.clone();   // float anchor (re-set on resize)
    cardG.userData.faceUp = faceUp;
    cardG.rotation.y = faceUp ? 0 : Math.PI;
  }

  function disposeCard(cardG) {
    if (!cardG) return;
    tableGroup.remove(cardG);
    const sh = cardG.userData.shadow;
    if (sh) { tableGroup.remove(sh); sh.material.dispose(); cardG.userData.shadow = null; }
    cardG.userData.dispose && cardG.userData.dispose();
  }

  /* slide a resolved card toward the winner's pile (or the pot centre on a
     tie), shrinking + fading, then dispose. Pure function of eased t (G4). */
  function sweep(cardG, dest, done) {
    const from = cardG.position.clone();
    tween({
      dur: md(460),
      update: (e) => {
        cardG.position.lerpVectors(from, dest, e);
        const s = 1 - 0.45 * e;
        cardG.scale.set(s, s, s);
        cardG.userData.setOpacity(1 - e);
      },
      done: () => { disposeCard(cardG); done && done(); }
    });
  }

  /* fly a WON card dramatically off the winner's side of the screen: it
     accelerates outward (easeIn), whooshes toward the camera, spins about Z,
     then fades and disposes. `dir` is a unit exit direction; `spin`/`delay`
     let the pair read as two distinct cards. Start pose = the card's CURRENT
     (floated) transform, so there's no snap when the float hands off. */
  function flyOut(cardG, dir, { spin = 0, delay = 0, dist = 9 } = {}, done) {
    const launch = () => {
      const from = cardG.position.clone();
      const fromZ = cardG.rotation.z, fromX = cardG.rotation.x;
      const dest = from.clone().addScaledVector(dir, dist);
      const backDir = dir.clone().multiplyScalar(-1);   // puffs trail opposite the exit
      tween({
        dur: md(600),
        ease: easeIn,
        update: (e) => {
          cardG.position.x = from.x + (dest.x - from.x) * e;
          cardG.position.y = from.y + (dest.y - from.y) * e;
          cardG.position.z = from.z + Math.sin(e * Math.PI) * 0.9 + e * 0.6;  // whoosh toward camera
          cardG.rotation.z = fromZ + spin * e;
          cardG.rotation.x = fromX * (1 - e);
          const s = 1 + 0.14 * Math.sin(e * Math.PI) - 0.10 * e;
          cardG.scale.set(s, s, s);
          cardG.userData.setOpacity(e < 0.62 ? 1 : Math.max(0, 1 - (e - 0.62) / 0.38));
          // kick up a dust/smoke puff trail while the card is still substantial
          if (e < 0.8) dustEmit(cardG.position, backDir, 4);
        },
        done: () => { disposeCard(cardG); done && done(); }
      });
    };
    if (delay > 0 && !REDUCED) setTimeout(launch, delay); else launch();
  }

  /* ---- HUD ------------------------------------------------------------- */
  const elYou  = document.getElementById('you-count');
  const elCpu  = document.getElementById('cpu-count');
  const elHint = document.getElementById('hint');
  function updateHUD() {
    elYou.textContent = G.player.hand.length;
    elCpu.textContent = G.cpu.hand.length;
  }
  function setHint(msg) { if (elHint) elHint.textContent = msg; }

  /* ---- Continue pause: hand round pacing to the player ------------------
     After a round resolves we pause with a Continue button (Space/Enter/click)
     so the player can read both cards before the next hand warps in — mirrors
     the original game's pacing. A safety countdown auto-advances if ignored,
     drawn as the thin progress bar inside the pill. `hideContinue` force-clears
     it (and resolves any pending wait) if the match restarts mid-pause. */
  const elContinue = document.getElementById('continue-btn');
  let _continueCleanup = null;
  function hideContinue() {
    if (_continueCleanup) { _continueCleanup(); return; }
    if (elContinue) { elContinue.classList.remove('show', 'is-paused'); elContinue.hidden = true; }
  }
  function waitForContinue(autoMs) {
    return new Promise((resolve) => {
      const btn = elContinue;
      if (!btn) { setTimeout(resolve, autoMs); return; }
      let done = false, remaining = autoMs, last = performance.now(), raf = 0;
      const finish = () => {
        if (done) return;
        done = true;
        cancelAnimationFrame(raf);
        document.removeEventListener('keydown', onKey, true);
        btn.removeEventListener('click', finish);
        btn.classList.remove('show', 'is-paused');
        btn.hidden = true;
        _continueCleanup = null;
        resolve();
      };
      const tick = () => {
        if (done) return;
        const now = performance.now();
        remaining -= (now - last); last = now;
        if (remaining <= 0) { finish(); return; }
        btn.style.setProperty('--progress', Math.max(0, remaining / autoMs * 100) + '%');
        raf = requestAnimationFrame(tick);
      };
      const onKey = (e) => {
        if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); e.stopPropagation(); finish(); }
      };
      _continueCleanup = finish;
      btn.hidden = false;
      btn.style.setProperty('--progress', '100%');
      requestAnimationFrame(() => { if (!done) btn.classList.add('show'); });
      btn.addEventListener('click', finish);
      document.addEventListener('keydown', onKey, true);
      last = performance.now();
      raf = requestAnimationFrame(tick);
    });
  }

  /* ---- game state (G2: this state drives everything; it never touches a
     mesh directly — the table functions above are the only mesh owner) --- */
  const _diffParam = parseInt(new URLSearchParams(location.search).get('diff'), 10);
  const G = {
    data: null,
    player: { hand: [] }, cpu: { hand: [] },
    pot: [], round: 0, turn: 'player', phase: 'idle',
    pickedStat: null, history: [],
    difficulty: (_diffParam >= 1 && _diffParam <= 5) ? _diffParam : 3,
    matchToken: 0
  };
  const beat = (ms) => new Promise(r => setTimeout(r, ms));

  function startMatch() {
    hideContinue();
    const deck = shuffle(G.data.cards.slice()).slice(0, DECK_SIZE);
    G.player.hand = []; G.cpu.hand = [];
    for (let i = 0; i < deck.length; i++) {
      (i % 2 === 0 ? G.player.hand : G.cpu.hand).push(deck[i]);
    }
    G.pot = []; G.round = 0; G.history = [];
    G.turn = rng() < 0.5 ? 'player' : 'cpu';
    G.phase = 'idle';
    G.matchToken++;
    disposeCard(playerCard); disposeCard(cpuCard);
    playerCard = cpuCard = null;
    updateHUD();
    startRound();
  }

  /* ---- forward-flight entry: warp streaming + card glide --------------
     The player should feel the scene fly forward into the next hand, not see
     the cards pop in. The camera holds at its rest pose (no pull-back, so the
     moons never lurch backward at round start); instead the sense of forward
     motion comes from the WARP streaming — stars, hyperspace streaks and the
     near moons all flow toward the viewer (driven by _warpHold, see
     updateBackdrop) on an accelerate→cruise→decelerate envelope. On top of
     that the cards glide in from far on z and fade up, leading the parallax.
     `entering` guards float/shadow so they don't fight the tweens. */
  // ZOOM_DEPTH is large so the card starts genuinely FAR back on z; the
  // perspective camera (not a scale tween) shrinks it to a speck near the
  // vanishing point, so it reads as real distance and grows with correct
  // foreshortening as it flies forward to its slot.
  const ENTRY_MS = 1500, ZOOM_DEPTH = 60.0;

  // --- warp "ship speed" envelope ------------------------------------------
  // The whole transition is modelled as a spaceship that accelerates from a
  // standstill up to top speed, cruises there briefly, then decelerates to a
  // full stop. warpSpeed(t) is that speed profile (0 → 1 → 1 → 0 with eased
  // shoulders); warpDist(t) is its integral, i.e. the normalized distance the
  // ship has travelled by time t. The SAME speed value drives the hyperspace
  // streaks, star drift and moon parallax (all keyed off `w` = _warpHold), and
  // the distance drives the camera dolly + card approach — so the streaks and
  // the forward motion accelerate and decelerate together, selling the "inside
  // a ship" illusion. Because speed starts at exactly 0, the one heavy build
  // frame (baking + uploading the new card textures) lands while nothing is
  // moving yet, hiding the hitch that used to read as a blip at warp start.
  const WARP_AC = 0.28;                 // fraction of the flight spent accelerating
  const WARP_DC = 0.58;                 // deceleration begins here (cruise between AC..DC)
  const _smooth01 = (x) => x * x * (3 - 2 * x);          // smoothstep ease 0→1
  function warpSpeed(t) {
    if (t <= 0 || t >= 1) return 0;
    if (t < WARP_AC) return _smooth01(t / WARP_AC);       // accelerate
    if (t < WARP_DC) return 1;                            // cruise at top speed
    return _smooth01((1 - t) / (1 - WARP_DC));            // decelerate to a stop
  }
  const _WARP_AREA = 0.5 * WARP_AC + (WARP_DC - WARP_AC) + 0.5 * (1 - WARP_DC);
  function warpDist(t) {                 // normalized distance travelled (∫ speed)
    if (t <= 0) return 0;
    if (t >= 1) return 1;
    let a;
    if (t < WARP_AC) {
      const X = t / WARP_AC;
      a = WARP_AC * (X * X * X - X * X * X * X / 2);
    } else if (t < WARP_DC) {
      a = 0.5 * WARP_AC + (t - WARP_AC);
    } else {
      const rem = (1 - t) / (1 - WARP_DC);
      a = 0.5 * WARP_AC + (WARP_DC - WARP_AC)
        + (1 - WARP_DC) * (0.5 - (rem * rem * rem - rem * rem * rem * rem / 2));
    }
    return a / _WARP_AREA;
  }

  function dollyIn() {
    if (REDUCED) { _camDolly = 0; _warpHold = 0; return; }
    // Cancel any previous dolly tween (from the prior round)
    cancelTweensWithTag('dolly');
    // No camera pull-back: the camera holds at its rest pose so the moons never
    // lurch backward at round start. The forward-flight feel comes purely from
    // the warp streaming (stars/streaks/moons flow toward the viewer, keyed off
    // _warpHold) plus the cards zooming in from far (zoomInCard). We still ramp
    // _warpHold on the same accelerate→cruise→decelerate envelope so the space
    // streams past smoothly and then settles.
    _camDolly = 0;
    _warpHold = 0.0;
    tween({
      dur: md(ENTRY_MS),
      ease: (x) => x,                    // linear timeline; shape comes from warpSpeed
      tag: 'dolly',
      update: (_e, t) => {
        // warp intensity follows SPEED: streaks/stars/moons ramp up then down.
        _warpHold = warpSpeed(t);
      },
      done: () => { _camDolly = 0; _warpHold = 0; }
    });
  }
  function zoomInCard(cardG) {
    const rest = cardG.userData.baseSlot.clone();
    const restZ = cardG.userData.baseZ || 0;
    cardG.userData.entering = true;
    // full scale, but pushed FAR back on z: perspective makes it a distant
    // speck near the vanishing point. As z advances to rest the card grows
    // naturally (1/distance) AND drifts out from centre to its slot — real
    // depth, not an in-place scale-up.
    cardG.scale.set(1, 1, 1);
    cardG.position.set(rest.x, rest.y, restZ - ZOOM_DEPTH);
    cardG.userData.setOpacity(0.0);
    tween({
      dur: md(ENTRY_MS),
      ease: (x) => x,           // shape comes from warpDist (same profile as the dolly)
      tag: 'dolly',
      update: (_e, t) => {
        const d = warpDist(t);   // travelled distance: accelerate → cruise → decelerate
        cardG.position.z = (restZ - ZOOM_DEPTH) + ZOOM_DEPTH * d;
        cardG.userData.setOpacity(Math.min(1, 0.2 + d * 1.7));   // faint distant speck → full
      },
      done: () => {
        cardG.position.set(rest.x, rest.y, restZ);
        cardG.scale.set(1, 1, 1);
        cardG.userData.setOpacity(1);
        cardG.userData.entering = false;
      }
    });
  }

  // Force the GPU upload for a card's freshly baked textures ahead of time, while
  // the scene is static (pre-warp). Otherwise the first warp frame pays the upload
  // cost mid-motion, which reads as a stutter right as the warp kicks in.
  function warmCardTextures(cardG) {
    if (!cardG || !renderer.initTexture) return;
    const f = cardG.userData.front && cardG.userData.front.material.map;
    const b = cardG.userData.back  && cardG.userData.back.material.map;
    try { if (f) renderer.initTexture(f); if (b) renderer.initTexture(b); } catch (e) {}
  }

  function spawnRoundCards() {
    // Cancel any leftover dolly/zoom tweens from the previous round
    cancelTweensWithTag('dolly');
    disposeCard(playerCard); disposeCard(cpuCard);
    playerCard = makeCard(G.player.hand[0]);
    cpuCard    = makeCard(G.cpu.hand[0]);
    // independent drift phases so the two cards never bob in lockstep
    playerCard.userData.floatPhase = Math.random() * 6.283;
    cpuCard.userData.floatPhase    = Math.random() * 6.283;
    placeCard(playerCard, PLAYER_SLOT, false);
    placeCard(cpuCard,    CPU_SLOT,    false);
    playerCard.userData.shadow = makeShadow();
    cpuCard.userData.shadow    = makeShadow();
    tableGroup.add(playerCard, cpuCard);
    applyCardVisibility();   // honour the Cards toggle across new rounds
    // upload the new card textures to the GPU NOW (scene still static) so the
    // first warp frame doesn't stall on the upload — smooths the dust→warp handoff
    warmCardTextures(playerCard);
    warmCardTextures(cpuCard);
    // fly the camera forward into the pair; cards glide in and the stars streak
    dollyIn();
    zoomInCard(playerCard);
    zoomInCard(cpuCard);
    // The dispose+bake+upload above is one heavy synchronous frame. Rebase the
    // frame-loop clock so the stall it introduced isn't billed as a big dt on the
    // next frame (which would snap the star drift / card float forward). Combined
    // with the warp speed starting at 0, the transition now begins from a clean,
    // motionless baseline — no blip.
    _lastEt = clock.getElapsedTime();
  }

  function startRound() {
    G.round += 1;
    G.pickedStat = null;
    G.phase = 'picking';
    spawnRoundCards();
    updateHUD();
    const token = G.matchToken;

    if (G.turn === 'player') {
      setHint('Dealing your card…');
      announce(`Round ${G.round}. Your turn.`);
      setTimeout(() => {
        if (G.matchToken !== token) return;
        flipCard(playerCard, true, 620, () => {
          if (G.matchToken !== token) return;
          setHint('Your pick — press 1–6 to choose a stat');
          announce(`Your card: ${G.player.hand[0].displayName}. Choose a stat, 1 to 6.`);
          syncStatControls();
        });
      }, md(ENTRY_MS) + 140);
    } else {
      setHint('CPU is choosing…');
      announce(`Round ${G.round}. CPU's turn.`);
      syncStatControls();
      setTimeout(() => {
        if (G.matchToken !== token) return;
        const inPlay = [...G.player.hand, ...G.cpu.hand, ...G.pot];
        const stat = pickStatForCPU(G.cpu.hand[0], inPlay, G.player.hand[0]);
        cpuPicksStat(stat);
      }, md(ENTRY_MS) + 260);
    }
  }

  function playerPicksStat(key) {
    if (G.phase !== 'picking' || G.turn !== 'player') return;
    G.pickedStat = key; G.phase = 'revealing';
    syncStatControls();
    reveal(key);
  }
  function cpuPicksStat(key) {
    if (G.phase !== 'picking' || G.turn !== 'cpu') return;
    G.pickedStat = key; G.phase = 'revealing';
    syncStatControls();
    reveal(key);
  }

  async function reveal(key) {
    const token = G.pickedStat && G.matchToken;
    const idx   = STATS.findIndex(s => s.key === key);
    const meta  = STATS[idx];
    const pCard = G.player.hand[0], cCard = G.cpu.hand[0];
    playerCard.scale.set(1, 1, 1);                // cancel any breathing residue

    // gold pick highlight on both cards
    showPick(playerCard, idx, HL.pick);
    showPick(cpuCard,    idx, HL.pick);
    setHint(`${meta.label} — ${G.turn === 'cpu' ? 'CPU chose' : 'you chose'} it`);

    // flip up whichever cards are still face-down (cpu always; player on cpu turn)
    await new Promise((res) => {
      let pending = 0;
      const bump = () => { if (--pending <= 0) res(); };
      [playerCard, cpuCard].forEach(c => { if (!c.userData.faceUp) { pending++; } });
      if (pending === 0) return res();
      [playerCard, cpuCard].forEach(c => { if (!c.userData.faceUp) flipCard(c, true, 600, bump); });
    });
    if (G.matchToken !== token) return;

    await beat(260);
    if (G.matchToken !== token) return;

    const winner = resolveStat(key, pCard, cCard);
    const pv = pCard.stats[key], cv = cCard.stats[key];
    const fmt = (x) => String(meta.fmt ? meta.fmt(x) : x).replace(/<[^>]*>/g, '');
    // recolor picked row: winner green, loser red, tie amber
    if (winner === 'tie') {
      showPick(playerCard, idx, HL.tie, 0.6);
      showPick(cpuCard,    idx, HL.tie, 0.6);
      setHint(`Tie on ${meta.label} — cards go to the pot`);
      announce(`Tie on ${meta.label}. Both ${fmt(pv)}. ${G.pot.length + 2} cards to the pot.`);
    } else {
      showPick(playerCard, idx, winner === 'player' ? HL.win : HL.lose, 0.6);
      showPick(cpuCard,    idx, winner === 'cpu'    ? HL.win : HL.lose, 0.6);
      const youWord = winner === 'player' ? 'You win' : 'CPU wins';
      setHint(`${youWord} — ${meta.label} ${fmt(winner === 'player' ? pv : cv)} beats ${fmt(winner === 'player' ? cv : pv)}`);
      announce(`${meta.label}: you ${fmt(pv)}, CPU ${fmt(cv)}. ${youWord}.`);
      // showcase the winning card: light its edge up with a glowing rim halo
      const winG = winner === 'player' ? playerCard : cpuCard;
      showWinGlow(winG, HL.win, winner === 'player' ? 0.66 : 0.56);
    }

    await beat(winner === 'tie' ? 900 : 1050);
    if (G.matchToken !== token) return;

    // Hand the pace to the player: pause on the lit verdict until they hit
    // Continue / Space (safety auto-advance keeps the game from stalling).
    if (!REDUCED) {
      announce('Press Space to continue.');
      await waitForContinue(winner === 'player' ? 5200 : 6500);
      if (G.matchToken !== token) return;
    }
    resolveRound(winner, key);
  }

  function resolveRound(winner, key) {
    const token = G.matchToken;
    G.history.push({ round: G.round, stat: key, winner });

    const pTop = G.player.hand.shift();
    const cTop = G.cpu.hand.shift();
    const pile = [pTop, cTop, ...G.pot];

    let pDest, cDest;
    if (winner === 'tie') {
      G.pot = pile;                       // carries; same player picks again
      pDest = cDest = new THREE.Vector3(0, 0, -0.4);
    } else {
      G.pot = [];
      if (winner === 'player') { G.player.hand.push(...pile); G.turn = 'player'; pDest = cDest = PLAYER_PILE; }
      else                     { G.cpu.hand.push(...pile);    G.turn = 'cpu';    pDest = cDest = CPU_PILE; }
    }

    const localP = playerCard, localC = cpuCard;
    playerCard = cpuCard = null;
    let swept = 0;
    const after = () => {
      if (++swept < 2) return;
      if (G.matchToken !== token) return;
      updateHUD();
      if (G.player.hand.length === 0 || G.cpu.hand.length === 0) return endMatch();
      setTimeout(() => { if (G.matchToken === token) startRound(); }, 260);
    };
    if (winner === 'tie') {
      sweep(localP, pDest, after);
      sweep(localC, cDest, after);
    } else {
      // both cards fly out to the WINNER's side of the screen; mirrored spin +
      // a slight stagger keep them readable as two distinct cards.
      const sign = winner === 'player' ? -1 : 1;
      const dir = sideBySide ? new THREE.Vector3(sign, 0, 0)
                             : new THREE.Vector3(0, sign, 0);
      const winCard  = winner === 'player' ? localP : localC;
      const loseCard = winner === 'player' ? localC : localP;
      flyOut(winCard,  dir, { spin:  0.9, delay: 0 },   after);
      flyOut(loseCard, dir, { spin: -1.2, delay: 70 },  after);
    }
  }

  function endMatch() {
    G.phase = 'gameover';
    syncStatControls();
    const youWon = G.player.hand.length > 0;
    setHint(youWon ? '🏆 You win the match!  Press R to play again'
                   : '💻 CPU wins the match.  Press R to play again');
    announce(youWon
      ? `You win the match with ${G.player.hand.length} cards. Press R to play again.`
      : `CPU wins the match. Press R to play again.`);
    if (youWon) {
      // hold a strong victory glow on the surviving player card + globe warp flourish
      showWinGlow(playerCard, HL.win, 0.82);
      globeBurst(16);
      fxKick(1.3);
    }
  }

  /* ---- input: stat picking (1–6) + restart (R) ------------------------- */
  window.addEventListener('keydown', (e) => {
    if (/^[1-6]$/.test(e.key)) {
      if (G.phase === 'picking' && G.turn === 'player') {
        const s = STATS[parseInt(e.key, 10) - 1];
        if (s) playerPicksStat(s.key);
      }
    } else if (e.key === 'r' || e.key === 'R') {
      if (G.phase === 'gameover' || G.phase === 'picking') startMatch();
    } else if (e.key === '?') {
      toggleHelp();                                  // show/hide the toggle key list
    } else if (e.key === 'Escape') {
      toggleHelp(false);
    } else {
      const bind = FEAT_KEYS[e.key.toLowerCase()];   // dev/test feature toggles
      if (bind) { setFeature(bind.flag); }
    }
  });

  /* ---- Phase 3: pointer picking via raycast --------------------------- */
  const raycaster = new THREE.Raycaster();
  const ndc = new THREE.Vector2();
  const canPick = () => G.phase === 'picking' && G.turn === 'player'
      && playerCard && playerCard.userData.faceUp && !playerCard.userData.flipping;

  function rowFromEvent(e) {
    if (!canPick()) return -1;
    const r = canvas.getBoundingClientRect();
    ndc.x = ((e.clientX - r.left) / r.width) * 2 - 1;
    ndc.y = -((e.clientY - r.top) / r.height) * 2 + 1;
    raycaster.setFromCamera(ndc, camera);
    const hit = raycaster.intersectObject(playerCard.userData.front, false)[0];
    return (hit && hit.uv) ? rowFromUV(hit.uv) : -1;
  }

  canvas.addEventListener('pointermove', (e) => {
    if (_orbDrag) {
      const dx = e.clientX - _orbPX, dy = e.clientY - _orbPY;
      _orbPX = e.clientX; _orbPY = e.clientY;
      _orbYawT   = THREE.MathUtils.clamp(_orbYawT   - dx * ORB_SENS, -ORB_MAX_YAW,   ORB_MAX_YAW);
      _orbPitchT = THREE.MathUtils.clamp(_orbPitchT - dy * ORB_SENS, -ORB_MAX_PITCH, ORB_MAX_PITCH);
      return;
    }
    if (!canPick()) { canvas.style.cursor = 'default'; return; }
    const idx = rowFromEvent(e);
    if (idx >= 0) { showHover(playerCard, idx); canvas.style.cursor = 'pointer'; }
    else          { clearHover(playerCard);     canvas.style.cursor = 'default'; }
  });
  canvas.addEventListener('pointerleave', () => { if (playerCard) clearHover(playerCard); if (!_orbDrag) canvas.style.cursor = 'default'; });
  canvas.addEventListener('pointerdown', (e) => {
    const idx = rowFromEvent(e);
    if (idx >= 0) { clearHover(playerCard); playerPicksStat(STATS[idx].key); return; }
    // background press → start a camera peek drag (disabled under reduced motion)
    if (REDUCED) return;
    _orbDrag = true; _orbPX = e.clientX; _orbPY = e.clientY; _orbId = e.pointerId;
    try { canvas.setPointerCapture(e.pointerId); } catch {}
    canvas.style.cursor = 'grabbing';
  });
  function _endOrbit() {
    if (!_orbDrag) return;
    _orbDrag = false; _orbYawT = 0; _orbPitchT = 0;   // spring back to centre
    try { if (_orbId != null) canvas.releasePointerCapture(_orbId); } catch {}
    _orbId = null; canvas.style.cursor = 'default';
  }
  canvas.addEventListener('pointerup', _endOrbit);
  canvas.addEventListener('pointercancel', _endOrbit);

  /* ---- Phase 3: accessible stat controls (one-way mirror of G, G2/G5) --
     Six always-present focusable buttons; labels track the player's current
     card so a screen-reader user hears the values, and they enable only on
     the player's picking turn. They never own or mutate any mesh. */
  const statControls = document.getElementById('stat-controls');
  const statButtons = STATS.map((s, i) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.dataset.key = s.key;
    b.addEventListener('click', () => {
      if (G.phase === 'picking' && G.turn === 'player') playerPicksStat(s.key);
    });
    statControls.appendChild(b);
    return b;
  });
  function syncStatControls() {
    const active = G.phase === 'picking' && G.turn === 'player' && G.player.hand[0];
    const card = active ? G.player.hand[0] : null;
    STATS.forEach((s, i) => {
      const b = statButtons[i];
      const val = card ? String(s.fmt(card.stats[s.key])).replace(/<[^>]*>/g, '') : '';
      b.textContent = card
        ? `Play ${s.label}: ${val} (press ${i + 1})`
        : `${s.label} (unavailable)`;
      b.disabled = !active;
    });
  }

  /* test-only observation hook (does not own or mutate meshes) */
  if (new URLSearchParams(location.search).get('debug') === '1') {
    window.__pure = {
      status: () => ({ phase: G.phase, turn: G.turn, round: G.round,
                       you: G.player.hand.length, cpu: G.cpu.hand.length,
                       pot: G.pot.length }),
      // camera dolly telemetry (forward-flight entry verification)
      cam: () => ({ z: +camera.position.z.toFixed(3), dolly: +_camDolly.toFixed(3), warp: +_warpHold.toFixed(3), base: +_camBaseZ.toFixed(3) }),
      dolly: () => dollyIn(),   // trigger the forward-flight dolly on the current cards (test hook)
      zoom: () => { if (playerCard) zoomInCard(playerCard); if (cpuCard) zoomInCard(cpuCard); dollyIn(); },   // re-run tiny→full card warp entry (test hook)
      _scale: () => playerCard ? +playerCard.scale.x.toFixed(4) : -1,   // current player-card scale (always 1 now)
      _z: () => playerCard ? +playerCard.position.z.toFixed(3) : null,   // player-card z (entry depth verification)
      _appSize: () => {   // apparent half-height in NDC (perspective size — grows as card approaches)
        if (!playerCard) return null;
        const c = playerCard.userData.baseSlot ? playerCard.position.clone() : null; if (!c) return null;
        const top = playerCard.localToWorld(new THREE.Vector3(0, 0.9, 0)).project(camera);
        const bot = playerCard.localToWorld(new THREE.Vector3(0, -0.9, 0)).project(camera);
        return +Math.abs(top.y - bot.y).toFixed(4);
      },
      pinWarp: (v) => { _warpPin = v; },   // freeze star warp strength for screenshots (test hook)
      meteor: () => { spawnMeteor(); },     // force-spawn a shooting star (test hook)
      xwing: () => { spawnFlyby(); },       // force-spawn a craft chase pass (test hook)
      xwingStatic: (x, y, z, ry) => {       // place a static X-wing for inspection
        const m = makeXWing(); if (!m) return false;
        m.position.set(x || 0, y || 0, (z == null ? -18 : z));
        m.rotation.set(0, (ry == null ? Math.PI : ry), 0);
        m.scale.multiplyScalar(2);          // enlarge for clear inspection
        scene.add(m); return true;
      },
      craftStatic: (type, x, y, z, ry, sc, rx) => { // place any static craft for axis calibration
        const m = makeCraft(type || 'xwing'); if (!m) return false;
        m.position.set(x || 0, y || 0, (z == null ? -18 : z));
        m.rotation.set(rx || 0, (ry == null ? Math.PI : ry), 0);
        m.scale.multiplyScalar(sc == null ? 2 : sc);
        scene.add(m); return true;
      },
      craftReady: (type) => !!_craftProtos[type || 'xwing'],  // is a given GLB loaded yet?
      craftInfo: () => _xwings.map(x => ({ t: x.userData.craftType || '?',
        x: +x.position.x.toFixed(1), y: +x.position.y.toFixed(1), z: +x.position.z.toFixed(1) })),  // live flyby craft (type + pos)
      xwingReady: () => !!_craftProtos.xwing,      // is the GLB loaded yet?
      feature: (flag, on) => setFeature(flag, on),   // toggle/set a dev feature flag (test hook)
      features: () => ({ ...FEAT }),                  // read current feature flags (test hook)
      puff: () => {                          // force a smoke burst in open sky (test hook)
        const c = new THREE.Vector3(0, 2.6, 1);
        const back = new THREE.Vector3(0.25, 0.35, 0).normalize();
        for (let k = 0; k < 8; k++) dustEmit(c, back, 4);
      },
      orbit: (y, p) => { _orbYawT = y || 0; _orbPitchT = p || 0; },   // drive camera peek deterministically (test hook)
      _cam: () => ({ x: +camera.position.x.toFixed(3), y: +camera.position.y.toFixed(3), z: +camera.position.z.toFixed(3) }),
      _planetZ: () => planets.map(p => +p.position.z.toFixed(2)),   // moon z positions (parallax warp verification)
      paused: () => !!_continueCleanup,    // true while the Continue pause is waiting (test hook)
      cont: () => { hideContinue(); },     // advance past the Continue pause (test hook)
      pick: (n) => {
        if (G.phase === 'picking' && G.turn === 'player') {
          const s = STATS[n - 1]; if (s) playerPicksStat(s.key);
        }
      },
      // project a stat row's world point to client px, so tests can dispatch a
      // real pointer event there and exercise the full raycast pick pipeline.
      screenForRow: (idx) => {
        if (!playerCard) return null;
        const local = new THREE.Vector3(0, texYToLocal(rowMidPx(idx)), 0.02);
        const world = playerCard.localToWorld(local.clone());
        const p = world.project(camera);
        const r = canvas.getBoundingClientRect();
        return { x: r.left + (p.x * 0.5 + 0.5) * r.width,
                 y: r.top  + (-p.y * 0.5 + 0.5) * r.height };
      },
      // controls mirror snapshot (labels + disabled) for a11y verification
      controls: () => statButtons.map(b => ({ text: b.textContent, disabled: b.disabled }))
    };
  }

  /* ---- resize --------------------------------------------------------- */
  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    // updateStyle MUST be true: on high-DPR displays (Windows scaling > 100%)
    // the drawing buffer is w·DPR px; without pinning the canvas CSS size back
    // to w×h the oversized canvas anchors top-left and the scene shifts right +
    // down, clipping. Passing true makes Three.js set canvas.style.width/height.
    renderer.setSize(w, h, true);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    resizePostFx();
    layoutTable(camera.aspect);
    fitCamera();
    // if an orientation change happened between rounds, snap idle cards to the
    // new slots so they don't sit at stale positions until the next spawn.
    if (playerCard && !playerCard.userData.flipping) placeCard(playerCard, PLAYER_SLOT, playerCard.userData.faceUp);
    if (cpuCard    && !cpuCard.userData.flipping)    placeCard(cpuCard,    CPU_SLOT,    cpuCard.userData.faceUp);
  }
  window.addEventListener('resize', resize);
  resize();

  /* ---- single render loop (G3: one renderer, one loop, one context) ---
     Includes a downgrade-only perf governor: if smoothed fps stays low it
     first drops the pixel ratio to 1, then disables post-fx. It never upgrades
     (avoids oscillation) and never touches flip/game logic. ?fps=1 shows a HUD. */
  const _showFps = new URLSearchParams(location.search).get('fps') === '1';
  const _fpsEl = document.getElementById('fps');
  if (_showFps && _fpsEl) _fpsEl.style.display = 'block';
  let _prevMs = performance.now(), _fpsAvg = 60, _slowFrames = 0, _fpsSince = _prevMs, _govStep = 0;
  function frame() {
    stepTweens(performance.now());
    const et = clock.getElapsedTime();
    const dt = Math.min(0.05, et - _lastEt); _lastEt = et;
    updateBackdrop(et, dt);
    // forward-flight dolly + user camera peek: offset the camera back along z
    // (warp) and/or orbit it slightly around the scene centre, then re-aim at the
    // centre. Orbit angles ease toward their drag target, or back to 0 on release.
    const _ok = 1 - Math.exp(-dt * 8);
    _orbYaw   += (_orbYawT   - _orbYaw)   * _ok;
    _orbPitch += (_orbPitchT - _orbPitch) * _ok;
    const _orbiting = Math.abs(_orbYaw) > 1e-4 || Math.abs(_orbPitch) > 1e-4;
    if (_camDolly > 0.0005 || _orbiting) {
      _camTmp.set(0, _camBaseY, _camBaseZ + _camDolly)   // straight-on rest pose (dolly-aware)
             .applyAxisAngle(_AXIS_Y, _orbYaw)           // yaw around the centre
             .applyAxisAngle(_AXIS_X, _orbPitch);        // pitch around the centre
      camera.position.copy(_camTmp);
      camera.lookAt(0, 0, 0);
    }
    // Lock the galaxy band a constant distance behind the camera so it reads as
    // an infinitely-far skybox: the warp dolly (camera pulls back ~6.5u) no longer
    // parallaxes it, which is what made the background "jump" at warp start. At the
    // rest pose this resolves to its original world position (0, 0, -101), so the
    // look is unchanged; it simply stops sliding when the camera moves.
    galaxy.position.set(
      camera.position.x,
      camera.position.y - _camBaseY,
      camera.position.z - _camBaseZ - 95
    );
    updateFoils(et);
    updateBackSheens(et);
    updateFoilFacing(playerCard);
    updateFoilFacing(cpuCard);
    // gentle idle float so the cards read as suspended in space
    floatCard(playerCard, et);
    floatCard(cpuCard, et);
    // subtle "breathing" on the pickable player card so it reads as active
    if (!REDUCED && playerCard && G.phase === 'picking' && G.turn === 'player'
        && !playerCard.userData.flipping && playerCard.userData.faceUp) {
      const s = 1 + Math.sin(et * 2.2) * 0.012;
      playerCard.scale.set(s, s, s);
    }
    updateShadow(playerCard);
    updateShadow(cpuCard);
    updateWinGlows(et);
    updateDust(dt);
    updateXWings(dt);
    if (postFx.enabled) {
      _fxPulse = Math.max(0, _fxPulse - dt * 1.1);
      postFx.material.uniforms.uTime.value = et;
      postFx.material.uniforms.uPulse.value = _fxPulse;
      renderer.setRenderTarget(postFx.target);
      renderer.render(scene, camera);
      renderer.setRenderTarget(null);
      renderer.render(postFx.scene, postFx.camera);
    } else {
      renderer.render(scene, camera);
    }
    // perf governor + fps HUD (downgrade only; never touches game logic)
    const _nowMs = performance.now();
    const _frameMs = _nowMs - _prevMs; _prevMs = _nowMs;
    if (_frameMs > 0 && _frameMs < 500) {
      _fpsAvg += ((1000 / _frameMs) - _fpsAvg) * 0.1;
      if (_fpsAvg < 42) _slowFrames++; else _slowFrames = Math.max(0, _slowFrames - 2);
      if (_slowFrames > 90) {
        _slowFrames = 0;
        if (_govStep === 0 && renderer.getPixelRatio() > 1.01) {
          renderer.setPixelRatio(1); resizePostFx(); _govStep = 1;
        } else if (postFx.enabled) {
          postFx.enabled = false; _govStep = 2;
        }
      }
    }
    if (_showFps && _fpsEl && _nowMs - _fpsSince > 250) {
      _fpsSince = _nowMs;
      _fpsEl.textContent = `${_fpsAvg.toFixed(0)} fps\ndpr ${renderer.getPixelRatio().toFixed(2)}  fx ${postFx.enabled ? 'on' : 'off'}`;
    }
    requestAnimationFrame(frame);
  }

  /* ---- boot ----------------------------------------------------------- */
  async function boot() {
    const loading = document.getElementById('loading');
    const lmsg    = document.getElementById('loading-msg');
    try {
      const res = await fetch('data/cards.json', { cache: 'no-cache' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      G.data = await res.json();
    } catch (err) {
      loading.classList.add('err');
      lmsg.innerHTML = `Failed to load deck.<br><code>${err.message}</code>`;
      return;
    }
    loading.classList.add('gone');
    requestAnimationFrame(frame);
    startMatch();
  }
  boot();
  </script>
</body>
</html>
