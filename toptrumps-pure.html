<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Azure Top Trumps — Pure WebGL</title>
<style>
  :root {
    --bg0: #05070d;
    --bg1: #0a1526;
    --ink: #eaf2ff;
    --muted: #9fb3d0;
    --accent: #37b6ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg0); color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  #stage { position: fixed; inset: 0; display: block; width: 100vw; height: 100vh;
    touch-action: none; }
  /* radial ambience behind the canvas */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(120% 90% at 50% -10%, #12294a 0%, var(--bg1) 45%, var(--bg0) 100%);
  }

  /* ---- HUD ---- */
  #hud { position: fixed; left: 0; right: 0; top: 0; z-index: 5;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 14px 18px; pointer-events: none; }
  #hud .brand { font-weight: 700; letter-spacing: .3px; }
  #hud .brand small { display: block; font-weight: 500; color: var(--muted); font-size: 12px; }
  #hud .counts { text-align: right; font-variant-numeric: tabular-nums; }
  #hud .counts b { color: var(--accent); }

  #hint { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
    z-index: 5; color: var(--muted); font-size: 14px; letter-spacing: .2px;
    background: rgba(6,12,24,.55); border: 1px solid rgba(120,160,220,.18);
    padding: 8px 16px; border-radius: 999px; backdrop-filter: blur(6px);
    transition: opacity .4s ease; }

  /* ---- Continue pause button — hands round pacing to the player. Sits above
     the hint pill; a thin progress bar shows the safety auto-advance. ---- */
  #continue-btn { position: fixed; left: 50%; bottom: 70px;
    transform: translateX(-50%) translateY(8px); z-index: 7;
    display: inline-flex; align-items: center; gap: 12px;
    padding: 12px 18px 12px 20px; border-radius: 999px; cursor: pointer;
    font: 700 14px/1 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    letter-spacing: .02em; color: var(--ink); white-space: nowrap; overflow: hidden;
    background: linear-gradient(135deg, rgba(20,44,78,.92), rgba(10,21,38,.92));
    border: 1px solid rgba(120,170,235,.35);
    box-shadow: 0 18px 44px rgba(0,0,0,.6), 0 0 0 0 rgba(55,182,255,0);
    backdrop-filter: blur(7px);
    opacity: 0; pointer-events: none;
    transition: opacity .25s ease, transform .25s cubic-bezier(.2,.7,.3,1.4), box-shadow .3s ease;
    --progress: 100%; }
  #continue-btn::before { content: ''; position: absolute; left: 0; bottom: 0; height: 3px;
    width: var(--progress, 100%);
    background: linear-gradient(90deg, rgba(120,220,255,.9), rgba(55,182,255,.5));
    box-shadow: 0 0 8px rgba(90,200,255,.55); transition: width .15s linear; pointer-events: none; }
  #continue-btn[hidden] { display: none; }
  #continue-btn.show { opacity: 1; pointer-events: auto;
    transform: translateX(-50%) translateY(0);
    animation: continuePulse 1.9s ease-in-out infinite; }
  #continue-btn:hover { border-color: rgba(140,195,255,.6);
    background: linear-gradient(135deg, rgba(26,58,98,.95), rgba(14,28,50,.95)); }
  #continue-btn:active { transform: translateX(-50%) translateY(1px) scale(.98); }
  #continue-btn .c-arrow { font-size: 12px; color: var(--accent); }
  #continue-btn .c-key { font-size: 10.5px; font-weight: 600; letter-spacing: .04em;
    background: rgba(120,170,235,.2); padding: 4px 8px; border-radius: 6px; color: #cfe4ff; }
  @keyframes continuePulse {
    0%,100% { box-shadow: 0 18px 44px rgba(0,0,0,.6), 0 0 0 0 rgba(55,182,255,0); }
    50%     { box-shadow: 0 18px 44px rgba(0,0,0,.6), 0 0 22px 4px rgba(55,182,255,.5); }
  }
  @media (prefers-reduced-motion: reduce) { #continue-btn.show { animation: none; } }

  /* ---- loading / error ---- */
  #loading { position: fixed; inset: 0; z-index: 20; display: grid; place-items: center;
    background: var(--bg0); transition: opacity .5s ease; }
  #loading .spin { width: 46px; height: 46px; border-radius: 50%;
    border: 3px solid rgba(120,160,220,.25); border-top-color: var(--accent);
    animation: spin 900ms linear infinite; }
  #loading .msg { margin-top: 16px; color: var(--muted); font-size: 14px; }
  #loading.err .spin { display: none; }
  #loading.gone { opacity: 0; pointer-events: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- accessibility mirror (screen-reader only) ---- */
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0; }

  /* ---- perf HUD (?fps=1) ---- */
  #fps { position: fixed; left: 14px; bottom: 14px; z-index: 6; display: none;
    font: 600 12px/1.3 ui-monospace, "Cascadia Code", Consolas, monospace;
    color: #8fe3b0; background: rgba(6,12,24,.6); border: 1px solid rgba(120,160,220,.2);
    padding: 6px 9px; border-radius: 7px; pointer-events: none; white-space: pre; }
  #toast { position: fixed; left: 50%; top: 18px; transform: translateX(-50%) translateY(-8px);
    z-index: 8; opacity: 0; transition: opacity .18s ease, transform .18s ease;
    font: 600 13px/1.35 system-ui, "Segoe UI", sans-serif; color: #dce8ff;
    background: rgba(6,12,24,.72); border: 1px solid rgba(120,160,220,.28);
    padding: 8px 14px; border-radius: 9px; pointer-events: none; white-space: nowrap;
    box-shadow: 0 6px 20px rgba(0,0,0,.35); }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #help { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%) scale(.98);
    z-index: 9; opacity: 0; visibility: hidden; transition: opacity .16s ease, transform .16s ease;
    font: 500 13px/1.5 system-ui, "Segoe UI", sans-serif; color: #dce8ff;
    background: rgba(8,14,26,.9); border: 1px solid rgba(120,160,220,.3);
    padding: 16px 20px; border-radius: 12px; pointer-events: none; min-width: 230px;
    box-shadow: 0 12px 40px rgba(0,0,0,.5); }
  #help.show { opacity: 1; visibility: visible; transform: translate(-50%,-50%) scale(1); }
  #help h3 { margin: 0 0 10px; font-size: 12px; letter-spacing: .04em; text-transform: uppercase;
    color: #8fb4e8; font-weight: 700; }
  #help .row { display: flex; justify-content: space-between; gap: 24px; padding: 3px 0; }
  #help kbd { display: inline-block; min-width: 16px; text-align: center;
    font: 600 12px/1.4 ui-monospace, Consolas, monospace; color: #cfe0ff;
    background: rgba(120,160,220,.14); border: 1px solid rgba(120,160,220,.3);
    border-radius: 5px; padding: 1px 6px; }
  #help .state { font-weight: 700; }
  #help .on  { color: #6fe0a0; }
  #help .off { color: #e88; }
  #help .hint { margin-top: 10px; font-size: 11px; color: #7f92b5; }
</style>
</head>
<body>
  <canvas id="stage"></canvas>

  <div id="hud">
    <div class="brand">Azure Top Trumps <small>Pure WebGL build</small></div>
    <div class="counts">You <b id="you-count">0</b> · CPU <b id="cpu-count">0</b></div>
  </div>

  <div id="hint">Loading deck…</div>

  const STATS = [

const FAMILY_INFO = {
  'General Purpose': {
    summary: 'Balanced CPU-to-memory ratio. The default choice for web servers, small databases, dev/test, and most line-of-business apps. Includes the D-series and burstable B-series.',

  'Storage Optimized': {
    summary: 'High disk throughput and IOPS, often with local NVMe. Made for big data, NoSQL clusters, data warehousing, and large transactional databases. The L-series.',

  'GPU Accelerated': {

  'HPC': {
    summary: 'Tightly-coupled high-performance computing with InfiniBand interconnects and top-bin CPUs. Made for CFD, weather modelling, molecular dynamics, finite-element analysis. The H-series.',
    docs: 'https://learn.microsoft.com/azure/virtual-machines/sizes-hpc',
  },
  'Confidential': {
    summary: 'Hardware-based confidential computing (AMD SEV-SNP / Intel TDX). Memory is encrypted and isolated from the hypervisor — useful for regulated workloads and zero-trust scenarios. The DC and EC series.',
    docs: 'https://learn.microsoft.com/azure/confidential-computing/confidential-vm-overview',
  },
};

// Reference range used by the AI for its own-card evaluation.
const STAT_REFS = {
  vcpus:           [1, 192],
  memoryGB:        [1, 4000],
  maxDataDisks:    [1, 64],
  nics:            [1, 8],
  powerScore:      [1, 100],
  // pricePerHourUSD intentionally absent — see pickStatForCPU
};

const FAMILY_CLASS = {
  'General Purpose':   'ft-gp',
  'Compute Optimized': 'ft-co',
  'Memory Optimized':  'ft-mo',
  'Storage Optimized': 'ft-so',
  'GPU Accelerated':   'ft-gpu',
  'HPC':               'ft-hpc',
  'Confidential':      'ft-conf',
};

const RARITY_LABEL = {
  common:'COMMON', uncommon:'UNCOMMON', rare:'RARE', epic:'EPIC', legendary:'LEGENDARY'
};
const RARITY_STARS = {
  common:1, uncommon:2, rare:3, epic:4, legendary:5
};

const DECK_SIZE = 40;

/* ---------- 1a. seeded RNG (mulberry32) for reproducible demos ---------- */
const _seedParam = new URLSearchParams(location.search).get('seed');
function _hashStr(s) {
  let h = 1779033703 ^ s.length;
  for (let i = 0; i < s.length; i++) {
    h = Math.imul(h ^ s.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return h >>> 0;
}
let _rngState = _seedParam
  ? (/^-?\d+$/.test(_seedParam) ? (parseInt(_seedParam, 10) >>> 0) : _hashStr(_seedParam))
  : (Math.floor(Math.random() * 0x100000000) >>> 0);
function rng() {
  _rngState = (_rngState + 0x6D2B79F5) >>> 0;
  let t = _rngState;
  t = Math.imul(t ^ (t >>> 15), t | 1);
  t = (t + Math.imul(t ^ (t >>> 7), t | 61)) ^ t;
  return ((t ^ (t >>> 14)) >>> 0) / 0x100000000;
}

/* tiny DOM helpers */
function h(tag, attrs, children) {
  const el = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'class') el.className = attrs[k];
    else if (k === 'html') el.innerHTML = attrs[k];
    else if (k.startsWith('on') && typeof attrs[k] === 'function') el.addEventListener(k.slice(2), attrs[k]);
    else if (attrs[k] === true) el.setAttribute(k, '');
    else if (attrs[k] != null && attrs[k] !== false) el.setAttribute(k, attrs[k]);
  }
  if (children != null) {
    if (!Array.isArray(children)) children = [children];
    for (const c of children) {
      if (c == null || c === false) continue;
      el.appendChild(c.nodeType ? c : document.createTextNode(String(c)));
    }
  }
  return el;
}
function $(id) { return document.getElementById(id); }
// Lowercase the "V" in Azure version suffixes (V2 → v2, DV2 → Dv2, etc.).
// Preserves the NV-series family prefix (NV6, NV12, …) by negative lookbehind.
function lcVersion(s) {
  return String(s == null ? '' : s).replace(/(?<!N)V(\d)/g, 'v$1');
}


  function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }


  /* family glyph set (harvested — baker rasterizes these to canvas) */
const GLYPHS = {
  'GPU Accelerated': '<svg viewBox="0 0 64 64"><rect x="6" y="14" width="52" height="36" rx="4" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="20" cy="32" r="6" fill="currentColor"/><circle cx="44" cy="32" r="6" fill="currentColor"/><rect x="14" y="50" width="6" height="6" fill="currentColor"/><rect x="44" y="50" width="6" height="6" fill="currentColor"/></svg>',
  'Memory Optimized': '<svg viewBox="0 0 64 64"><rect x="10" y="14" width="44" height="6" rx="1" fill="currentColor"/><rect x="10" y="24" width="44" height="6" rx="1" fill="currentColor" opacity=".75"/><rect x="10" y="34" width="44" height="6" rx="1" fill="currentColor" opacity=".5"/><rect x="10" y="44" width="44" height="6" rx="1" fill="currentColor" opacity=".25"/></svg>',
  'Compute Optimized': '<svg viewBox="0 0 64 64"><path d="M34 6 L18 38 L30 38 L26 58 L48 28 L34 28 Z" fill="currentColor"/></svg>',
  'General Purpose': '<svg viewBox="0 0 64 64"><rect x="10" y="10" width="20" height="20" fill="currentColor"/><rect x="34" y="10" width="20" height="20" fill="currentColor" opacity=".7"/><rect x="10" y="34" width="20" height="20" fill="currentColor" opacity=".55"/><rect x="34" y="34" width="20" height="20" fill="currentColor" opacity=".4"/></svg>',
  'Storage Optimized': '<svg viewBox="0 0 64 64"><ellipse cx="32" cy="14" rx="20" ry="6" fill="currentColor"/><path d="M12 14 V32 a20 6 0 0 0 40 0 V14" fill="currentColor" opacity=".6"/><path d="M12 32 V50 a20 6 0 0 0 40 0 V32" fill="currentColor" opacity=".35"/></svg>',
  'HPC': '<svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="4" fill="currentColor"/><ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="currentColor" stroke-width="2"/><ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="currentColor" stroke-width="2" transform="rotate(60 32 32)"/><ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="currentColor" stroke-width="2" transform="rotate(-60 32 32)"/></svg>',
  'Confidential': '<svg viewBox="0 0 64 64"><rect x="14" y="28" width="36" height="28" rx="3" fill="currentColor"/><path d="M22 28 V18 a10 10 0 0 1 20 0 V28" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="32" cy="42" r="3" fill="#fff"/></svg>',
};

  /* ---------- 3b. card art bake (Phase 3 — mesh-card texture source) ----------
   Renders a card to a high-DPI offscreen canvas using Canvas2D so the
   WebGL mesh-card path can wrap it in a CanvasTexture. Deliberately a
   simplified, larger-typography variant of the DOM card — the WebGL
   build is meant to look different from the stable build.
   Synchronous bake. Family glyphs are async-loaded SVG → bitmap; if
   one isn't ready when a card bakes, the glyph slot is left empty
   (visually fine — gradient + family stripe still read). Glyph load
   typically completes within the first 50ms after page load. */
(function initCardArt() {
  const TEX_W = 1280, TEX_H = 2000;  // 4× of CSS 320×500
  const PAD = 64;
  // Card corner radius — shared by the baked art (front fill + back clip) and
  // the 3D mesh silhouette so the geometry rounds to match the painted art.
  const CORNER_CSS = 22, CORNER_TEX = CORNER_CSS * 4;   // 22 CSS px → 88 tex px

  const FAM_COLOR = {
    'General Purpose':   '#0f6cbd',
    'Compute Optimized': '#e97548',
    'Memory Optimized':  '#8764b8',
    'Storage Optimized': '#038387',
    'GPU Accelerated':   '#c4314b',
    'HPC':               '#4f52b2',
    'Confidential':      '#7a7574',
  };
  const RARITY_COLOR = {
    common:     '#b9bcc6',
    uncommon:   '#4ea36b',
    rare:       '#2596e7',
    epic:       '#b074e8',
    legendary:  '#f0a93b',
  };

  // Pre-rasterize each family glyph SVG to a 512×512 canvas, tinted
  // in its own family color so it can sit on the white card front
  // exactly the way the original DOM card's .glyph element does
  // (`color: var(--fam)`). bake() falls back to glyph-less if the
  // image hasn't loaded yet.
  const glyphCanvases = {};
  Object.entries(GLYPHS).forEach(([family, svg]) => {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 512;
    const ctx = c.getContext('2d');
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, 512, 512);
      glyphCanvases[family] = c;
      // Invalidate any cached bakes that completed before this glyph
      // loaded so a re-bake will include the tinted glyph.
      if (typeof frontCache !== 'undefined') frontCache.clear();
    };
    img.onerror = () => { /* leave unset; bake will skip */ };
    img.src = 'data:image/svg+xml;utf8,' + encodeURIComponent(
      svg.replace(/currentColor/g, FAM_COLOR[family] || '#0f6cbd')
    );
  });

  const frontCache = new Map(); // card.id → HTMLCanvasElement
  let backCanvas = null;

  // Azure "A" logo — same PNG the CSS3D card backs use. Preload at
  // module init so it's almost certainly ready by the time the first
  // mesh card mounts. If it isn't yet, bakeBack draws everything else
  // and the logo pops in via onBackRefresh once it loads.
  const azureLogoImg = new Image();
  azureLogoImg.decoding = 'async';
  const backRefreshListeners = [];
  azureLogoImg.addEventListener('load', () => {
    backCanvas = null;
    for (const cb of backRefreshListeners.slice()) { try { cb(); } catch (_) {} }
  });
  azureLogoImg.src = 'azure-logo.png';

  // Pre-bake the hex-tile background pattern once. The original CSS
  // back tiles a 56×48 SVG at 6% white. Match exactly at 4× scale.
  let hexTilePattern = null;
  (function buildHexTile() {
    const TW = 224, TH = 192; // 4× of the original 56×48 CSS tile
    const t = document.createElement('canvas');
    t.width = TW; t.height = TH;
    const tx = t.getContext('2d');
    tx.strokeStyle = 'rgba(255,255,255,0.06)';
    tx.lineWidth = 4; // 1 CSS px scaled
    const polys = [
      [14,0, 28,8, 28,24, 14,32, 0,24, 0,8],
      [42,0, 56,8, 56,24, 42,32, 28,24, 28,8],
      [14,32, 28,40, 28,48, 14,48],
      [0,48, 14,48, 14,32, 0,24],
      [42,32, 56,24, 56,48, 42,48],
    ];
    for (const p of polys) {
      tx.beginPath();
      for (let i = 0; i < p.length; i += 2) {
        const x = p[i] * 4, y = p[i + 1] * 4;
        if (i === 0) tx.moveTo(x, y); else tx.lineTo(x, y);
      }
      tx.closePath();
      tx.stroke();
    }
    hexTilePattern = t;
  })();

  function bakeFront(card) {
    const cached = frontCache.get(card.id);
    if (cached) return cached;
    const c = document.createElement('canvas');
    c.width = TEX_W; c.height = TEX_H;
    drawFront(c.getContext('2d'), card);
    frontCache.set(card.id, c);
    return c;
  }

  function bakeBack() {
    if (backCanvas) return backCanvas;
    backCanvas = document.createElement('canvas');
    backCanvas.width = TEX_W; backCanvas.height = TEX_H;
    drawBack(backCanvas.getContext('2d'));
    return backCanvas;
  }

  function drawFront(ctx, card) {
    const famColor    = FAM_COLOR[card.familyType] || '#0f6cbd';
    const rarityColor = RARITY_COLOR[card.rarity]   || '#b9bcc6';
    const W = TEX_W, H = TEX_H;

    // === Original DOM card layout, faithfully baked ===
    // The DOM card (toptrumps.html cardFront) is: white background,
    // thin family-colored top accent, dark text, small centered family
    // glyph in family color, six stat rows on white, cream ability
    // footer. We mirror that here so the mesh card shown over the
    // CSS3D DOM card has the same visual design — no second style
    // to maintain.
    // Card body — white with the same 14 CSS-px (= 56 texture-px)
    // corner radius the DOM .card uses.
    // Card body — white with the rounded corner radius shared with the mesh.
    ctx.fillStyle = '#ffffff';
    roundRect(ctx, 0, 0, W, H, CORNER_TEX); ctx.fill();

    // Thin family-colored top accent (matches .card-accent height 8px = 32 tex-px)
    ctx.fillStyle = famColor;
    roundRectTop(ctx, 0, 0, W, 32, CORNER_TEX); ctx.fill();

    // --- HEADER ROW (region pill left, rarity stars+word right) ---
    const HEAD_Y = 100; // vertical mid of the head row
    // Region pill — family-colored hex-ish chip with white text
    ctx.save();
    ctx.font = '800 38px ui-monospace, "SF Mono", Menlo, Consolas, monospace';
    const regionText = '⬢ ' + (card.regionShort || '');
    const regW = ctx.measureText(regionText).width + 60;
    const regH = 68;
    const regX = PAD;
    const regY = HEAD_Y - regH / 2;
    ctx.fillStyle = famColor;
    roundRect(ctx, regX, regY, regW, regH, 14); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    ctx.fillText(regionText, regX + 30, HEAD_Y);
    ctx.restore();

    // Rarity stars + word — rarity-colored text, no chip background,
    // right-aligned to match the DOM .card-rarity (color: var(--rar)).
    const stars = '★'.repeat(RARITY_STARS[card.rarity] || 1);
    const rarityWord = (RARITY_LABEL[card.rarity] || '').toUpperCase();
    ctx.save();
    ctx.fillStyle = rarityColor;
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'right';
    ctx.font = '800 40px Inter, system-ui, sans-serif';
    const wordW = ctx.measureText(' ' + rarityWord).width;
    ctx.fillText(rarityWord, W - PAD, HEAD_Y);
    ctx.font = '900 44px Inter, system-ui, sans-serif';
    ctx.fillText(stars, W - PAD - wordW, HEAD_Y);
    ctx.restore();

    // --- TITLE BLOCK (name, nickname, family chip) ---
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
    // Card name — huge dark text. Auto-shrink for very long names.
    const displayName = lcVersion(card.displayName || '');
    let nameFontPx = 130;
    ctx.font = '900 ' + nameFontPx + 'px Inter, system-ui, sans-serif';
    while (ctx.measureText(displayName).width > W - PAD * 2 && nameFontPx > 64) {
      nameFontPx -= 6;
      ctx.font = '900 ' + nameFontPx + 'px Inter, system-ui, sans-serif';
    }
    ctx.fillStyle = '#15171c';
    ctx.fillText(displayName, PAD, 290);

    // Nickname — italic muted gray
    ctx.font = 'italic 600 56px Inter, system-ui, sans-serif';
    ctx.fillStyle = '#687085';
    ctx.fillText('“' + (card.nickname || '') + '”', PAD, 360);

    // Family chip row — dot + family ID + family type, family-colored,
    // small uppercase tracking like .card-fam in the DOM.
    ctx.save();
    const dotY = 432;
    ctx.fillStyle = famColor;
    ctx.beginPath();
    ctx.arc(PAD + 12, dotY, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = '700 36px Inter, system-ui, sans-serif';
    ctx.fillStyle = famColor;
    ctx.textBaseline = 'middle';
    const famId = lcVersion((card.familyDisplay || '').trim());
    const famType = (card.familyType || '').toUpperCase();
    const famChip = famId ? (famId + '  ·  ' + famType) : famType;
    ctx.fillText(famChip, PAD + 36, dotY);
    ctx.restore();

    // --- ART BLOCK (glyph + optional GPU tag) ---
    // Centered family glyph, small (≈ 280 px) tinted in family color.
    const glyph = glyphCanvases[card.familyType];
    const artMidY = 620;
    if (glyph) {
      const gSize = 280;
      ctx.drawImage(glyph, (W - gSize) / 2, artMidY - gSize / 2, gSize, gSize);
    }
    // GPU tag underneath (if any) — small text in legendary-amber
    if (card.tags && card.tags.gpu) {
      ctx.save();
      ctx.font = '800 40px ui-monospace, "SF Mono", Menlo, Consolas, monospace';
      ctx.fillStyle = '#f0a93b';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';
      ctx.fillText('GPU · ' + card.tags.gpu, W / 2, artMidY + 180);
      ctx.restore();
    }

    // --- STATS LIST (6 rows on white card body) ---
    const statsX0 = PAD;
    const statsX1 = W - PAD;
    const statsY0 = 870;
    const statsY1 = 1630;
    const s = card.stats || {};
    const rows = [
      { label: 'vCPU',       dir: 'higher', hint: 'compute capacity',
        val: s.vcpus           != null ? String(s.vcpus) : '—', unit: '' },
      { label: 'MEMORY',     dir: 'higher', hint: 'RAM capacity',
        val: s.memoryGB        != null ? String(s.memoryGB) : '—',
        unit: s.memoryGB != null ? 'GB' : '' },
      { label: 'DATA DISKS', dir: 'higher', hint: 'storage scale-out',
        val: s.maxDataDisks    != null ? String(s.maxDataDisks) : '—',
        unit: s.maxDataDisks != null ? 'MAX' : '' },
      { label: 'NICs',       dir: 'higher', hint: 'max network interfaces',
        val: s.nics            != null ? String(s.nics) : '—',
        unit: s.nics != null ? 'MAX' : '' },
      { label: 'PRICE',      dir: 'lower',  hint: 'PAYG Linux · lower wins',
        val: s.pricePerHourUSD != null ? '$' + s.pricePerHourUSD.toFixed(3) + '/hr' : '—',
        unit: s.pricePerHourUSD != null ? 'USD' : '' },
      { label: 'POWER',      dir: 'higher', hint: 'composite horsepower',
        val: s.powerScore      != null ? s.powerScore + '/100' : '—', unit: '' },
    ];
    const rowH = (statsY1 - statsY0) / rows.length;
    ctx.textBaseline = 'middle';
    rows.forEach((r, i) => {
      const rowTop = statsY0 + i * rowH;
      const rowMid = rowTop + rowH / 2;
      // Label (uppercase, tracked, dark gray-blue)
      ctx.font = '800 44px Inter, system-ui, sans-serif';
      ctx.fillStyle = '#4a5063';
      ctx.textAlign = 'left';
      ctx.fillText(r.label, statsX0 + 20, rowMid);
      const labelW = ctx.measureText(r.label).width;
      // Direction arrow (family-tinted for higher, muted red for lower)
      const arrow = r.dir === 'higher' ? '▲' : '▼';
      ctx.font = '900 32px Inter, system-ui, sans-serif';
      ctx.fillStyle = r.dir === 'higher' ? famColor : '#c44545';
      const arrowX = statsX0 + 20 + labelW + 18;
      ctx.fillText(arrow, arrowX, rowMid);
      const arrowW = ctx.measureText(arrow).width;
      // Hint (italic light gray) after arrow, auto-shrink to fit
      let hintFont = 32;
      ctx.font = 'italic 500 ' + hintFont + 'px Inter, system-ui, sans-serif';
      const hintX = arrowX + arrowW + 14;
      const hintMaxW = statsX1 - 20 - hintX - 360;
      while (ctx.measureText(r.hint).width > hintMaxW && hintFont > 22) {
        hintFont -= 2;
        ctx.font = 'italic 500 ' + hintFont + 'px Inter, system-ui, sans-serif';
      }
      ctx.fillStyle = '#9aa0ad';
      ctx.fillText(r.hint, hintX, rowMid);
      // Value — dark, mono-feel, right-aligned. Optional unit suffix
      // rendered smaller and uppercased like .stat-value .unit in DOM.
      let valFont = 64;
      ctx.font = '900 ' + valFont + 'px Inter, system-ui, sans-serif';
      while (ctx.measureText(r.val).width > 360 && valFont > 40) {
        valFont -= 4;
        ctx.font = '900 ' + valFont + 'px Inter, system-ui, sans-serif';
      }
      ctx.fillStyle = '#15171c';
      ctx.textAlign = 'right';
      const unitGap = r.unit ? 16 : 0;
      const unitFont = Math.max(28, Math.floor(valFont * 0.45));
      ctx.save();
      ctx.font = '700 ' + unitFont + 'px Inter, system-ui, sans-serif';
      const unitW = r.unit ? ctx.measureText(r.unit).width : 0;
      ctx.restore();
      ctx.font = '900 ' + valFont + 'px Inter, system-ui, sans-serif';
      ctx.fillText(r.val, statsX1 - 20 - unitW - unitGap, rowMid);
      if (r.unit) {
        ctx.font = '700 ' + unitFont + 'px Inter, system-ui, sans-serif';
        ctx.fillStyle = '#8a8f99';
        ctx.fillText(r.unit, statsX1 - 20, rowMid);
      }
      // Row divider — faint hairline at bottom of every row
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(statsX0 + 20, rowTop + rowH);
      ctx.lineTo(statsX1 - 20, rowTop + rowH);
      ctx.stroke();
    });
    ctx.textBaseline = 'alphabetic';

    // --- ABILITY FOOTER (cream tinted box) ---
    if (card.ability && (card.ability.title || card.ability.description)) {
      const abX0 = 40;
      const abX1 = W - 40;
      const abY  = 1660;
      const abH  = 300;
      ctx.fillStyle = '#f5f1e3';
      roundRect(ctx, abX0, abY, abX1 - abX0, abH, 28); ctx.fill();
      const abTitle = (card.ability.title || '').toUpperCase();
      const abDesc  = card.ability.description || '';
      // Title — uppercase, family-colored
      ctx.textBaseline = 'alphabetic';
      ctx.textAlign = 'left';
      ctx.font = '900 44px Inter, system-ui, sans-serif';
      ctx.fillStyle = famColor;
      ctx.fillText(abTitle, abX0 + 40, abY + 68);
      // Description — wrap to up to 4 lines
      ctx.font = '500 36px Inter, system-ui, sans-serif';
      ctx.fillStyle = '#565b6d';
      const dx = abX0 + 40;
      const maxW = (abX1 - abX0) - 80;
      const lineH = 46;
      const maxLines = 4;
      const words = abDesc.split(/\s+/);
      const lines = [];
      let line = '';
      let consumed = 0;
      for (let i = 0; i < words.length; i++) {
        const test = line ? line + ' ' + words[i] : words[i];
        if (ctx.measureText(test).width > maxW && line) {
          lines.push(line);
          line = words[i];
          consumed = i;
          if (lines.length === maxLines) break;
        } else {
          line = test;
        }
      }
      if (line && lines.length < maxLines) { lines.push(line); consumed = words.length; }
      if (lines.length === maxLines && consumed < words.length - 1) {
        let last = lines[maxLines - 1];
        while (ctx.measureText(last + ' …').width > maxW && last.includes(' ')) {
          last = last.replace(/\s+\S*$/, '');
        }
        lines[maxLines - 1] = last + ' …';
      }
      lines.forEach((ln, i) => ctx.fillText(ln, dx, abY + 124 + i * lineH));
    }

    // Rarity-tinted outer border (last so it sits on top of every other
    // layer). Matches the original .card.rarity-X box-shadow accent.
    ctx.strokeStyle = rarityColor;
    ctx.lineWidth = 8;
    roundRect(ctx, 16, 16, W - 32, H - 32, CORNER_TEX - 16); ctx.stroke();
  }

  function drawBack(ctx) {
    const W = TEX_W, H = TEX_H;
    const S = 4; // CSS→texture scale (1280=320*4, 2000=500*4)

    // --- 1. Background field --------------------------------------------
    // 135° linear gradient matching the original CSS3D card back
    // (--azure → --azure-deep → #06335e). Then a soft top-left highlight,
    // then the hex tessellation overlay at 6% white.
    // Clip radius MUST match the CSS .card border-radius (14 CSS px) so
    // the painted content fills the element edge-to-edge. If the clip
    // is tighter than the element radius, the safety-net
    // `background-color` underneath shows through as a darker ring at
    // each corner — which reads as a second card peeking out from
    // behind the jittered deck stack.
    ctx.save();
    roundRect(ctx, 0, 0, W, H, CORNER_TEX); ctx.clip();

    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0,    '#0f6cbd');
    grad.addColorStop(0.60, '#0b4f8c');
    grad.addColorStop(1,    '#073b6a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Radial highlight — CSS3D back uses `radial-gradient(circle at
    // 30% 25%, rgba(255,255,255,.08), transparent 55%)`. With
    // farthest-corner default, the gradient end is 55% of the
    // distance from (0.3W, 0.25H) to (W,H), ≈ 0.55 × √(0.49W² + 0.5625H²).
    // For our 1280×2000 tex this works out to ~960 tex px.
    const hiCx = W * 0.30, hiCy = H * 0.25;
    const hiR  = 0.55 * Math.sqrt((W - hiCx) * (W - hiCx) + (H - hiCy) * (H - hiCy));
    const hi = ctx.createRadialGradient(hiCx, hiCy, 0, hiCx, hiCy, hiR);
    hi.addColorStop(0, 'rgba(255,255,255,0.10)');
    hi.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hi;
    ctx.fillRect(0, 0, W, H);

    if (hexTilePattern) {
      const pat = ctx.createPattern(hexTilePattern, 'repeat');
      if (pat) { ctx.fillStyle = pat; ctx.fillRect(0, 0, W, H); }
    }
    ctx.restore();

    // --- 2. Outer gold frame (inset 8 CSS px) ---------------------------
    // Drawn as three concentric strokes to mimic the original's
    // outer-gold + inner-white + dashed-very-faint sandwich.
    // Concentric with the card corner: radius at inset d is CORNER_TEX - d.
    const frameInset = 8 * S;
    const frameR    = CORNER_TEX - frameInset;
    ctx.lineWidth = 1 * S;
    ctx.strokeStyle = 'rgba(255,214,130,0.55)';
    roundRect(ctx, frameInset, frameInset,
              W - frameInset * 2, H - frameInset * 2, frameR); ctx.stroke();

    const innerInset = 13 * S;
    const innerR     = CORNER_TEX - innerInset;
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    roundRect(ctx, innerInset, innerInset,
              W - innerInset * 2, H - innerInset * 2, innerR); ctx.stroke();

    // Inner gold tint hint inside the white border.
    ctx.strokeStyle = 'rgba(255,214,130,0.18)';
    roundRect(ctx, innerInset + S, innerInset + S,
              W - (innerInset + S) * 2, H - (innerInset + S) * 2, innerR - S); ctx.stroke();

    // Faint dashed line (inset 19 CSS).
    const dashInset = 19 * S;
    ctx.save();
    ctx.setLineDash([3 * S, 4 * S]);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1 * S;
    roundRect(ctx, dashInset, dashInset,
              W - dashInset * 2, H - dashInset * 2, CORNER_TEX - dashInset); ctx.stroke();
    ctx.restore();

    // --- 3. Central hex medallion ---------------------------------------
    // 200×200 viewBox in the SVG, scaled to 62% of card width (max 180 CSS).
    // For our 320 CSS card: 320*0.62 = 198 → clamped to 180. So size = 180 CSS.
    const medSize = 180 * S;
    const medX = (W - medSize) / 2;
    const medY = (H - medSize) / 2;
    const medScale = medSize / 200; // viewBox is 200x200
    drawMedallion(ctx, medX, medY, medScale);

    // --- 4. Azure "A" logo (if loaded) ----------------------------------
    if (azureLogoImg.complete && azureLogoImg.naturalWidth > 0) {
      const logoSize = 96 * S; // 32% of 320 → 102 CSS, clamped to 96
      const logoX = (W - logoSize) / 2;
      const logoY = (H - logoSize) / 2;
      // Soft drop shadow to match the CSS filter: drop-shadow(0 4px 10px ...)
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.55)';
      ctx.shadowBlur  = 10 * S;
      ctx.shadowOffsetY = 4 * S;
      ctx.drawImage(azureLogoImg, logoX, logoY, logoSize, logoSize);
      ctx.restore();
    }

    // --- 5. Wordmarks ---------------------------------------------------
    // "AZURE TOP TRUMPS" top + bottom, gold-cream, wide letter-spacing,
    // flanked by short gold side rules. CSS: 9px font, .42em letter-spacing.
    drawWordmark(ctx, 'AZURE TOP TRUMPS', W / 2, 26 * S + 14 * S);
    drawWordmark(ctx, 'AZURE TOP TRUMPS', W / 2, H - 26 * S);

    // --- 6. Corner ornaments --------------------------------------------
    // 4-fold rotational symmetry. The SVG draws its L+arc+dot pattern
    // in the top-left "quadrant" of its 24×24 viewBox; rotating by 90°
    // increments matches the original CSS card.
    const cs = 26 * S;            // corner box size
    const co = 14 * S;            // offset from card edge
    drawCornerOrnament(ctx, co,            co,            cs,   0);
    drawCornerOrnament(ctx, W - co - cs,   co,            cs,  90);
    drawCornerOrnament(ctx, W - co - cs,   H - co - cs,   cs, 180);
    drawCornerOrnament(ctx, co,            H - co - cs,   cs, 270);
  }

  // Gold hex medallion (mirrors BACK_MEDALLION_SVG verbatim).
  function drawMedallion(ctx, x, y, s) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(s, s);
    // Outer hex ring — gold gradient.
    const gold = ctx.createLinearGradient(0, 0, 0, 200);
    gold.addColorStop(0, '#ffe6a8');
    gold.addColorStop(1, '#d59b2a');
    ctx.lineWidth = 1 / s * 4; // keep stroke ~constant in screen px
    ctx.strokeStyle = gold;
    ctx.globalAlpha = 0.35;
    polyHex(ctx, [100,12, 170,52, 170,148, 100,188, 30,148, 30,52]);
    ctx.globalAlpha = 1;

    // Slightly inner hex — white-ish.
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 0.6 / s * 4;
    polyHex(ctx, [100,22, 162,57, 162,143, 100,178, 38,143, 38,57]);

    // Inner ornamental circle.
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 0.5 / s * 4;
    ctx.beginPath();
    ctx.arc(100, 100, 62, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function polyHex(ctx, pts) {
    ctx.beginPath();
    for (let i = 0; i < pts.length; i += 2) {
      const x = pts[i], y = pts[i + 1];
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
  }

  // Gold side-ruled wordmark — "— text —" with letter-spacing.
  function drawWordmark(ctx, text, cx, cy) {
    const S = 4;
    const size = 9 * S;
    ctx.save();
    ctx.font = '700 ' + size + 'px Inter, system-ui, sans-serif';
    ctx.fillStyle = 'rgba(255,224,168,0.85)';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur  = 2 * S;
    ctx.shadowOffsetY = 1 * S;
    // Manual letter-spacing (.42em ≈ 0.42 * fontSize).
    const spacing = size * 0.42;
    let total = 0;
    for (const ch of text) total += ctx.measureText(ch).width + spacing;
    total -= spacing; // no trailing space
    let x = cx - total / 2;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    for (const ch of text) {
      ctx.fillText(ch, x, cy);
      x += ctx.measureText(ch).width + spacing;
    }
    // Side rules — short gold gradient lines flanking the wordmark.
    const ruleW = 28 * S;
    const ruleY = cy;
    ctx.shadowColor = 'transparent';
    const gL = ctx.createLinearGradient(cx - total / 2 - ruleW - 10 * S, ruleY,
                                        cx - total / 2 - 10 * S,         ruleY);
    gL.addColorStop(0,   'rgba(255,214,130,0)');
    gL.addColorStop(0.5, 'rgba(255,214,130,0.55)');
    gL.addColorStop(1,   'rgba(255,214,130,0)');
    ctx.fillStyle = gL;
    ctx.fillRect(cx - total / 2 - ruleW - 10 * S, ruleY - S / 2, ruleW, S);

    const gR = ctx.createLinearGradient(cx + total / 2 + 10 * S, ruleY,
                                        cx + total / 2 + 10 * S + ruleW, ruleY);
    gR.addColorStop(0,   'rgba(255,214,130,0)');
    gR.addColorStop(0.5, 'rgba(255,214,130,0.55)');
    gR.addColorStop(1,   'rgba(255,214,130,0)');
    ctx.fillStyle = gR;
    ctx.fillRect(cx + total / 2 + 10 * S, ruleY - S / 2, ruleW, S);

    ctx.restore();
  }

  // Corner ornament: L-stub + arc + dot, rotated to match position.
  function drawCornerOrnament(ctx, x, y, size, rotDeg) {
    ctx.save();
    // Defensive state reset so a shadow / dash / alpha leak from
    // anywhere upstream in drawBack cannot poison this routine.
    ctx.setLineDash([]);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    ctx.globalAlpha = 1;
    ctx.translate(x + size / 2, y + size / 2);
    ctx.rotate(rotDeg * Math.PI / 180);
    ctx.translate(-size / 2, -size / 2);
    const s = size / 24; // SVG viewBox is 24×24
    ctx.strokeStyle = 'rgba(255,214,130,0.72)';
    // L-stub: SVG uses stroke-linecap="round" — keep that.
    ctx.lineCap = 'round';
    ctx.lineWidth = 1.4 * s;
    ctx.beginPath();
    ctx.moveTo(2 * s, 2 * s); ctx.lineTo(10 * s, 2 * s);
    ctx.moveTo(2 * s, 2 * s); ctx.lineTo(2 * s, 10 * s);
    ctx.stroke();

    // Arc pair: original SVG path has no linecap attribute, so it
    // uses the default "butt". Inheriting "round" from the L above
    // adds semicircular caps to every arc endpoint, fattening the
    // pair into a blurry blob after the 4× → 1× downsample.
    ctx.lineCap = 'butt';
    ctx.lineWidth = 1 * s;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.moveTo(5 * s, 5 * s); ctx.quadraticCurveTo(5 * s, 10 * s, 10 * s, 10 * s);
    ctx.moveTo(5 * s, 5 * s); ctx.quadraticCurveTo(10 * s, 5 * s, 10 * s, 10 * s);
    ctx.stroke();
    ctx.globalAlpha = 1;

    ctx.fillStyle = 'rgba(255,214,130,0.75)';
    ctx.beginPath();
    ctx.arc(3.5 * s, 3.5 * s, 1.2 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawHex(ctx, cx, cy, r, color, width) {
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i - Math.PI / 2;
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.stroke();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);

    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h); ctx.lineTo(x, y + h);

    let lines = 0;
    for (let n = 0; n < words.length; n++) {
      const test = line ? line + ' ' + words[n] : words[n];
      if (ctx.measureText(test).width > maxWidth && line) {
        ctx.fillText(line, x, y);
        line = words[n];
        y += lineHeight;
        lines++;

  /* ---------- 5. CPU AI ----------
   Difficulty scale (G.difficulty 1-5):
     1 Cadet     — fully random
     2 Rookie    — 75% random, 25% smart
     3 Engineer  — 40% random, 60% smart
     4 Architect — fully smart (rank-based)
     5 Oracle    — sees opponent's top card; picks the stat where CPU wins by largest margin */
const DIFFICULTY_META = [
  null,
  { name: 'Cadet',     hint: 'Picks a stat at random. Easiest match.' },
  { name: 'Rookie',    hint: 'Mostly random — occasionally clever.' },
  { name: 'Engineer',  hint: 'Balanced — sometimes smart, sometimes random.' },
  { name: 'Architect', hint: 'Plays its strongest stat every round.' },
  { name: 'Oracle',    hint: 'Peeks at your card. Brutal — good luck.' },
];
const DIFFICULTY_SMART_P = [0, 0.0, 0.25, 0.60, 1.0, 1.0];

function pickStatForCPU(card, allHandCards, opponentCard) {
  const diff = (G && G.difficulty) || 3;

  // Level 5: oracle — knows opponent's card; pick stat where CPU wins by the largest margin.
  if (diff >= 5 && opponentCard) {
    let bestKey = null, bestScore = -Infinity;
    for (const s of STATS) {
      const cv = card.stats[s.key], pv = opponentCard.stats[s.key];
      if (cv == null) continue;
      // null on opponent = auto-win for CPU
      if (pv == null) { return s.key; }
      const margin = (s.dir === 'higher') ? (cv - pv) : (pv - cv);
      // Normalize roughly by range of stat across in-play cards
      const vals = allHandCards.map(c => c.stats[s.key]).filter(x => x != null);
      const range = Math.max(1e-9, Math.max(...vals) - Math.min(...vals));
      const score = margin / range;
      if (score > bestScore) { bestScore = score; bestKey = s.key; }
    }
    if (bestKey && bestScore > 0) return bestKey;
    // fallthrough: no winning stat — fall back to smart pick
  }

  // Random-vs-smart blend
  const pSmart = DIFFICULTY_SMART_P[diff] ?? 1.0;
  if (Math.random() >= pSmart) {
    const eligible = STATS.filter(s => card.stats[s.key] != null);
    return eligible[Math.floor(Math.random() * eligible.length)].key;
  }

  // Smart: pick the stat where THIS card ranks highest within current pool.
  let best = null, bestRank = -1;
  for (const s of STATS) {
    const v = card.stats[s.key];
    if (v == null) continue;
    const values = allHandCards
      .map(c => c.stats[s.key])
      .filter(x => x != null);
    if (values.length < 4) continue;
    let worse = 0;
    for (const x of values) {
      if (s.dir === 'higher' && v > x) worse++;
      if (s.dir === 'lower'  && v < x) worse++;
    }
    const rank = worse / (values.length - 1);
    if (rank > bestRank) { bestRank = rank; best = s; }
  }
  return (best || STATS[0]).key;
}

/* ---------- 6. round resolution ---------- */

/**
 * Compare a single stat between two cards.
 * Returns 'player' | 'cpu' | 'tie'.
 */
function resolveStat(stat, pCard, cCard) {
  const meta = STATS.find(s => s.key === stat);
  const pv = pCard.stats[stat];
  const cv = cCard.stats[stat];

  // Null handling: a card with null on this stat auto-loses (unless both null = tie).
  if (pv == null && cv == null) return 'tie';
  if (pv == null) return 'cpu';
  if (cv == null) return 'player';

  if (pv === cv) return 'tie';
  if (meta.dir === 'higher') return pv > cv ? 'player' : 'cpu';
  /* lower */                  return pv < cv ? 'player' : 'cpu';
}

  const FEAT = { smoke: true, streaks: true, moons: true, xwings: true, cards: true, heldXwing: false };

    s: { flag: 'smoke',     label: 'Smoke trail' },
    h: { flag: 'streaks',   label: 'Hyperspace streaks' },
    m: { flag: 'moons',     label: 'Moons' },

    if (flag === 'cards')     applyCardVisibility();   // show/hide the two play cards
    if (flag === 'heldXwing') applyHeldXWing();         // show/hide a held X-wing for inspection

     recyclable starfield streams toward the camera; `backdropWarp()` spikes

  const space = new THREE.Group();

  const STAR_N = _reducedInit ? 260 : 900;

  const starGeo = new THREE.BufferGeometry();
  const starPos = new Float32Array(STAR_N * 3);
  const starVel = new Float32Array(STAR_N);
  const starSz  = new Float32Array(STAR_N);
  function seedStar(i, anyZ) {

    const a = Math.random() * 6.2832, r = STAR_R * (0.12 + 0.88 * Math.sqrt(Math.random()));

    transparent: true, depthWrite: false, depthTest: false, toneMapped: false, blending: THREE.AdditiveBlending,

    vertexShader: `attribute float aAlpha; varying float vA;

  makePlanet({ r: 3.2, color: 0xbfe4f5, emissive: 0x286a8c, x:  22, y: -4.0, z: -38, spin: 0.09 });

  makePlanet({ r: 1.1, color: 0xe6eefb, emissive: 0x44607f, x:  17, y: -9.0, z: -30, spin: 0.16 });

    // random one) so seeding always terminates without an overlap.
    let best = null, bestGap = -Infinity;

  let _xwings = [];         // active flyby craft (any type), pooled together

  const CRAFT = {
    xwing: { url: './vendor/models/x-wing-v2.glb',   norm: 6.0,
             nose: [0, 0, -1], up: [0, 1, 0],
             roll: 1.0,  emissive: 0x000000, emissiveI: 0 },

             roll: 0.35, emissive: 0x3a5474, emissiveI: 0.5 },

    const u = new THREE.Vector3().crossVectors(f, r).normalize();
    return new THREE.Matrix4().makeBasis(r, u, f);

  // Preload one craft GLB once; clones are cheap thereafter.

      const centre = new THREE.Vector3(); box.getCenter(centre);

      const maxDim = Math.max(size.x, size.y, size.z) || 1;

      const mSrc = _buildBasis(new THREE.Vector3(...cfg.nose).normalize(),

  // the opaque pass, so honouring that depth would hide the craft behind a nearer
  // moon; ignoring depth entirely (the old depthTest:false) breaks intra-model

  // the depth buffer once, right before the craft draws (see the sentinel below):

  const bezierPoint = (out, t, a, b, c, d) => {
    const u = 1 - t;
    const uu = u * u, tt = t * t;
    return out.set(0, 0, 0)
      .addScaledVector(a, uu * u)
      .addScaledVector(b, 3 * uu * t)
      .addScaledVector(c, 3 * u * tt)
      .addScaledVector(d, tt * t);

  function buildFlybyPath() {
    // Flight-path policy:
    // 1) Keep X-wings out of card space by routing through perimeter lanes and
    //    rejecting any candidate that enters the center screen window.
    // 2) Keep the established axis logic untouched: orientation continues to come
    //    from curve tangent + roll around fuselage axis (see update block below).
    const cam = camera.position.clone();
    const camZ = cam.z;
    const r = (a, b) => a + Math.random() * (b - a);
    const pickSign = () => (Math.random() < 0.5 ? -1 : 1);

      const nd = new THREE.Vector3(nx, ny, 0.2).unproject(camera);
      const dir = nd.sub(cam);

      return cam.clone().addScaledVector(dir, (zWorld - cam.z) / dir.z);

    // front of the moons. The cards are the top layer and always occlude it, so a
    // path may pass behind a card harmlessly. We still route off the two CARD
    // FACES so the craft is never bisected by a card edge — it reads as a whole
    // craft roaming the scene and receding toward the vanishing point.
    const hitsCard = (a, b, c, d) => {
      const tmp = new THREE.Vector3();

        const nd = tmp.clone().project(camera);
        if (!Number.isFinite(nd.x) || !Number.isFinite(nd.y)) return true;
        const ax = Math.abs(nd.x), ay = Math.abs(nd.y);

      }

    // point in a MATCHING safe corridor so the whole path stays clear of the cards:
    //   * the centre gap  -> a vertical recede straight up/down between the cards
    //   * the open sky     -> a side edge paired with a point high above / below
    //   * just off a card  -> a side edge paired with a point just outside that card
    const edgeNdc = () => (Math.random() < 0.5
      ? { x: pickSign() * r(1.06, 1.34), y: r(-0.85, 0.85) }
      : { x: r(-0.85, 0.85), y: pickSign() * r(1.06, 1.28) });
    const matchedPair = () => {
      const p = Math.random();
      if (p < 0.5) {
        const gx = r(-0.03, 0.03);                                   // centre gap column
        return { edge: { x: gx, y: pickSign() * r(1.06, 1.24) }, free: { x: gx * 0.5, y: r(-0.42, 0.42) } };
      }
      if (p < 0.8) {
        const lane = pickSign();                                     // open sky above / below
        return { edge: edgeNdc(), free: { x: r(-0.6, 0.6), y: lane * r(0.76, 0.96) } };
      }
      const side = pickSign();                                       // just outside one card
      return { edge: { x: side * r(1.06, 1.32), y: r(-0.6, 0.6) }, free: { x: side * r(0.66, 0.9), y: r(-0.5, 0.5) } };
    };
    const nearZ = () => camZ - r(5, 16);    // just in front of the viewer at the edge
    const farZ  = () => r(-262, -228);       // +50% deeper: craft shrinks to a far dot before it melts (camera far=320)
    // Build a cubic that flies STRAIGHT in, then hooks off to one side late. The
    // first control point stays on the s->e line (so the run-in holds the entry
    // heading) and the second is kicked laterally (so the back half breaks away
    // in a new direction) — the escape read the chase is going for. The leader
    // and follower share this curve, so the chaser hooks through the same line.
    const cubicFromEnds = (kind, s, e, z0, z2, extra) => {
      const dx = e.x - s.x, dy = e.y - s.y;
      const len = Math.hypot(dx, dy) || 1;
      const px = -dy / len, py = dx / len;                       // unit perpendicular (NDC)
      const swerve = (extra.swerveSign || pickSign()) * r(0.62, 1.05);  // stronger lateral break (escape read)
      const z1 = z0 + (z2 - z0) * 0.33, z2c = z0 + (z2 - z0) * 0.66;
      return {
        kind, farEnd: extra.farEnd,
        p0: ndcToWorldAtZ(s.x, s.y, z0),
        p1: ndcToWorldAtZ(s.x + dx * 0.42, s.y + dy * 0.42, z1),                                  // longer straight run-in
        p2: ndcToWorldAtZ(s.x + dx * 0.66 + px * swerve, s.y + dy * 0.66 + py * swerve, z2c),      // then a hard late hook (escape)
        p3: ndcToWorldAtZ(e.x, e.y, z2),
        duration: extra.duration,
        ease: extra.ease
      };
    };
    const buildProfile = (kind) => {
      if (kind === 'enter_recede') {
        // Enters from a screen EDGE near the viewer, then glides off into the far
        // distance and melts away (one edge endpoint, one free far endpoint).
        const { edge: s, free: e } = matchedPair();
        return cubicFromEnds(kind, s, e, nearZ(), farZ(), {
          farEnd: true, duration: r(4400, 6200), ease: (x) => x * (2 - x)   // ease-out: quick entry, long glide
        });
      }
      if (kind === 'emerge_exit') {
        // Emerges from the far distance, flies toward the viewer and exits at a
        // screen EDGE (one free far endpoint, one edge endpoint).
        const { edge: e, free: s } = matchedPair();
        return cubicFromEnds(kind, s, e, farZ(), nearZ(), {
          farEnd: false, duration: r(3200, 4600), ease: (x) => x * x * (3 - 2 * x)   // smoothstep
        });
      }
      // cross_pass: full edge-to-edge sweep for variety, routed through a TOP or
      // BOTTOM lane so it never rakes across the card faces. Force the hook to
      // break OUTWARD (same side as the lane) so it stays clear of the cards.
      const dir = pickSign();
      const lane = pickSign();
      const s = { x: -dir * r(1.08, 1.34), y: lane * r(0.60, 0.88) };
      const e = { x:  dir * r(1.08, 1.34), y: lane * r(0.60, 0.88) };
      const z0 = r(-58, -36);
      return cubicFromEnds('cross_pass', s, e, z0, z0 + r(-10, 10), {
        farEnd: false, duration: r(2800, 3800), ease: (x) => x, swerveSign: lane * dir
      });
    };
    const pickProfileKind = () => {
      const x = Math.random();
      if (x < 0.46) return 'enter_recede';
      if (x < 0.86) return 'emerge_exit';
      return 'cross_pass';
    };

    let path = null;
    for (let i = 0; i < 24; i++) {
      const cand = buildProfile(pickProfileKind());
      if (!hitsCard(cand.p0, cand.p1, cand.p2, cand.p3)) { path = cand; break; }
    }
    if (!path) {
      // deterministic clean fallback: high sweep across the open sky above the cards.
      path = {
        kind: 'cross_pass', farEnd: false,
        p0: ndcToWorldAtZ(-1.22, 0.86, -48),
        p1: ndcToWorldAtZ(0.0, 0.92, -46),
        p2: ndcToWorldAtZ(1.22, 0.86, -44),
        p3: ndcToWorldAtZ(1.30, 0.84, -42),
        duration: 3200,
        ease: (x) => x
      };
    }
    return path;
  }

  // Launch ONE craft of `type` down an already-built path. Extracted from the
  // old spawn so a leader + follower can share the identical curve.
  function launchCraft(type, path, opts = {}) {
    const xwing = makeCraft(type);
    if (!xwing) return;                       // that model not loaded yet
    const rollScale = CRAFT[type] ? CRAFT[type].roll : 1.0;
    xwing.scale.multiplyScalar(opts.scaleMul != null ? opts.scaleMul : (1.0 + Math.random() * 0.5));  // size variety
    const { p0, p1, p2, p3 } = path;
    const duration = path.duration;
    xwing.userData.pathKind = path.kind;

    // Seat the craft at its true start pose with opacity 0 BEFORE adding.
    xwing.position.copy(p0);
    xwing.traverse(child => {
      if (child.material && child.material.opacity !== undefined) {
        child.material.opacity = 0;
      }
    });
    scene.add(xwing);
    _xwings.push(xwing);
    const _pos = new THREE.Vector3(), _nextPos = new THREE.Vector3(), _dir = new THREE.Vector3();
    const _zA = new THREE.Vector3(), _xA = new THREE.Vector3(), _yA = new THREE.Vector3();
    const _up = new THREE.Vector3(0, 1, 0), _basis = new THREE.Matrix4();
    const _qRoll = new THREE.Quaternion(), _ZAXIS = new THREE.Vector3(0, 0, 1);

    const rollDir = Math.random() < 0.5 ? 1 : -1;

      dur: md(duration),
      ease: path.ease,
      tag: 'xwing',
      update: (_e, t) => {
        bezierPoint(_pos, t, p0, p1, p2, p3);
        xwing.position.copy(_pos);
        // Established axis behavior: keep tangent-based heading + roll-only bank.
        bezierPoint(_nextPos, Math.min(1, t + 0.02), p0, p1, p2, p3);
        _dir.subVectors(_nextPos, _pos);
        if (_dir.lengthSq() > 1e-6) {
          _dir.normalize();
          _zA.copy(_dir).multiplyScalar(-1);            // local +Z opposes the nose
          _xA.crossVectors(_up, _zA);
          if (_xA.lengthSq() < 1e-6) _xA.set(1, 0, 0);  // guard: near-vertical travel
          _xA.normalize();
          _yA.crossVectors(_zA, _xA).normalize();
          _basis.makeBasis(_xA, _yA, _zA);
          xwing.quaternion.setFromRotationMatrix(_basis);

          xwing.quaternion.multiply(_qRoll);

        // Fade policy: a short spawn fade-in, then HOLD full opacity through the
        // flight. Craft that recede into the distance melt out gently over a long,
        // EXTENDED range so they shrink away naturally instead of ghost-vanishing;
        // craft that exit at a screen edge stay fully opaque and just leave frame
        // (no approach fade).
        const fadeIn = Math.min(1, t / 0.05);
        let distFade = 1;

          distFade = zNow >= zKeep ? 1

        }
        const endGuard = path.farEnd ? Math.min(1, (1 - t) / 0.12) : 1;
        const alpha = Math.max(0, Math.min(1, fadeIn * distFade * endGuard));

          }
        });
      },
      done: () => {
        scene.remove(xwing);
        // Only dispose per-instance cloned materials; geometry is shared by proto.
        xwing.traverse(child => {
          if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
            else child.material.dispose();
          }
        });
        _xwings = _xwings.filter(x => x !== xwing);
      }
    });
  }

  // Build one path and send BOTH craft down it in a chase: the leader now, the
  // follower a beat later, on the identical curve. The lead/trail order
  // alternates each pass so sometimes the TIE chases the X-wing and sometimes
  // the reverse. One formation on screen at a time.
  function spawnFlyby() {
    if (!FEAT.xwings || REDUCED) return;
    if (_xwings.length > 0) return;                 // one formation on screen at a time
    if (!_craftProtos.xwing && !_craftProtos.tie) return;   // nothing loaded yet
    const path = buildFlybyPath();
    const order = Math.random() < 0.5 ? ['xwing', 'tie'] : ['tie', 'xwing'];
    const lag = md((520 + Math.random() * 260) * 4);  // 4x trailing gap so it reads as a chase, not a formation
    launchCraft(order[0], path);                    // leader now
    setTimeout(() => {                              // follower a beat later, same path
      if (FEAT.xwings && !REDUCED) launchCraft(order[1], path);
    }, lag);
  }
  const spawnXWingFlyby = spawnFlyby;               // back-compat alias (spawner + debug hook)

  let _heldT = 0;
  function updateXWings(dt) {
   if (_heldXwing) {                                  // gentle nose-on hover (keeps the "charging at you" read)
     _heldT += dt;

     _heldXwing.rotation.z = Math.sin(_heldT * 0.9 + 1.0) * 0.07;       // slight bank
     _heldXwing.rotation.x = -0.05 + Math.sin(_heldT * 0.5) * 0.04;     // subtle pitch bob
   }

   if (!FEAT.xwings || REDUCED) return;

  const CARD_W = 2.08;                          // 20% smaller than the original 2.6 — cards read at a more life-like size and reveal more of the space backdrop
  const CARD_H = CARD_W * (art.H / art.W);      // preserve baked aspect
  // Rounded-rectangle card silhouette so the mesh edge matches the rounded
  // corners painted into the baked art (a plain PlaneGeometry left square
  // corners poking past the artwork). UVs are remapped to the 0..1 bounding
  // box so the existing textures map identically to the old plane.
  function roundedCardGeo(w, h, r) {
    const x = -w / 2, y = -h / 2;
    const s = new THREE.Shape();
    s.moveTo(x, y + r);
    s.lineTo(x, y + h - r);
    s.quadraticCurveTo(x, y + h, x + r, y + h);
    s.lineTo(x + w - r, y + h);
    s.quadraticCurveTo(x + w, y + h, x + w, y + h - r);
    s.lineTo(x + w, y + r);
    s.quadraticCurveTo(x + w, y, x + w - r, y);
    s.lineTo(x + r, y);
    s.quadraticCurveTo(x, y, x, y + r);
    const geo = new THREE.ShapeGeometry(s, 10);
    const pos = geo.attributes.position, uv = geo.attributes.uv;
    for (let i = 0; i < pos.count; i++) {
      uv.setXY(i, (pos.getX(i) + w / 2) / w, (pos.getY(i) + h / 2) / h);
    }
    uv.needsUpdate = true;
    return geo;
  }
  const CARD_R = (art.corner * 4 / art.W) * CARD_W;   // match baked corner radius
  const cardGeo = roundedCardGeo(CARD_W, CARD_H, CARD_R);

  /* ---- rarity foil (Phase 5b) ----------------------------------------
     A holographic sheen laid over the card FRONT as a thin additive mesh in
     the same scene (no DOM overlay, no second context — the whole reason for
     this rebuild). It's a CHILD of the card front, so it flips and tilts with
     the face and is culled when the back is showing (FrontSide). A diagonal
     rainbow band drifts across, its angle shifting with the card's real facing
     so it reads as a view-dependent foil. Intensity scales with rarity; common
     cards get none. Kept subtle + concentrated so stat text stays legible. */
  const FOIL_INTENSITY = { uncommon: 0.30, rare: 0.55, epic: 0.78, legendary: 1.0 };
  const foils = new Set();
  function makeFoil(rarity) {
    const intensity = FOIL_INTENSITY[rarity] || 0;
    if (intensity <= 0) return null;
    const mat = new THREE.ShaderMaterial({
      transparent: true, depthWrite: false, toneMapped: false,
      blending: THREE.AdditiveBlending, side: THREE.FrontSide,
      uniforms: { uTime: { value: 0 }, uIntensity: { value: intensity }, uFacing: { value: 1 } },
      vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader: `precision highp float; varying vec2 vUv;
        uniform float uTime; uniform float uIntensity; uniform float uFacing;
        vec3 hue(float h){ return clamp(abs(mod(h*6.0+vec3(0.0,4.0,2.0),6.0)-3.0)-1.0, 0.0, 1.0); }
        void main(){
          // diagonal coordinate; angle drifts with the card's facing so the
          // foil "catches the light" differently as the card tilts/flips.
          float ang = 0.9 + (1.0 - uFacing) * 0.7;
          float g = vUv.x * cos(ang) + vUv.y * sin(ang);
          // moving specular band
          float band = sin(g * 7.0 - uTime * 1.6);
          float spec = pow(max(band, 0.0), 3.0);

          vec3 col = hue(fract(g * 1.3 + uTime * 0.08));
          // concentrate away from the very centre so stat text stays clean
          float centreGuard = smoothstep(0.12, 0.42, abs(vUv.y - 0.52));
          float a = (0.10 + spec * 0.9) * uIntensity * (0.45 + 0.55 * centreGuard) * 0.34;
          gl_FragColor = vec4(col * (0.6 + spec), a);
        }`
    });
    const m = new THREE.Mesh(cardGeo, mat);
    m.position.z = 0.008;   // just in front of the front face plane
    m.userData.isFoil = true;
    foils.add(mat);
    return m;
  }
  function updateFoils(t) {
    foils.forEach(mat => { mat.uniforms.uTime.value = t; });
  }
  // shift each in-play card's foil angle by how square-on it faces the camera
  function updateFoilFacing(cardG) {
    if (!cardG) return;
    const facing = Math.abs(Math.cos(cardG.rotation.y));
    const f = cardG.userData.foil;
    if (f) f.material.uniforms.uFacing.value = facing;
    const s = cardG.userData.backSheen;
    if (s) s.material.uniforms.uFacing.value = facing;
  }

  /* ---- card-back gloss sheen -----------------------------------------
     The card FRONT gets the rarity foil; without something equivalent the
     deep-blue BACK reads flat/dull next to it (esp. the face-down CPU card).
     This is a subtle single-tone azure gloss laid over the back as a thin
     additive child mesh: a slow diagonal light sweep rolls across like light
     catching a laminated card, a soft top-left lacquer highlight adds depth,
     and a tighter glint peaks when the back faces square-on to the camera.
     Every card has one (backs show regardless of rarity). Kept low-alpha so
     the Azure "A" and hex pattern stay clean. */
  const backSheens = new Set();
  function makeBackSheen() {
    const mat = new THREE.ShaderMaterial({
      transparent: true, depthWrite: false, toneMapped: false,
      blending: THREE.AdditiveBlending, side: THREE.FrontSide,
      uniforms: { uTime: { value: 0 }, uIntensity: { value: 1 }, uFacing: { value: 1 } },
      vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader: `precision highp float; varying vec2 vUv;
        uniform float uTime; uniform float uIntensity; uniform float uFacing;
        void main(){
          // diagonal coordinate for the travelling sheen
          float ang = 0.7;
          float g = vUv.x * cos(ang) + vUv.y * sin(ang);
          // broad slow light sweep rolling across the card
          float sweep = sin(g * 3.0 - uTime * 0.85);
          float band  = pow(max(sweep, 0.0), 2.4);
          // tighter fast glint on top of the sweep
          float glint = pow(max(sin(g * 9.0 - uTime * 1.7), 0.0), 8.0);
          // soft lacquer highlight toward the upper-left
          vec2 d = vUv - vec2(0.40, 0.72);
          float gloss = smoothstep(0.72, 0.0, length(d));
          // glint is strongest when the back is square-on to the viewer
          float faceBoost = 0.52 + 0.38 * uFacing;
          // cool azure sheen, but stop short of a full near-white flare
          vec3 col = mix(vec3(0.30, 0.55, 0.96), vec3(0.66, 0.84, 1.0), band);
          float a = (band * 0.15 + glint * 0.22 + gloss * 0.06) * uIntensity * faceBoost;
          gl_FragColor = vec4(col, a);
        }`
    });
    const m = new THREE.Mesh(cardGeo, mat);
    m.position.z = 0.006;   // just in front of the back face (back-local +z faces the viewer)
    m.userData.isBackSheen = true;
    backSheens.add(mat);
    return m;
  }
  function updateBackSheens(t) {
    backSheens.forEach(mat => { mat.uniforms.uTime.value = t; });
  }

  /* ---- winning-card glow (replaces confetti) --------------------------
     A soft, additive rounded-rect edge halo parented to the winning card so
     the exit reads as the *card itself* lighting up rather than a party of
     chips. It faces +Z (back-face culled) so it only blooms once the front is
     toward the camera, and it draws a bright rim hugging the card edge plus a
     halo bleeding outward into space — the interior stays transparent so the
     card art shows through. One owner per card (userData.winGlow), freed with

  const WIN_GLOW_M   = 0.7;                  // halo margin beyond the card edge (world units) — snug: the rim now forms within ~0.2u so this caps the aura without clipping
  const winGlowGeo   = new THREE.PlaneGeometry(CARD_W + WIN_GLOW_M * 2, CARD_H + WIN_GLOW_M * 2);
  const _winGlows    = new Set();            // active materials → shimmer animated each frame
  function makeWinGlow() {
    const mat = new THREE.ShaderMaterial({
      transparent: true, depthTest: false, depthWrite: false, toneMapped: false,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uColor:  { value: new THREE.Color(HL.win) },
        uAmt:    { value: 0 },               // 0..1 master intensity (tweened in on a win)
        uTime:   { value: 0 },
        uHalf:   { value: new THREE.Vector2(CARD_W * 0.5, CARD_H * 0.5) },
        uRadius: { value: CARD_R },
        uPlane:  { value: new THREE.Vector2(CARD_W + WIN_GLOW_M * 2, CARD_H + WIN_GLOW_M * 2) }

      vertexShader: `
        varying vec2 vUv;
        void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
      fragmentShader: `
        precision highp float;
        varying vec2 vUv;
        uniform vec3  uColor; uniform float uAmt; uniform float uTime;
        uniform vec2  uHalf;  uniform float uRadius; uniform vec2 uPlane;
        // signed distance to a rounded rectangle (negative inside, 0 at the edge)
        float sdRoundRect(vec2 p, vec2 b, float r){

          return min(max(q.x, q.y), 0.0) + length(max(q, 0.0)) - r;

          // steeper OUTWARD so the bright edge stays crisp while its faint halo
          // dies quickly instead of bleeding a wide aura into space.

          gl_FragColor = vec4(col, a);
        }`

    m.material.uniforms.uColor.value.setHex(colorHex);

    _winGlows.forEach((mat) => { mat.uniforms.uTime.value = t; });
  }

  const DUST_MAX = 520;

  const _dstMax   = new Float32Array(DUST_MAX);   // original life (for grow/fade curve)

  const dustGeo = new THREE.BufferGeometry();
  dustGeo.setAttribute('position', new THREE.BufferAttribute(_dstPos,   3).setUsage(THREE.DynamicDrawUsage));
  dustGeo.setAttribute('aColor',   new THREE.BufferAttribute(_dstCol,   3).setUsage(THREE.DynamicDrawUsage));
  dustGeo.setAttribute('aSize',    new THREE.BufferAttribute(_dstSize,  1).setUsage(THREE.DynamicDrawUsage));
  dustGeo.setAttribute('aAlpha',   new THREE.BufferAttribute(_dstAlpha, 1).setUsage(THREE.DynamicDrawUsage));

  const dustMat = new THREE.ShaderMaterial({
    transparent: true, depthTest: false, depthWrite: false, toneMapped: false,
    blending: THREE.NormalBlending,
    uniforms: { uDpr: { value: _dpr }, uTime: { value: 0 } },
    vertexShader: `
      attribute vec3 aColor; attribute float aSize; attribute float aAlpha; attribute float aSeed;
      varying vec3 vCol; varying float vA; varying float vSeed; uniform float uDpr;
      void main(){
        vCol = aColor; vA = aAlpha; vSeed = aSeed;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = aSize * uDpr;
      }`,
    fragmentShader: `
      precision highp float;
      varying vec3 vCol; varying float vA; varying float vSeed;
      uniform float uTime;

      float hash(vec2 p){ p = fract(p * vec2(123.34, 345.45)); p += dot(p, p + 34.345); return fract(p.x * p.y); }
      float vnoise(vec2 p){
        vec2 i = floor(p), f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        float a = hash(i), b = hash(i + vec2(1.0, 0.0));
        float c = hash(i + vec2(0.0, 1.0)), d = hash(i + vec2(1.0, 1.0));
