name: Deploy to Azure Storage

on:
  push:
    branches: [main]
    paths: ['index.html', 'data/**', 'config.json']

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload index.html to Azure Blob Storage
        run: |
          az storage blob upload `
            --account-name ${{ vars.STORAGE_ACCOUNT }} `
            --container-name '$web' `
            --name index.html `
            --file index.html `
            --overwrite `
            --content-type "text/html; charset=utf-8" `
            --auth-mode login
        shell: pwsh

      - name: Upload data files to Azure Blob Storage
        run: |
          if (Test-Path data) {
            az storage blob upload-batch `
              --account-name ${{ vars.STORAGE_ACCOUNT }} `
              --destination '$web' `
              --source data `
              --destination-path data `
              --overwrite `
              --auth-mode login
            Write-Host "✅ Data files uploaded"
          } else {
            Write-Host "ℹ No data directory found (skipping)"
          }
        shell: pwsh

      - name: Upload config.json to Azure Blob Storage
        run: |
          if (Test-Path config.json) {
            az storage blob upload `
              --account-name ${{ vars.STORAGE_ACCOUNT }} `
              --container-name '$web' `
              --name config.json `
              --file config.json `
              --overwrite `
              --content-type "application/json" `
              --auth-mode login
          }
        shell: pwsh

      - name: Verify deployment
        run: |
          $url = "https://${{ vars.STORAGE_ACCOUNT }}.z44.web.core.windows.net/"
          $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 30
          if ($response.StatusCode -eq 200) {
            Write-Host "✅ Deployment verified: $url (HTTP $($response.StatusCode))"
          } else {
            Write-Error "❌ Deployment check failed: HTTP $($response.StatusCode)"
            exit 1
          }
        shell: pwsh
