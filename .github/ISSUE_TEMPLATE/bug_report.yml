name: 🐛 Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of the issue...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What should have happened?
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome 120, Edge 120, Firefox 121
